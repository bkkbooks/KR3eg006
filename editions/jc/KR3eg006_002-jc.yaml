古今醫案按方加味震靈丹禹糧石赤石脂紫石英代赭石各四兩上四味作小塊入淨鍋中鹽泥封固候乾用炭十斤煅炭盡為度入地出火氣必得二晝夜研細末乳香二兩沒藥二兩硃砂水飛一兩五靈脂二兩熟地六兩甘杞子四兩龜膠二兩坎氣四具共研細末先將膠烊化杵合為丸如彈子大沉香汁湯化下顧氏醫鏡方之類此皆峻補方法之確有大效者也六食補之法程鍾齡謂藥補不如食補凡病邪未盡元氣雖虛而不任重補則從容和緩以補之相其機宜循序漸進脈症相安漸為減藥穀肉果菜食養盡之以底於平康顧松園曰白花百合湯麥冬湯清肺止咳真柿霜消痰解熱人乳為補血神品童便乃降火仙丹雪梨生食能清火蒸熟則滋陰苡仁湯肺熱脾虛服之有益淡蓮子湯芡實粥遺精泄瀉最屬相宜扁豆紅棗湯專補脾胃龍眼肉湯兼養心脾鰉鱘鰾線魚膠同豬蹄燕窩海參或雞鴨葷中煮爛飲汁更佳填精益髓鳳頭白鴨烏骨白雞補陰除熱豬肺蘸白及末保肺止血以上諸物隨宜恆食此食補方法之大要也雖然食物有寒有熱猶人臟腑有陰有陽臟陽而不得性寒之物以為之協則臟性益陽矣臟陰而不得性熱之物以為之濟則臟性益陰矣臟有陰陽兼見之症而不用不寒不熱之物以為調劑則臟性益互雜而不平矣食之入口等於藥之治病合則於人臟腑有益而可卻病衛生不合則於人臟腑有損而即增病促死此食治所以見重於方書而與藥物並傳也惟食物之種不下數百姑即日用常食之物以為辨別如穀食之有面曲蠶豆豆油酒醋是性之至溫者也若蘆稷稻米粳米陳倉米黑豆黃豆白豆豌豆豇豆則稍平矣又若粟米黍稷蕎麥綠豆豆腐豆豉豆醬則性寒矣此穀食之分其寒熱也又如瓜菜之有薑蒜蔥韭芹菜胡荽白芥胡蘿蔔是性溫者也若山藥薤菜匏瓠南瓜性稍平又若莧菜油菜菠菜蓴菜白苣萵苣黃瓜甜瓜絲瓜冬瓜西瓜醬瓜諸筍芋艿茄子是性寒者也此瓜菜之分其寒熱也至於果品如龍眼荔枝大棗飴糖砂糖白糖蓮子葡萄蜂蜜胡桃楊梅木瓜橄欖青桃李子栗子溫性也榧實黃精枇杷青梅花生平性也梨子菱角蓮藕橘瓤烏芋百合甘蔗白果柿干柿霜寒性也但生李性溫則多生痰而助溫生桃性燥則多助熱而生毒此果品之分其寒熱也至於禽獸之物如雞肉鴨肉山雉鷓鴣犬肉羊肉牛肉鹿肉鹿筋貓肉是至溫矣燕窩斑鳩雁肉鸛肉鳧肉竹雞豬肉是至平矣兔肉麋肉麋筋是至寒矣但山雉雞肉鷓鴣性雖溫而不免有發風壅毒之害豬肉性雖平而不免有多食動痰之虞此禽獸之分其寒熱也他如魚鱉龜介蟲類其在鯽魚鰱魚鰣魚海蝦鱔魚皆溫性也鯉魚鯊魚鮑魚鰍魚銀魚烏賊皆平性也鱧魚鰻魚田蛙螃蟹鱉肉龜肉田螺蛤蜊肉皆寒性也但蝦肉性燥不免動風助火之變鱉蟹性寒有毒不免動氣破血之虞此魚鱉介蟲之分其寒熱也再於諸味之中又細分其氣辛而葷則性助火散氣味重而甘則性助溫生痰體柔而滑則性通腸利便質硬而堅則食之不化烹煉不熟則服之氣壅必審其於人之病症虛實是否相符則於養生之道始得且勝於藥多多矣以上皆補益方法之綱要者也謹述當補益諸症如下氣虛當補之候面色痿白言語輕微四肢無力少氣薄力動則氣高而喘或痞滿痰多或飲食難化作酸或頭暈自汗大便泄瀉或咳嗽氣短舌苔白嫩或淡紅而潤血虛當補之候面白唇淡頭暈目眩睡臥不安五心煩熱作渴神志不寧津液枯竭健忘怔忡腸燥便艱口乾舌燥或口舌生瘡舌苔嫩紅而干或絳底浮白或舌絳而燥陰虛當補之候身體枯瘦耳聾目眩或視物不明神倦多睡腰膝痿軟骨節痠痛遺精夢泄足後跟痛咯痰味鹹甚或盜汗失血痰帶血絲咳嗽氣喘甚或虛火上浮目赤顴紅大渴煩躁舌絳無苔或舌黑燥而無刺服清涼藥渴不止身熱愈甚或煩熱加重服攻下藥舌苔愈長或芒刺燥裂愈甚用利水藥小便愈不通用疏散藥周身骨節痠痛不可移動陽虛當補之候多冷汗汗出身冷經日不回飲食少思臍腹脹痛小便清而多大便利清穀水泛為痰狀如白沫嘔吐痞滿用清降開導藥愈甚自利用清下藥愈甚甚或四肢厥冷腹痛面赤舌淡紅而胖嫩或微白而圓厚溫熱驗案溫熱本證醫案案一載傷寒論廣要元羅太無先生治驗勞役受熱飲食失節損傷脾胃時發煩躁而渴又食冷物過度遂病身體困倦頭痛四肢逆冷嘔吐而心下痞醫者不審見其四肢逆冷嘔吐心下痞乃用桂末三錢匕熱酒調服仍以綿衣裹之作陰毒傷寒治之汗遂大出汗後即添口乾舌澀眼白睛紅項強硬肢體不柔和小便淋赤大便秘澀循衣摸床如發狂狀問之則言語錯亂視其舌則赤而欲裂朝輕暮劇凡七八日家人輩視為危殆不望生全予診其脈六七至知其熱症明矣遂用大承氣湯苦辛大寒之劑服之利下三行折其銳勢翌日以黃連解毒湯大苦寒之劑使徐徐服之以去餘熱三日後病十分中減之五六更與白虎加人參湯瀉熱補氣前症皆退戒以慎起居節飲食月餘平復又案載三世醫驗明陸養愚先生治驗史洞庭尊正四月間患頭痛發熱予診其脈洪數見於氣口用清解藥二劑大約柴葛梔芩之類未服而病者之兄唐承尊延一醫來用大青龍湯二劑病家止服一劑夜間遍身如燒口渴咽乾已有譫語矣明日唐復延其診又謂非傷寒乃痛風也用羌獨活何首烏牛膝等二劑乃登高而歌棄衣而走罵詈不避親疏史家復延予予至聞欲裸而出令數婦人持之予謂洞庭曰此陽症也擾動之益劇宜婉言諭之果如予言而止因先用糖水法灌之其勢便緩隨以白虎加元明粉芩連蔞仁犀角數帖而罵詈始止然猶或妄言知大便久不去也以潤字丸三錢投之夜出燥屎一二十枚而譫語猶未全止復進前湯又以丸藥二錢投之出燥屎數枚溏便少許又三日方思粥飲以清氣養榮湯歸身白芍川芎茯苓木香豆蔻陳皮川連調理之吳煦野公子年二十三歲精神極旺三月清明節館中歸家夜大醉遂有房事五更小解忽臍下作痛腸中雷鳴小便不利明日遂發寒熱頭痛延醫診脈自告以酒後犯遠歸之戒醫者疑是陰症傷寒以理中湯兩劑令一日夜盡服之第二日嘔逆大作煩躁口渴飲食不進晝夜不臥延予診治已第三日矣其脈左弦右洪寸關有力尺部尚和面赤戴陽予不知其服理中之故出撮柴葛解肌湯柴胡葛根赤芍甘草黃芩知母川貝生地丹皮石膏淡竹葉二劑煦野及親友見之大駭因備述遠歸陰虛投理中不減正擬倍加參附予曰脈症俱陽縱有房事陰未嘗虛若再用參附恐仙人亦難拯救予令今夜必服此二劑庶不傳裡病者自抱心虛止服一劑明早診視症尚不劇脈仍洪大並兩尺亦大予曰熱邪已入腑矣日晡必劇以白虎湯二劑投之病者尚猶豫未決予曰今日怕石膏明日大黃也延挨煎就未服而煩渴躁熱大作且有譫語煦野公駭之予曰此勢所必然連進二服熱略不減於是群然議用大黃予曰今日大黃又用不得仍以前方二劑與之至五更始得少睡早間診視兩尺沉實舌苔已厚改用小陷胸湯送潤字丸一錢至晚又進一錢夜半出燥屎數十枚熱減泄止大勢始定此後枳實黃連服至數十劑少用滋補即痞膈飲食不能進調治將二月方得全愈又案載張氏醫通清張路玉先生治驗徐君育素稟陰虛多火且有脾約便血證十月間患冬溫發熱咽痛里醫用麻黃杏仁半夏枳橘之屬遂喘逆倚息不得臥聲颯如啞頭面赤熱手足逆冷右手寸關虛大微數此熱傷手太陰氣分也與葳蕤甘草等藥不應為制豬膚湯一甌令隔湯頓熱不時挑服三日聲清終劑而痛如失又治鄭墨林室素有便紅懷妊七月正肺氣養胎時而患冬溫咳嗽咽痛如刺下血如崩脈較平時反覺小弱而數此熱傷手太陰血分也與黃連阿膠湯二劑血止後去黃連加葳蕤桔梗人中黃四劑而安又案清吳鞠通先生治驗脈不浮而細數大渴引飲大汗里不足之熱病也用玉女煎法知母四錢生石膏一兩桑葉三錢麥冬細生地各五錢粳米一撮甘草三錢復診昨用玉女煎法諸症俱減平素有消渴病用玉女煎大便稀溏加牡蠣一面護陰一面收下牡蠣一兩生石膏五錢炒知母二錢麥冬大生地各五錢炙甘草三錢粳米一撮終與益胃湯調理而愈又案清王孟英先生治驗姚某年未三旬煙癮甚大適伊母病溫而歿勞瘁悲哀之際復病溫邪脅痛筋掣氣逆痰多熱壯神昏莖縮自汗醫皆束手所親徐麗生矚其速孟英診之脈見芤數舌絳無津有陰虛陽越熱熾液枯之險況初發即爾其根蒂之不堅可知與犀羚元參知母壯水熄風蓯蓉楝實鼠矢石英潛陽鎮逆沙參麥冬石斛葳蕤益氣充津花粉梔子銀花絲瓜絡蠲痰清熱一劑知四劑安隨以大劑養陰而愈朱敦書令愛病溫醫投溫散服二劑遍身麻瘄月事適來醫進小柴胡湯遂狂妄莫制乞援於孟英脈至洪滑弦數目赤苔黃大渴不寐是瘄因溫邪而發所以起病至今時時大汗何必再攻其表汛行為熱迫於營胡反以薑棗溫之參柴升之宜其燎原而不可遏也與大劑犀角元參生地石膏知母花粉銀花竹葉貝母白薇以清衛涼營服後即眠久而未醒或疑為昏沉也屢為呼喚病者驚寤即令家人啟篋易服穿鞋梳頭告別父母云欲往花神廟歸位人莫能攔舉家痛哭急迓孟英復視脈象囑其家靜守勿哭仍以前方加重和以竹瀝童便灌下即安繼用養陰清熱而愈畢方來室患痰嗽礙眠醫與補攝而至涕淚全無耳閉不飢二便澀滯干嗽無痰氣逆自汗孟英切脈右寸沉滑左手細數而弦乃高年陰虧溫邪在肺未經清化率為補藥所錮宜開其痹而通其胃與蔞薤紫菀兜鈴杏貝冬瓜子甘桔旋茹之劑而安許少卿室故醫陳啟東先生之從女也夏初病溫何新之十進清解病不略減因邀診於孟英脈至弦洪豁大左手為尤大渴大汗能食妄言面赤足冷徹夜不瞑孟英曰證雖屬溫而真陰素虧久傷思慮心陽外越內風鴟張幸遇明手未投溫散尚可無恐與龍牡犀珠龜板鱉甲貝母竹瀝竹葉辰砂小麥元參丹參生地麥冬為大劑投之外以燒鐵淬醋令吸其氣蠣粉撲止其汗搗生附子貼於湧泉穴甫服一劑所親薦胡某往視大斥王議為非而主透疹之法病家惑之即煎胡藥進焉病者神氣昏瞀又易服王藥漸以向愈而陰不易復頻灌甘柔滋鎮月餘始能起榻季夏汛行惟情志不怡易生驚恐與麥參熟地石英茯神龍眼甘麥大棗三甲等藥善其後姚令輿室素患喘嗽復病春溫醫知其本元久虧投以溫補痙厥神昏耳聾譫語面赤舌絳痰喘不眠醫皆束手矣延孟英診之脈猶弦滑曰證雖危險生機未絕遽爾輕棄毋乃太忍與犀角羚羊元參沙參知母花粉石膏以清熱熄風救陰生液佐蓯蓉石英鱉甲金鈴旋覆貝母竹瀝以潛陽鎮逆通絡蠲痰三劑而平繼去犀羚石膏加生地黃服旬日而愈余侄森伯患發熱面赤渴而微汗孟英視之曰春溫也乘其初犯邪尚在肺是以右寸之脈洪大宜令其下行由腑而出則即可霍然投知母花粉冬瓜子桑葉枇杷葉黃芩葦莖梔子等藥果大便連瀉極熱之水二次而脈靜身涼知飢啜粥遂痊王皺石廣文令弟患春溫始則譫語發狂連服清解大劑遂昏沉不語肢冷如冰目閉不開遺溺不飲孟英診其脈弦大而緩滑黃膩之苔滿布穢氣直噴投承氣湯加銀花石斛黃芩竹茹元參石菖蒲下膠黑矢甚多而神稍清略進湯飲次日去硝黃加海蜇萊菔黃連石膏服二劑而戰解肢和苔退進粥不勞餘力而愈褚芹香女校書患月愆寒熱醫以為損輒投溫補馴至腹脹不飢帶淋便閉溲澀而痛孟英診脈弦勁而數乃熱伏厥陰誤治而肺亦壅塞也與清肅開上之劑吞當歸龍薈丸兩服寒熱不作而知飢旬日諸恙悉安張養之己亥九月間患惡寒頭痛自餌溫散不效邀孟英診之脈極沉重按至骨則弦滑隱然臥曲房密帳之中爐火重裘尚覺不足以禦寒且涎沫仍吐毫不作渴胸腹無脹悶之苦咳嗽無暫輟之時惟大解堅燥小溲不多口氣極重耳乃謂曰此積熱深錮氣機鬱而不達非大苦寒以瀉之不可也重用硝黃犀角冀頑邪蘊毒得以通泄下行則周身之氣機自然流布矣養之伏枕恭聽大為感悟如法服之越二日大便下如膠漆穢惡之氣達於戶外而畏寒即以遞減糜粥日以加增旬日後糞色始正百日後康健勝常段春木之室爛喉內外科治之束手姚雪蕉孝廉薦孟英視之骨瘦如柴肌熱如烙韌痰阻於咽喉不能咯吐須以紙帛攪而曳之患處紅腫白腐齦舌皆糜米飲不沾月事非期而至按其脈左細數右弦滑曰此陰虧之體伏火之病失於清降擾及於營先以犀角地黃湯清營分而調妄行之血續與白虎湯加西洋參等肅氣道而瀉燎原之火外用錫類散掃痰腐而消惡毒繼投甘潤藥蠲餘熱而充津液日以向安月餘而起廉按溫熱病最怕發熱不退及痙厥昏蒙更有無端而發暈及神清而忽間以狂言者往往變生不測遇此等證最能惑人不比陽證陰脈陽縮舌卷撮空見鬼者易燭其危也要訣在辨明虛實辨得真方可下手以余臨證實驗溫熱實症陽明胃腸病居多溫熱虛症少陰心腎病居多前哲俞東扶頗有發明試節述其說曰今之所謂傷寒者大概皆溫熱病耳惟傷寒則足經為主溫熱則手經病多如風溫之咳嗽鼻鼾熱病之神昏譫語或溏瀉黏垢皆手太陰肺手厥陰心包絡手陽明大腸現證甚者喉腫肢掣昏蒙如醉躁擾不寧齒焦舌燥發癍發頤等證其邪分布充斥無復六經可考故不以六經法治耳就予生平所驗初時兼挾表邪者最多仍宜發散如防葛豉薄牛蒡杏仁滑石連翹等以得汗為病輕無汗為病重如有癍則參入蟬蛻桔梗蘆根西河柳之類如有痰則參入土貝天蟲栝蔞橘紅之類如現陽明證則白虎承氣少陽證則小柴胡去參半加花粉知母少陰證則黃連阿膠湯豬苓湯豬膚湯俱宗仲景六經成法有效但溫熱病之三陰證多死不比傷寒蓋冬不藏精者東垣所謂腎水內竭孰為滋養也惟大劑養陰佐以清熱或可救之養陰如二地二冬阿膠丹皮元參人乳蔗漿梨汁清熱如三黃石膏犀角大青知母蘆根茅根金汁雪水西瓜銀花露絲瓜汁隨其對症者選用溫熱兼症醫案風溫驗案見張氏醫通清張路玉先生治驗黃以寬風溫十餘日壯熱神昏語言難出自利溏黑舌苔黑燥唇焦鼻煤先前誤用發散消導藥數劑煩渴彌甚張石頑曰此本伏熱鬱發更遇於風遂成風溫風溫脈氣本浮以熱邪久伏少陰從火化發出太陽即是兩感變患最速今幸年壯質強已逾三日六日之期證雖危殆良由風藥性升鼓激周身元氣皆化為火傷耗真陰少陰之脈不能內藏所以反浮考諸南陽先師原無治法而少陰例中則有救熱存陰承氣下之一證可藉此以迅掃久伏之邪審其鼻息不鼾知腎水之上源未絕無慮其直視失溲也時歙醫胡晨敷在坐同議涼膈散加人中黃生地黃服後下溏糞三次舌苔未潤煩渴不減此杯水不能救車薪之火也更與大劑涼膈大黃加至二兩兼黃連犀角三下方得熱除於是專用生津止渴多服而愈又案清王孟英先生治驗程燮庭乃朗芷香今春病溫而精關不固旬日後陡然莖縮寒顫自問不支人謂為虛瘧欲投參附孟英曰非瘧也平日體豐多厚味釀痰是以苔膩不渴善噫易吐而吸受風溫即以痰濕為山險乘其陰虧陽擾流入厥陰甚易豈容再投溫補以劫液錮邪而速其痙厥耶伊家以六代單傳父母深憂之堅求良治孟英曰予雖洞識其症而病情轇轕縱有妙劑難許速功治法稍乖亦防延損倘信吾言當邀顧聽泉會診既可匡予之不逮即以杜人之妄議程深然之於是王顧熟籌妥治午後進肅清肺胃方以解客邪蠲痰渴而斡樞機早晨投涼腎舒肝法以靖浮越搜隧絡而守關鍵病果遞減奈善生嗔怒易招外感不甘淡泊反復多次每復必莖縮寒顫甚至齒縫見紫血瓣指甲有微紅色溺短而渾黑極臭孟英曰幸上焦已清中樞已運亟宜填腎陰清肝熱以西洋參二冬二地蓯蓉花粉知柏連楝斛芍石英牡蠣龜板鱉甲阿膠雞子黃之類相迭為方大劑連服二十餘帖各恙漸退繼以此藥熬膏晨服午用繆氏資生丸方各品不炒皆生曬為末竹瀝為丸枇杷葉湯送下服至入秋始得康健王氏七旬有三風溫傷肺頭暈目瞑舌縮無津身痛肢厥口乾不飲昏昧鼻鼾語言難出寸脈大症屬痰熱阻竅先清氣分熱邪杏仁象貝羚角花粉嫩桑葉竹茹山梔一服症減肢和但舌心黑而尖絳乃心胃火燔懼其入營劫液用鮮生地犀角汁元參丹皮麥冬阿膠蔗漿梨汁三服舌潤神蘇身涼脈靜但大便未通不嗜粥飲乃灼熱傷陰津液未復繼與調養胃陰兼佐醒脾旬日霍然廉按溫為伏氣風是新感風溫一症即葉天士所謂新邪引動伏邪是也法當辛涼清解輕劑如劉氏桔梗湯防風解毒湯重劑如繆氏竹葉石膏湯葉氏荷杏石甘湯皆有特效切忌辛溫消散劫鑠津液驟變則為痙厥緩變則為肺癆臨症者切宜慎重冷溫驗案清張路玉先生治驗陸中行室年二十餘臘月中旬患咳嗽捱過半月病熱稍減新正五日復咳倍前自汗體倦咽喉干痛至元夕忽微惡寒發熱明日轉為腹痛自利手足逆冷咽痛異常又三日則咳唾膿血張診其脈輕取微數尋之則仍不數寸口似動而軟尺部略重則無審其脈症寒熱難分頗似仲景厥陰例中麻黃升麻湯證蓋始本冬溫所傷原不為重故咳至半月漸減乃勉力支持歲事過於勞役傷其脾肺之氣故咳復甚於前至望夜忽憎寒發熱來日遂自利厥逆者當是病中體疏復感寒邪之故熱邪既傷於內寒邪復加於外寒閉熱邪不得外散勢必內奔而為自利致邪傳少陰厥陰而為咽喉不利唾膿血也雖傷寒大下後與傷熱後自利不同而寒熱錯雜則一遂與麻黃升麻湯一劑肢體微汗手足溫暖自利即止明日診之脈亦向和嗣後與異功生脈合服數劑而安又案清雷少逸先生治驗城東章某得春溫時病前醫不識遂謂傷寒輒用荊防羌獨等藥一劑得汗身熱退清次劑罔靈復熱如火大渴飲冷其勢如狂更醫治之謂為火證竟以三黃解毒為君不但熱勢不平更變神昏瘈瘲急來商治於予診其脈弦滑有力視其舌黃燥無津予曰此春溫病也初起本宜發汗解其在表之寒所以熱從汗解惜乎繼服原方過汗遂化為燥又加苦寒遏其邪熱以致諸變叢生當從邪入心包肝風內動治之急以祛熱宣竅法去心連翹三錢犀角一錢川貝三錢去心鮮石菖蒲一錢加牛黃至寶丹一顆去蠟殼化沖加羚角鉤藤一劑瘈瘲稍定神識亦清惟津液未回唇舌尚燥原方去至寶菖蒲加入沙參鮮地三劑諸恙咸安又案清朱心農先生治驗人身之氣冬令伏藏易於化火當時晴亢過久人病咳喘俗謂客寒包火是也身熱舌白脅痛咳痰膠厚逾悶逾煩汗出不解先宜開泄麻黃六分杏仁三錢生甘草五分石膏三錢研細生桑皮二錢苦桔梗一錢川貝母錢半枇杷葉二錢炒二劑喘熱已減去麻甘膏加蔞皮二錢泡淡黃芩五分馬兜鈴一錢而愈寒遏伏熱肺為邪侵氣不通利肺痹喘咳上逆一身氣化不行防變肺脹急宜輕開清降蘇葉五分杏仁二錢栝蔞皮錢半廣鬱金磨汁一匙生苡仁二錢桔梗一錢枇杷葉錢半白通草一錢三服已效惟咳逆不止仍屬肺氣失降原方去苡仁蘇葉加紫菀錢半川貝三錢二劑即愈廉按溫熱伏邪因新寒觸動而發者俗稱冷溫發於春者為春溫發於冬者為冬溫俗稱客寒包火皆屬此症初起多頭身皆痛寒熱無汗咳嗽口渴舌苔浮白脈息舉之有餘或弦或緊尋之或滑或數先宜辛溫解表法防風杏仁桔梗各錢半廣皮一錢淡豆豉三錢加蔥白兩枚煎倘或舌苔化燥或黃或焦是溫熱已鑠於胃即用涼解裡熱法鮮蘆根五錢大豆卷三錢天花粉二錢生石膏四錢生甘草六分如舌絳齒燥譫語神昏是溫熱深踞陽明營分即宜清熱解毒法西洋參大麥冬鮮生地各三錢元參錢半金銀花青連翹各二錢加綠豆三錢煎服以保其津液如有手足瘈瘲脈來弦數是為熱極生風即宜祛熱熄風法大麥冬五錢鮮生地四錢甘菊花二錢羚羊角二錢鉤藤鉤五錢先將羚羊角煎一炷香代水再入諸藥煎服如或昏憒不知人不語如屍厥此溫邪竄入心包即宜祛熱宣竅法見前冷溫變幻不一而足務在臨機應變此皆前哲雷少逸經驗法也濕溫驗案清葉天士先生治驗濕溫穢濁之氣膠結於三焦故脈搏濡滯苔灰邊白氣喘脘結周身痛難轉側小溲窒澀而痛老年精氣已衰恐有內閉外脫之變先與辛淡開泄鮮石菖蒲厚朴茯苓皮橘紅白蔻仁光杏仁沖服蘇合香丸一顆次診濕開熱透氣喘身痛俱減惟熱壅脘結溺仍澀痛濕復阻氣鬱而成病須知熱自濕中而來徒進清熱無功仍以宣通氣分白蔻仁大腹皮茯苓皮滑石通草豬苓黃芩三診脘結溺痛已痊惟吞酸形寒乏陽運行以致寒熱不飢蓋以濕屬陰晦必傷陽氣法當轉旋脾胃與苓薑朮桂湯加味浙茯苓淡乾薑生於朮川桂枝半貝丸生苡仁炒橘白荷葉拌炒穀芽四診寒熱瘥食不化中州陽失健運當以溫藥和之益智仁炒穀芽炒廣皮炙甘草浙茯苓檀香汁半夏曲炒荷葉此濕重於溫之療法濕溫長夏最多其濕蒸之氣多由口鼻而入上焦先病漸布中下河間所謂三焦病也治與風寒食積迥異仲景云濕家不可發汗汗之則痙濕本陰邪其中人也則傷陽汗則陽易泄越而邪留不解濕蒸熱鬱發現為黃熏蒸氣隧之間正如罨曲之比斯時病全在氣分連翹赤小豆湯連翹赤小豆光杏仁梓白皮生薑甘草紅棗可以奏效今經一月邪彌三焦自耳前後左腫及右癰瘍大發夫癰者壅也不惟氣滯血亦阻塞蒸而為膿穀食不思陡然肉消殆盡胃氣索然矣商治之法補則助壅清則垂脫前輩成法一無可遵因思濕熱穢濁結於頭面清竅議輕可去實之法選芳香氣味使胃無所苦或者壅遏得宣少進漿粥便是進步經云從上病者治其上靈樞云上焦如霧非輕揚芳香之氣何以開之青菊葉荷葉邊金銀花象貝綠豆皮馬兜鈴連翹射干臨服沖金汁一小杯次診癰腫痛連背部此屬郁傷氣血經脈流行失司已經月餘不痊恐有流注潰膿之憂法當內外兼治治在少陽陽明焦山梔粉丹皮夏枯草雙鉤藤制香附廣鬱金薄荷梗鮮菊葉另用紫金錠磨汁塗敷瘡邊三診癰潰流膿身熱漸減以辛涼法兼理氣血可愈銀花連翹元參丹皮生甘草青菊葉犀角解毒丸磨沖四診癰雖愈而胃虛少納不口燥音低氣餒此胃中陰氣受傷也當與清養麥冬北沙參生玉竹生扁豆冬桑葉生甘草臨服入青蔗漿一杯此溫重於濕之療法年已二旬夏月咳嗽時帶血出常發寒熱飲食減身漸瘦口不渴行動時或仆地有日輕有日重牙宣齦腫晨起則血膠厚於齒齦上脈細帶數群以弱證治二地二冬等滋陰藥遍嘗不效此濕溫久郁似乎虛癆也用蘆根滑石杏仁苡仁通草鉤藤白豆蔻囑云服二十帖全愈矣若不滿二十帖後當瘧也其人服十帖已霍然即停藥十月中果發瘧仍服前藥而瘧愈酒客中虛內伏濕溫口鼻又吸穢濁之氣初病頭脹胸痞身痛微汗不解濕溫在膜原內蒸邪從中道斜行兼以鼻受穢濕皆蘊結於氣分治以芳香邪氣得開奈不分氣血偏以消導清熱攻下致邪混血分成癍陷入膻中神昏譫妄內閉臟絡外反肢冷大汗勢已危篤勉以芳透胞絡庶神氣稍清冀其回生至寶丹四顆金汁一杯石菖蒲汁一匙研細和勻重湯溫服次診凡濕溫穢濁填塞內竅神識昏迷脹悶欲絕者須以芳香宣竅深入臟絡以開錮閉之邪前投至寶丹開透法初則神氣稍清繼即閉目不語昏厥如屍病情危篤若此勉以紫雪丹五分微溫開水調服百中圖一而已三診癍疹遍發心胸前後尤多咯出黏涎數口神清厥回惟頭搖發痙火升煩躁病已牽動肝陽陡動肝風必有風火痰涎之滋擾治法雖當清營然必熄其風火蠲其痰涎庶險者平危者安矣若但用滋陰柔肝之法姑息養奸必無澄清之一日質以晉三先生以為何如犀角尖羚角片鮮生地粉丹皮東白薇元參心鮮竹瀝鮮石菖蒲汁金汁二兩萬氏牛黃丸兩顆四診諸證輕減惟熏灼胃脘逆沖為嘔舌絡被熏則赤絳如火消渴便阻猶剩事耳似此猶屬暈厥根萌當加慎靜養為宜凡治此等症必兼熄風消痰方有出路一味滋補中病而不能去病不可不知也與黃連阿膠湯川連阿膠鮮生地生白芍雞子黃川貝滁菊花淡竹瀝童便沖加減調理以善其後此濕溫內陷危症挽救之療法濕遏溫邪內迫經水不應期而至淋淋不斷二便不通唇舌俱白不喜冷飲神呆恍惚言語支離診脈細小欲絕當芒種夏至陽極泄越陰未來復神魂不攝是謂亡陽昏譫最屬危脫之象擬用仲景救逆法以拯其危人參淡附子川桂枝化龍骨煅牡蠣炒蜀漆清炙草南棗次診任陰未固衝陽內擾上則咽燥喉痛下則遺溺帶紅陽雖初回陰氣欲盡難進溫熱之補當以收攝真陰急固根蒂與參麥散合貞元飲人參麥冬北五味熟地炭白歸身清炙草三診夜寐不安心神煩躁睡時譫語盜汗陰陽尚未交合防有厥脫變幻急急鎮固陰氣以冀復元人參辰茯神真阿膠淮小麥化龍骨煅牡蠣四診諸症俱痊惟胃弱微嘔此陽明氣液兩虛也宜養胃以調本人參麥冬生玉竹清炙草南棗生粳米據述產育頻多產後兩年經水至今未來此為病根已屬下元陰虧長夏初患泄瀉必天雨地濕潮霧穢濁氣由口鼻吸受原非發散消攻可去只因體質甚薄致濕濁蔓延充布三焦上則咳痰不飢下則二便澀少非表有風寒故無寒熱見證然氣分壅塞津化濁痰入夜渴飲胃汁消乏求助於水是本虧標實之病夫肺位最高與大腸相表裡清肅不行小便不利矣蘆根苡仁通草茯苓桑葉西瓜翠衣衝入白蔻末再診前議虛不受補皆因夏令伏邪著於氣分夫肺主一身之氣既因氣阻清肅不行諸經不能流暢三焦悉被其蒙前言攻邪不效蓋濕熱由吸而受與風寒感冒不同乃氤氳虛空聚則為殃耳故取淡滲無味氣薄之品僅通其上勿動中下俾虛無傷伏氣可去稍佐辛香非燥也仿闢穢之義經霜桑葉鮮枇杷葉茯苓蔻仁苡仁蘆根此濕溫犯肺之輕症療法又案清王孟英先生治驗黃純光年七十八歲患濕溫至旬余脈形歇代呃忒連朝諸醫望而畏之孟英診曰脈雖歇而弦搏有根是得乎天者厚雖屬高年猶為實象參以病深聲噦原非小故而二便窒澀苔膩而灰似腑氣未宣痰濕熱阻其氣化流行之道也清宣展布尚可圖焉何新之韙其議因以旋覆花淡竹茹焦山梔川楝子枇杷葉光杏仁吳茱萸小川連紫菀蔞仁陳海蜇大地慄等為劑片通草一兩煎湯煮藥投匕即減數服而大吐膠痰連次更衣遂安粥食惟動則嗽逆漸露下虛之象予西洋參龜板牡蠣蓯蓉石斛牛膝冬蟲夏草石英茯苓當歸等藥而各恙遞安繼加砂仁熟地而起翁嘉順之婦弟吳某勞傷之後發熱身黃自以為脫力也孟英察脈軟數是濕溫重證故初起即黃亟與清解大便漸溏小溲甚赤濕熱已得下行其熱即減因家住茅家埠吝惜輿金遽邇輟藥七八日後復熱譫語昏聾抽痙遺溺再懇孟英視之濕熱之邪擾營矣投元參犀角菖蒲連翹竹茹竹葉銀花石膏泄衛清營之法佐牛黃丸紫雪丹而瘳臀皮已塌亟令貼羊皮金不致成瘡而愈又案清周雪樵先生治驗去年七月內人患濕溫初亦不以為意而內人素性不肯服藥僕亦聽之至五六日病情忽重其狀惡寒發熱熱高一百零三度頭痛胸痞渴甚而不能飲數日不食亦不大便苔白膩如粉而厚與以飲食絕不知味口出穢氣數尺外即聞之神思迷糊語無倫次大有垂危之勢僕乃自制化濁湯以厚朴為君佐以藿香黃芩前胡腹皮佩蘭枳殼香豉梔仁等而加玉樞丹以降之一劑後熱竟全退神思亦清但苔膩如故大便不行仍不能進食乃以輕瀉藥通其大便兼以平胃散法調理之至五六日後食始知味又二三日乃能起朱雅南先生之二哲嗣達哉去年秋兄弟夫婦同就學於滬其來也途次感冒復飢飽不節至寓而病濕溫頭暈發熱胸痞作惡吐出痰飲甚多初以滌飲劑治之熱益重至一百零四度許周身癱瘓口出穢氣苔膩如粉神識迷濛其兄甚焦急僕仍用化濁湯治之而重加蘇梗一劑後得大汗甚徹熱竟全退神識亦清但大便已六七日不行穢氣苔色仍如故用前方加減入製大黃三錢下之一劑不知再加大黃二錢又二劑乃得大便穢氣頓已食亦漸進僕曰病已去矣但以飲食善調之自愈不必服藥矣今年四月初同鄉汪太史淵若之次子廉卿年四歲亦病濕溫但尚不能自言其苦屢屢驚厥有一次厥去一點鐘許家人意為死而哭幸復甦數夕不得眠邀僕治之見其色慘白其頭倒其神思倦怠喉間咯咯有聲脈滑數知有痰極多按其腹滿而軟曰數日不食不應有此殆有食積以表候其腋下得一百零二度曰口中之度必零三度許也其汗則黏膩非常泣而無淚渴且嗜飲然臥時覆被不知自去之也知必有表邪又每以手自按其頭知頭必有痛脹等事口中亦有穢氣數武外即可嗅而知之因知亦為化濁湯之症亦以此方與之而改蘇梗為蘇子用玉樞丹四分未服藥之前尚驚厥請推拿者推之始已服藥數分鐘後忽嘔出膠痰兩大堆約一小鐘許黏厚成塊又數點鐘後得大便一次極臭而多其色黑此夕即能安臥明日復診則熱退神清病竟全去以搜捕餘邪法治之曰一劑後可不藥矣次日竟下地行走如常廉按濕熱與濕溫似同實異濕熱者先受濕後化熱其來也漸濕溫者先伏溫後受濕其來也暴濕熱輕而濕溫重初起時最要辨明孰輕孰重如濕重於溫者當以吳氏三仁湯周氏化濁湯二方為主即雪樵君云濕溫之病多在胃腸舌苔滑白厚膩者重用川樸為君口有穢氣者玉樞丹亦要藥其說甚是如溫重於濕者當以加減藿樸夏苓湯清芳透邪湯二方為主濕與溫並重當以新定達原飲枳實梔豉合小陷胸湯加減或藿香佐金湯亦佳此治濕溫初起之方法也其他變症甚多論中方法畢備對症酌用可也今所選之案雖少而大致粗備亦足為後學導夫先路矣又按驗方妙用論中新增百八十四方以上統計五百十一方
