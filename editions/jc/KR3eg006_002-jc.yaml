毒散生石膏五錢至一兩小川連一錢至三錢牛蒡子錢半荊芥穗四分小青皮七分細木通四分丹皮一錢鮮生地五錢至一兩紫花地丁三錢犀角汁三分沖藏紅花四分酒洗生錦紋一錢燈心草一分消毒活血湯老紫草錢半青連翹錢半炒牛蒡一錢木通七分鮮生地錢半淨楂肉一錢酒炒青子芩五分潞黨參五分生棉耆錢半酒炒小川連三分當歸鬚八分苦桔梗六分酒洗赤芍藥五分前胡一錢生甘草三分鮮生薑一片按本方去參名清毒和血湯治毒滯血凝不能行漿如形氣壯實者去參耆治痘不如期灌漿板硬幹黃或灰滯黑暗倍紫草芩連去參耆治毒熾血凝痘暈紅紫或帶乾枯兼有焦黑者均效三妙血白雄雞冠血豬尾血蚯蚓血各一匙陳酒一鍾沖服按雞冠血性溫提漿升表治上豬尾血性動活血入里治下二血有上下表里之分鮮地龍血性涼活血善通經絡能引諸藥直破惡毒所聚之處治痘五六朝根赤轉紫而頂有孔如針刺如嵌頂必身熱苔黃口渴便秘蓋毒火盛而蔽其氣瘀其血漿必不化宜此方合解毒藥如加減普濟消毒飲周氏五味消毒飲之類若痘根色紫甚至轉黑而頂下陷者為毒陷宜三妙血合紫雪等藥加金汁如身熱便秘頂嵌根紫或發水泡而間有半漿者將無漿之泡挑去用此方入流氣敗毒之藥如銀花敗毒散人參敗毒散之類周氏五味消毒飲補鮮杜銀花三錢鮮野菊花錢半鮮蒲公英錢半紫花地丁二錢紫貝天葵錢半參歸鹿茸湯吉林參三錢白歸身一錢炙棉耆二錢炙甘五分鹿茸血片三分龍眼肉三朵鮮生薑一片上藥煎成沖陳酒一杯倦食手足厥冷加廣木香八分公丁香安邊桂各三分寒戰咬牙加安邊桂二分厚附塊三分酒炒白芍七分煨訶子煨肉果各二分按聶久吾制此方大能補氣暖血專治痘色淡白氣血虛縮不能成膿並灰陷白陷溫服一二劑立刻起漿奏功之捷莫過於此若嫌鹿茸血片價昂代以鹿角尖一錢亦可如有鹿茸酒更妙附制鹿茸酒法邱柳樊曰用二三寸真茄茸一兩以酒入瓦瓶煮令皮脫取出將酒濾過其茸之真膏俱在此酒內再將瓦瓶注酒煮令皮爛逐漸添酒看皮爛時以布濾過其皮揉爛化在酒內其毛去之又將茸內骨酥炙焦為末將前膏酒皮酒總和一處候用此制茸酒妙法人多不知一概炙之其真膏悉去無效矣費氏清解散荊芥防風川芎連翹木通炒牛蒡各七分生葛根山楂各八分桔梗六分前胡一錢老紫草青子芩升麻各五分川連二分甘草三分蟬蛻十二隻生薑兩片水煎溫服費氏蘇解散荊芥防風川芎細木通蘇葉白芷各七分生葛根山楂各八分桔梗六分前胡一錢老紫草連翹心升麻炒牛蒡羌活各五分甘草二分蟬蛻十二隻生薑三片水煎溫服按張遜玉種痘新書云上二方為初熱見點之要藥痘出齊後莫用椒梅丸炒川椒三錢烏梅炭炒川連各一錢為末飴糖丸如黍米大量兒大小分二三服服後須臾得入蟲口治痘為蟲悶不得發出最效次與紫草承氣湯下之飛馬金丹補巴豆霜廣木香賴橘紅各三錢五靈脂廣鬱金生打上雄黃制錦紋各一兩飛辰砂五錢明乳香淨沒藥山慈菇百草霜各二錢各秤另研淨末分兩再合研一時許令勻米醋法丸金箔為衣如綠豆大隔紙曬乾緊貯瓷器置高燥處二十歲以上者每服十二丸稟強者加三丸老幼隨減三兩歲者七丸或五丸七八十歲者九丸溫開水送下半日或一二時許非吐必瀉孕婦遇急症七丸為度按溫熱伏邪及病霍亂痧脹者臨時每多夾水夾食夾飲蓄血之故與邪互並結於胸脅如食結胸水結胸血結胸每因伏邪與夾邪互結痛不可按或時昏冒因雖不同而其結痛拒按閉塞不容喘息之狀則同若不細察詳問鮮不認為本病應得之候不先行探吐去之則所受之邪為其羈留伏匿不得透達必致夭殤宜即與飛馬金丹一服自能隨所結之上下而施其吐下之功得夾邪一解正氣自伸按法調治本症為較易耳故此丹治水食痰血寒熱諸邪結於胸膈高突痛脹不可抑按不得呼吸欲吐不得吐欲瀉不得瀉者凡外感內傷飛屍猝中暴厥自經跌壓諸症見有此狀者無論大小均可服之枳實導滯湯小枳實錢半制川樸一錢酒洗生錦紋八分仙露夏錢半淨楂肉三錢青連翹錢半川連四分海南子錢半老紫草三錢細木通八分炙草五分按孫際康曰此等症昧者最多以急於治痘而忽於裡滯不知胃主肌肉胃不宣化肌肉無自而鬆即極力涼解反成冰伏此方開者開降者降不升發而自升發矣故治有形之物與無形之毒留滯於中令氣血不能流通者極效參耆茸升湯別直參五錢炙棉耆一兩鹿茸片三分升麻一錢煎成沖陳酒一杯按痘之生死判於漿之有無有漿毒從外散故生無漿毒留內攻故死至其膿漿之不成其病有二一毒氣熾盛則血燥而枯一元氣虛弱則血寒而縮俱不能運化而成膿膿不成則漿不行而五陷之症作矣如痘稠密暈紅紫而頂陷下紫陷也甚則暈腳乾枯中有黑臍而成黑陷此毒熱熾盛蔽其氣凝其血而陷也宜急以聶氏清毒活血湯伍氏涼血解毒湯二方為主然當其紫陷時不過一二劑痘立起及至黑陷則受毒已深雖用此等大劑亦不過十救一二又如痘出稠密色淡白根無紅暈而頂陷者白陷也甚則遲一二日轉為灰陷此血氣虛寒不能運化毒氣以成漿故陷也宜乘白陷之時大補氣血急以聶氏參歸鹿茸湯張氏參耆茸升湯為主連進一二劑猶可望生又有一種痘顆粒通紅成血泡而不成漿此氣虛不能統血血反上居氣位治宜參耆保元湯大補其氣氣充則毒化而成漿血泡失治則氣愈虛而為血陷治法亦不外此二方以上五陷之症辨明則初起泛漿長漿催漿足漿之法可類推矣導赤瀉心湯補治熱陷心經神昏及胃熱蒸腦撮空見鬼小川連一錢青子芩錢半生山梔錢半知母錢半西洋參一錢辰茯神二錢益元散三錢麥冬一錢先用犀角八分燈心七分煎湯代水加減服蠻煎補治溫熱病舌絳神昏最效鮮生地五錢鮮金釵二錢原麥冬一錢知母二錢粉丹皮二錢辰茯神二錢細木通一錢廣皮一錢鮮石菖蒲葉一錢搓熱沖犀角汁一瓢西黃一分沖來復丹補治上盛下虛暑濕入絡肢厥神迷便瀉溺澀極效玄精石倭硫黃牙硝各一兩賴橘紅小青皮五靈脂各二錢醋糊丸每服二錢或三十丸空心醋湯下善能交通陰陽參茸養陽湯增治遺精足痿氣促自汗如嫌茸價太貴易鹿角膠一錢大山參一錢鹿茸片二分甘杞子三錢歸身二錢小茴香五分生雄羊內腎一對鹽水炒胡桃肉一枚按此方柔劑養陽填精血補督任非桂附剛燥氣烈劫陰者比驗方妙用溫熱病首用辛涼以解次用苦寒以清裡終用甘寒以救液此治溫熱本症初中末之三法也然有兼症夾症復症遺症及婦人小兒種種之不同不得不多備方法以施治庶免醫家道少之患茲特分列八法詳言以發明之發表法凡能發汗發㾦發疹發斑發丹發痧發瘄發痘等方皆謂之發表法溫熱病首貴透解其伏邪而伏邪初發必有著落方著落在皮肉肌腠時非發表則邪無出路故發表法為治溫熱病之一大法也其大要不專在乎發汗而在乎開其鬱閉宣其氣血鬱閉在表辛涼芳淡以發之鬱閉在半表半裡苦辛和解以發之陽亢者飲水以濟其液陰虛者生津以潤其燥氣滯者宣其氣機血凝者通其絡瘀庶幾有㾦者則發㾦有疹斑者則發疹斑有瘄者則發瘄有痘者則發痘必察其表無一毫阻滯始為發表法之完善此溫熱病發表之法大不同於風寒也謹述發表驗方臚列於下一溫熱發汗雖宜辛涼開達而初起欲其發越必須注重辛散佐以輕清庶免涼遏之弊方伏邪傳變出表時輕者亦可得表藥而汗散重者雖大劑麻葛羌防亦無汗但須清其絡熱宣其氣機以治溫熱或開其濕鬱達其募原以治濕溫必待伏邪盡發表裡全徹然後或戰汗或狂汗而解亦有不用表藥而自汗淋漓邪終不解者蓋自汗緣裡熱鬱蒸而出乃邪汗非正汗也仍宜開達其伏邪為要風溫風熱如邵氏熱鬱湯邵步青四時病機方梔豉芩葛湯陸久芝不謝方之類濕溫濕熱如連樸飲王孟英霍亂論方新定達原飲樊開周先師驗方之類隨症酌用可也至其發汗諸方辛涼輕劑如蔥豉加葛根湯王燾外臺方葛根蔥白湯和劑局方劉氏桔梗湯河間六書方加味梔豉湯樊先師驗方之類辛涼重劑如麻杏石甘湯張仲景傷寒論方千金清肺湯千金葳蕤湯孫思邈千金方葛根橘皮湯外臺方知母解肌湯知母乾葛湯朱肱活人書方荷杏石甘湯葉天士醫案方加減三黃石膏湯顧松園醫鏡方增損三黃石膏湯楊玉衡寒溫條辨方蔥豉白虎湯趙晴初醫案方之類此皆辛以散風涼以泄熱為治溫熱內發風寒外搏之要方其間有風寒搏束過甚而溫熱伏邪不能外達者則蔥豉加葛根麻黃湯外臺方蘇羌飲劉草窗廣嗣全書方之類亦可暫用以疏散亦有風寒遏伏太甚而濕熱伏邪不克外潰者則藿香正氣散和劑局方九味羌活湯張潔古方之類正可暫用以開達初不必嫌其辛溫化燥也其芳淡輕劑如蔥豉湯調天水散河間六書方茵陳五苓散金匱要略方藿樸夏苓湯石芾楠醫原方藿樸二陳湯樊師驗方之類芳淡重劑如六神通解散局方茵陳胃苓湯萬密齋幼科發揮方加味五苓散加味二陳湯石氏醫原方之類此皆芳香闢穢辛淡化濕為治濕溫濕熱濕重挾穢之初方若濕開熱透熱重於濕者則宜苦辛開泄治在上中二焦不在發表之例外此又有不求汗而自汗解者四如裡熱閉甚用三黃瀉心湯傷寒論方許氏大黃湯外臺方大柴胡合大承氣湯河間六書方之類以疏通其里結一不已而再再不已而三直待里邪逐盡表裡通徹多有戰汗而解者此其一又如裡熱燥甚病者思得涼水久而不得忽得痛飲飲盞落枕而汗大出即解者此其二又如平素氣虛屢用汗藥而不得汗後加人參於解表藥中如參蘇飲人參敗毒散局方之類覆杯即汗者此其三又如陰虛及奪血液枯之人用純表藥全然無汗後用潤燥生津藥於輕解方中如七味蔥白湯外臺方加減葳蕤湯一名加減蔥豉湯張氏醫通方之類而汗出如水者此其四謹摘諸汗症列下發熱惡寒無汗頭項痛背痛肩背痛腰痛膝脛痛周身肢節痛二溫熱發㾦每見於夏秋濕溫伏暑之症春冬風溫兼濕症亦間有之初由濕鬱皮腠汗出不徹之故白如水晶色者多但當輕宣肺氣開泄衛分如五葉蘆根湯薛生白濕熱條辨方最穩而靈若久延而傷及氣液白如枯骨樣者多凶急用甘潤藥以滋氣液如麥門冬湯金匱要略方清燥救肺湯喻嘉言新方之類挽回萬一切忌苦燥溫升耗氣液而速其斃謹摘發㾦症如下色白點細形如肌粟摸之觸手而微癢抓破微有水狀如水晶珠而明潤者吉熱勢壯則外見熱勢緩則隱伏出無定期甚至連發三五次若干白如枯骨色者大凶脈必微弱或細數神倦氣怯黏汗自出三溫熱發疹紅點高起與瘄痧一類系孫絡中血熱之病惟瘄多發於小兒痧疹不拘男婦大小皆有每見於春夏之間發於風溫風熱者十之七八溫毒暑熱者十之二三然亦必夾癍帶疹疹雖宜見而不宜多見身熱二三日而發者輕四五日而發者重癍疹雜出者尤重治雖宜疏風散熱為先亦當辨其風與熱孰輕孰重風重而熱鬱者辛散佐以清透防風解毒湯王晉三古方選注方最當熱重而風輕者清透佐以辛散加減銀翹散石氏醫原方加減普濟消毒飲吳鞠通溫病條辨方二方為妙若溫毒夾癍帶疹色赤如丹甚或紫紅胃經血熱上蒸心包也急宜繆氏竹葉石膏湯古方選注方甚則犀角大青湯邵步青溫病論方肅清胃熱涼透血絡使癍疹發透則溫毒自解若因循失治則血熱之毒逆傳心包肝絡而變神昏痙厥之危證矣此時急救之法惟有用拔萃犀角地黃湯溫毒論方或犀連承氣湯呂震傷寒尋源方涼血攻毒急下存陰而已謹摘發疹證列下風溫發疹之候瑣碎小粒高出於膚怕風咳嗽咽阻喉痛胸悶心煩或氣喘壯熱無汗溫毒發疹之候舌絳如朱夾癍帶疹疹色紫紅或深紅緊束有根環口燥裂大渴引飲心神煩躁便秘溺澀四溫熱發癍或布於胸腹或現於四肢平而成片與丹一類發於溫毒病最多其次大熱病亦恆見之系經絡血熱之毒竄入肌表而外越經血熱則色紅熱毒重則色深紅熱毒尤重則色嬌紅豔如胭脂統名紅癍絡血熱則色紫名曰紫癍絡血熱而毒瘀則色黑名曰黑癍甚則色青如藍名曰藍癍更有云頭隱隱伏而不現於皮膚者曰伏癍內發於腸胃咽膈之間肌膚間不得而見者曰內癍至若隱隱而微胸腹略見數點而色淡紅者曰陰癍甚或淡紅似白者曰白癍統名虛癍多發於濕熱大病後涼瀉太過經脈血涸元氣虛寒之候故凡見斑首要辨明其形色如斑一出鬆浮灑於皮面起發稀朗紅如朱點紙黑如墨塗膚此毒之松活外現者雖紫黑成片可生若形干而滯或枯而晦稠密成片緊束有根如履透針如矢貫的此毒之有根錮結者縱不紫黑青亦死凡斑皆胃家血熱色紅而鮮潤者順色紫而晦滯者凶紫黑藍而枯晦者死以其胃爛也故紅斑九生一死紫斑五死五生黑斑九死一生若雜藍斑黑爛者必死治法紅斑主涼血透熱輕劑如五味解毒飲加紫草連翹周澹然溫證指歸方犀地桑丹湯吳坤安感症寶筏方之類重劑如加味犀羚白虎湯樊師驗方加減犀羚二鮮湯廉臣驗方之類紫斑主涼血解毒如犀角大青湯邵氏溫毒病論方小劑清瘟敗毒飲余師愚疫疹一得方增損雙解散楊玉衡寒溫條辨方之類黑斑藍斑主涼血攻毒如拔萃犀角地黃湯加金汁元明粉溫毒病論方十全苦寒救補湯梁玉瑜舌鑑辨症方加味涼膈散增損三黃石膏湯加錦紋寒溫條辨方之類伏斑內斑主宣氣涼血解毒透癍如元參升麻合黑膏王肯堂證治類方犀角大青湯加紫草皂角刺甚則清瘟敗毒飲加紫草升麻紫雪之類陰斑白斑主溫補血氣如復脈湯傷寒論方人參養榮湯證治類方之類甚則主扶陽暖血如參附養榮湯吳又可溫疫論方歸耆建中湯葉氏醫案方之類總之凡見發斑不可專以癍治須察脈之浮沉病之虛實而分別用藥可也謹摘發斑症如下溫毒及大熱病發汗不出或雖汗不解發癍輕重之候面紅目赤汗出津津口燥大渴熱盛胸悶發癍純紅深紅胭脂紅不等若唇口焦燥舌紫或黃胸膈煩悶嘔惡不納熱壯神昏便秘溺赤遍體紫癍者重若神昏譫語或不語如屍厥口開吹氣臭穢噴人或咯血鼻衄足冷耳聾舌苔焦黑起瓣或見黑暈遍體黑癍或藍癍如翠者死伏癍之候表無大熱脈似沉緩神識不清或鄭聲作笑舌甚灰黑或黃苔而中心黑暈內癍之候口燥目赤手足指冷煩躁氣急不欲見火惡聞人聲耳熱面赤或寒噤噴嚏昏不知人譫語帶笑六脈似躁非躁舌紫苔黃或黃膩帶灰癍點隱隱而微色現淡紅甚或㿠白手足逆冷似寐非寐神識乍清乍昧舌苔淡紅或紫舌形胖嫩圓大或舌苔白滑或黑苔胖滑以上虛癍之候五溫熱發丹多見於小兒俗名赤遊丹是也與紅癍一類丹與癍皆出於膚平而成片皆裡熱血毒之症治法惟大劑涼血解毒乃克勝任參用發癍諸方可也至辨法凡有丹癍痧疹者脘必悶四者之齊與不齊以脘悶之解與未解為辨且熱必壯四者之解與不解以汗出之透與未透為辨六溫熱發痧由於風溫者則為時痧亦名風痧俗稱紅斑痧病雖傳染而症輕由於溫毒者則為疫痧亦名喉痧俗稱爛喉痧病多傳染而症重風痧初起必須疏達如荊防敗毒散雷少逸時病論方連翹敗毒散傷寒指掌方二方均加青松針一兩煎湯代水投無不效即或宜兼清散總以散字為重防風解毒湯加青松針最效切忌驟用寒涼喉痧初起自須輕散解毒如加減普濟消毒飲溫病條辨方代賑普濟散鞠通醫案方二方最當迨表分之痧毒發透內蘊之伏火方張勢輕者清化如陳氏清肺飲奪命飲犀羚二鮮湯陳繼宣疫痧草方三方酌用勢重者寒瀉如陳氏四虎飲疫痧草方拔萃犀角地黃湯加金汁元明粉溫毒病論方二方酌用方能瀉火泄熱熱一盡而病自愈若仍執辛散之方則火得風而愈熾炎勢燎原殺人最暴謹摘發痧症列下風痧之候頭痛怕風身熱惡寒痧現無汗一身筋骨大痛咽阻喉痛而不腐胸痞心煩舌苔白膩喉痧初中末之候始惡寒後但壯熱煩渴痧密肌紅宛如錦紋咽喉疼腫或但痛不腫不紅甚則白腐喉爛胸痞咽阻不能食挾濕則舌苔滑膩或渴甚而苔仍白滑或黃滑而膩或黃燥內陷則舌赤或鮮絳神昏譫語灼熱無汗痧隱成片或厥或痙口穢噴人音啞氣急鼻煽呃逆者凶七溫熱發瘄與痧一類吳地曰痧子浙江曰瘄子恆發於小兒年長亦間有之由風溫而發者則為常瘄宜散風解熱為先加味翹荷湯防風解毒湯二方最良使瘄毒發透即愈由溫毒而發者則為時瘄與治溫毒發疹發痧例同從痧疹中對症選方可也惟悶瘄一症最險宜急急開肺透瘄清熱解毒如新加麻杏石甘湯感症寶筏方千金葦莖合陳氏清肺飲加瓜霜紫雪疫痧草方速使瘄毒外達方有生機氣液兩虧者陳氏清肺飲合黑膏加西洋參毛燕清補而提透之謹述發瘄症列下順症之候身熱煩悶咳嗽鼻塞面目有水紅光咽痛氣急指尖時冷瘄出周身勻朗色鮮潤形高突顆粒分明一二日見點者輕三五日見點者稍重既出後一日三潮潮則熱盛煩躁逾時方退三日九潮瘄已齊透然後徐徐回退逆險之候瘄發易隱易回熱壯無汗喘咳胸悶咽痛喉啞齒燥齦爛神昏欲寐或兼腹脹赤痢甚或瘄雖外達豔紅紫滯目封眥赤狂躁悶亂便秘腹痛或便泄無度者凶更或見點細碎平塌瘄色灰滯淡白模糊一片既出不潮忽然隱默喘急昏悶者死八溫熱發痘因風溫而發者多順症因溫毒而發者多逆症險症其病多發於小兒壯年亦偶有之順症多不必用藥即有必須用藥者亦必先觀形察色辨別其氣血虛實為首要如體肥白而嫩聲音微細目少精神痘形多凹而色淡紅者氣弱血虛也宜急急補托以催其起脹灌漿如補中益氣湯重用歸耆李東垣內傷辨惑論方加白雄雞冠血最良其次參蘇飲加生耆川芎龍眼肉亦可酌用必察其漿充痘起庶易於結痂收功又如體蒼瘦而堅實聲音粗壯目有精彩痘有斑暈而色紫黑者氣實血滯也宜宣氣活血解肌透毒為先如荊防敗毒散雷少逸時病論方重用大黑豆杜赤小豆綠豆各一兩名稀痘三豆湯越人扁鵲方煎湯代水最效或聶氏清解散聶久吾痘門方旨方亦佳迨痘已發齊膿漿灌足自宜活血清毒如聶氏清毒活血湯痘門方旨方伍氏涼血解毒湯葉天士幼科要略方二方酌用可也若逆症多陷紫陷以清毒活血湯重加犀角豬尾血為主黑陷以費氏必勝湯費建中救偏瑣言方加瓜霜紫雪丹為主險症多悶痘症紫悶最急症多毒盛火閉首用瓜霜紫雪丹錢許大劑芳透繼用局方妙香丸三五粒峻劑開達次用費氏必勝湯大劑清涼攻毒外以針刺少商曲池委中三穴以泄血毒庶可十救一二但悶多夾症夾食為食閉夾痰為痰閉夾瘀為血閉因夾而閉因閉而悶者甚多急進飛馬金丹沈樾亭驗方傳信方使上吐下瀉開通氣道血路得夾邪一解然後察其病勢之輕重對症發藥勢輕者但須活血解毒如聶氏清毒活血湯伍氏涼血解毒湯小劑清瘟敗毒飲之類勢重者必須涼血攻毒如清涼攻毒散王晉三古方選注方費氏必勝湯清火解毒湯救偏瑣言方之類惟溫毒挾蟲而悶者宜先與椒梅丸誘入蟲口繼以紫草承氣湯張氏醫通方下之更有真元大虛而悶者宜急以參歸鹿茸湯痘門方旨方參耆茸升湯張氏醫通方二方挽救之然溫熱病中百不一見若悶而緩者名曰輕性悶痘火毒內壅聶氏清解散涼透之風冷外束聶氏蘇解散疏達之謹述發痘症列下順症之候一二日初出如粟痘色淡紅而潤口鼻年壽間先發兩三點二三日根窠圓混長髮飽滿四五日大圓光澤大小不一五六日紅活鮮明六七日光潔飽滿七八日神全色潤八九日漿足根化而無他症十一二日漿足而斂十三四日漿老結痂十四五日痂落瘢明逆險症之候鼻煤衄血咽痛聲啞煩躁癲狂弄舌黑刺唇裂肌燥目胞紅腫消渴飲冷口穢噴人淚熱出血暴瀉如注溺膏溲血痘則灑墨塗朱迸裂泡湧紫陷黑陷之候痘稠密暈紅紫頂陷下甚則暈腳乾枯中有黑臍而陷氣粗身熱神昏躁亂甚或血厥如屍悶亂搐搦輕性悶痘之候身熱三日痘欲出不出痘影紅紫聲亮氣粗手足心熱驚搐煩躁或聲重鼻塞流涕重性悶痘毒盛火閉之候一發熱即報點如丹身熱如烙痘漸乾焦紫黑煩躁悶亂唇焦口臭或唇口腫滿悶痘夾食之候初發時便大熱神昏腹痛譫語舌刺如芒氣粗便閉狂叫悶亂悶痘夾痰之候發熱時便頭項不舉痰嗽氣急目閉神昏眩暈顛仆悶亂搐搦悶痘夾瘀之候一發熱見點即譫語神昏喘脹衄血煩悶躁擾胸痹作痛舌色紫暗悶痘夾蟲之候一發熱即煩悶嘔吐舌下常流清水或時沉默喜唾或時躁擾不寧或腹痛狐疑或頻頻叫喊舌下筋青或下唇有黑白細點重性悶痘真元虧極之候身熱二三日痘欲出未出一見點細白如㾦身無大熱氣怯無力目閉無神面唇反鮮澤嬌豔光彩倍常攻裡法凡能降氣蠲痰導滯逐水通瘀退黃下脹追蟲等方皆謂之攻裡法攻裡法者解其在裡之結邪也結邪為病所關甚大病之為痞為滿為喘為腫為悶為閉為痛為脹直無一不涉於結如內經所云結陰者便血結陽者腫一陰一陽結謂之喉痹二陽結謂之消三陽結謂之膈與夫傷寒論中小結胸在心下按之則痛大結胸心下痛按之石硬心中結痛心下支結少腹急結熱結在裡熱結膀胱熱入血室其血必結及食結胸水結胸血結胸寒實結胸熱實結胸者不一而足故里病總以解結為治結一解而病無不去豈但大便閉結大腸膠閉協熱下利熱結旁流四者之邪結在裡而必須攻以解結哉試述攻裡之方歷陳如下溫熱結邪總屬伏火自宜以苦寒瀉火為正治三黃瀉心湯傷寒論方為主許氏大黃湯外臺方尤效但必辨其為毒火宜急下如紫草承氣湯清涼攻毒散古方選注方費氏必勝湯清火解毒湯救偏瑣言方陳氏四虎飲疫痧草十全苦寒救補湯舌鑑辨正方拔萃犀角地黃湯加金汁元明粉溫毒病論方之類對症酌用風火宜疏下如局方涼膈散加味涼膈散寒溫條辨方清心湯丹溪心法方之類濕火宜緩下如茵陳蒿湯金匱方加味小陷胸湯醫原方小陷胸湯合樸黃丸程國彭醫學心悟方三黃枳朮丸東垣脾胃論方神芎導水丸之類燥火宜潤下如千金生地黃湯孫思邈千金要方養榮承氣湯吳又可溫疫論方當歸承氣湯四順飲子河間六書方東垣潤腸丸五仁丸尤在涇金匱翼方雪羹加味煎樊師驗方之類痰火宜降下如小陷胸合加減半夏瀉心湯醫原方承氣陷胸湯溫病條辨方漏蘆橘皮湯外臺方牛黃散河間六書方加雪羹古方選注方加味皂角丸金匱翼方涼膈散加葶藶子甘遂白芥子薑汁竹瀝醫通方之類食積化火宜清下如枳實導滯湯聶氏驗方枳實導滯丸脾胃論方樸黃丸醫學心悟方陸氏潤字丸陸養愚三世醫驗方之類瘀血化火宜通下如桃仁承氣湯下瘀血湯張仲景方加味大柴胡湯葉天士溫病論方吳氏桃仁承氣湯溫疫論方代抵當丸寒溫條辨方無極丸李時珍本草綱目方回生至寶丹華氏婦科驗方桃仁承氣合逍遙散加味之類水火互結宜導下如大陷胸湯傷寒論方控涎丹和劑局方之類水火互結而又夾蟲者宜導下兼殺蟲如加味控涎丹丹波廉夫觀聚方要補方雄黃解毒丸喉科秘旨方之類此外體虛及久病或屢汗屢清下下症雖具而不任峻攻如氣虛失下者宜潤下兼補氣如黃耆湯金匱翼方補中益氣湯加元明粉白蜜高鼓峰己任編方之類血虛失下者宜潤下兼益血如玉燭散金鑑婦科心法方益血潤腸丸金匱翼方之類氣血兩虧而又不得不下者宜氣血雙補兼以攻下邪正合治陶氏黃龍湯溫疫論方主之三一承氣湯加人參醫通方亦主之陽虛失下者宜溫潤法以代下蓯蓉潤腸丸金匱翼方最當半硫丸和劑局方亦可暫用陰虛失下者宜滋潤法以代下蓯蜜地黃湯驗方新編方最穩千金生地黃煎千金要方亦效次必辨其三焦部位結邪在胸中及肺法宜肺腸合治急降其氣以下之如枇杷葉飲子外臺方重加栝蔞皮三錢暢肺寬胸川貝母八錢至一兩解結降氣投無不效其次蘇子降氣加枳杏湯重則六磨飲子金匱翼方葉氏菀杏湯紫菀八錢光杏仁三錢栝蔞仁五錢廣鬱金三錢小枳實錢半苦桔梗一錢之類效亦甚捷結邪在胸中及心法宜心胃並治涼通其血以下之如千金生地黃湯千金清心湯拔萃犀角地黃湯溫毒病論方犀連承氣湯傷寒尋源方或加紫雪或加牛黃丸之類結邪在胸膈宜開胸膈以下之輕則加味小陷胸湯重則承氣陷胸湯結邪在胸脅連及右脅肝膽者宜達其膜以下之如大柴胡湯傷寒論方大柴胡合三一承氣湯河間六書方千金瀉肝湯千金要方之類或通其絡以下之如四順飲子又可桃仁承氣湯費氏清火解毒湯之類結邪在胸脘連及左脅脾部者宜疏其氣以下之如千金清脾飲枳實導滯丸三黃枳朮丸之類結邪在臍上胃脘者宜和其中以下之如調胃承氣湯傷寒論方三一承氣湯河間六書方之類結邪在當臍及臍下小腸者宜寬其腸以下之如小承氣湯傷寒論方小承氣湯加黃連感症寶筏方之類結邪在胸膈大腹三焦俱結痞滿燥實堅悉具者宜急攻三焦以下之如大承氣湯傷寒論方陷胸承氣湯陳氏四虎飲十全苦寒救補湯之類結邪在小腹連及兩腰腎部者宜急清其腎以下之如千金清腎湯梔豉加鼠矢大黃湯千金要方加味八正散河間六書方之類此皆攻裡諸方法之大要也外治如蜜煎導法豬膽導法灌腸法亦足補助湯飲丸散之不逮至其攻裡法之輕重緩急總以見症為主詳列如下溫熱症急下之候發熱汗多鼻如煙煤舌乾舌卷舌短舌黑焦燥舌生芒刺齒燥牙宣胸腹滿痛譫語發狂甚或昏厥身冷呃逆大便秘結小便短澀甚或不通手足發痙溫熱症當下之候頭脹痛煩躁譫語多言善忘舌黃苔燥協熱下利或熱結旁流小便短赤溫熱症緩下之候潮熱口渴齒燥腋下汗胸腹熱盛舌黃苔糙大腸膠閉矢氣臭小便黃赤以上諸症緩下者不下則必漸重而為當下症當下者緩下則必加重而為急下症急下者失下則雖下之多不通而結熱自下逆上脹滿直至心下上透膈膜至胸滿如石咽喉鋸響目直視反白或睛盲瞳散耳聾九竅不通雖有神丹亦莫能救矣溫熱症風火內盛之候大熱無汗目赤頭眩面紅唇焦口瘡唇裂舌苔黃燥大小便秘甚則鼻衄吐血手足發痙發癍發狂神昏譫語溫熱症燥火熏肺之候咳逆無痰即有痰亦黏而難出鼻孔干甚或咽痛喉啞耳鳴如聾胸膈煩悶溫熱症痰火壅肺之候即涼膈散加味症痰多咳嗽喉有水雞聲鼻孔扇脹氣出入多熱胸膈痞滿喘脹悶亂舌苔芒刺便秘甚或胸腹堅如鐵石脹悶而死濕火挾食蘊結胃腸之候發熱自汗胸痞腹滿按之灼手大腸膠閉矢氣極臭或下黃黑稠黏少而不爽小便黃赤短澀舌苔黃膩而糙毒火內灼上中下三焦之候面目俱赤渴喜涼飲胸腹熱甚堅滿拒按大便閉結小便赤澀神昏肢厥甚則通體皆厥舌苔老黃或焦黑起芒刺或焦苔黑瓣底口開吹氣穢濁噴人甚或渾身發臭昏厥如屍舌卷囊縮或口噤齒齘手足攣急臥不著席溫熱症水火互結之候即蓄水夾結糞症口乾不渴從心下至小腹硬滿而痛不可按揉之漉漉有聲胸腹熱盛但頭汗出肌表微熱大便熱結旁流少而不暢或協熱下利雖利而重滯難出小便不利甚或癃閉舌苔黃膩而厚溫熱症蓄血化火之候口乾舌燥漱水不欲咽胸中痹痛少腹硬滿甚或脹疼身體重滯腹背拘束不遂發躁如狂譫語善忘小便自利糞雖硬大便反易而色黑或大便但下血水見糞者生不見者死舌色紫暗而潤總按以上溫熱里症以夾痰雜食為最多蓄水蓄血次之以毒火燥火為最急而險風火次之濕火又次之和解法凡屬表裡雙解溫涼並用苦辛分消補瀉兼施平其復遺調其氣血等方皆謂之和解法和法者雙方並治分解其兼症夾症之複方及調理復症遺症之小方緩方也溫熱伏邪初起自內外出每多因新感風寒暑濕而發惟溫病之發因風寒者居多熱病之發兼暑濕者為甚兼風兼暑其性陽其氣輕揚伏邪反因而易潰兼寒兼濕其性陰其氣抑遏伏邪每滯而難達故一宜表裡雙解一宜溫涼並用其病每多夾並而傳變如夾食夾痰夾水夾瘀之類與伏邪互並結於胸脅脘腹之膜絡中致伏邪因之鬱結不得透發不透發安能外解凡用雙解法不效即當察其所夾為何物而於雙解法中加入消食消痰消水消瘀等藥效始能捷病始能去故治宜苦辛分消更有氣血兩虛陰陽並虧如吳又可所謂四損四不足者復受溫熱伏邪往往有正氣內潰而邪入愈深者亦有陰氣先傷而陽氣獨發者內經所云病溫虛甚死即此類也故治宜補瀉兼施且有病人不講衛生病家不知看護每見勞復食復自復怒復者亦有餘邪未淨或由失於調理或由故犯禁忌而見遺症迭出者故治宜平其復遺調其氣血為溫熱病中期末期之善後要法凡此和解之法雖名為和實寓有汗下溫清消化補益之意此皆和解法之精微神妙變化無窮者也試歷述其方略一表裡雙解約法有三一為解肌清裡如白虎加桂枝湯傷寒論方知母解肌湯葛根橘皮湯三黃石膏湯外臺方石膏大青湯千金方加減三黃石膏湯顧氏醫鏡方增損三黃石膏湯寒溫條辨方新加麻杏石甘湯感症寶筏方梔豉芩葛湯陸氏不謝方之類一為發汗利溺如六神通解散局方涼膈去硝黃合天水散六一蔥豉湯河間六書方五葉蘆根湯濕熱條辨方燃照湯王氏霍亂論方藿樸夏苓湯醫原方新定達原飲樊氏驗方之類一為發表攻裡如刪繁香豉湯許氏大黃湯備急黑奴丸外臺方涼膈散局方防風通聖散雙解散劉河間方加減防風通聖散顧氏醫鏡方增損雙解散加味涼膈散寒溫條辨方之類輕重不一緩急攸殊臨時對症酌用可也以余所驗凡治溫熱病初起不問兼風兼寒脈浮脈緊惡風惡寒而外熱勢盛法當偏重於表者通用雙解散加蔥豉或涼膈散去硝黃加蔥豉以和解內外之熱邪使表裡齊解奏功最捷若汗後不惡寒但惡熱自汗譫語不大便咽乾腹滿而內熱勢盛法當偏重於里者急用許氏大黃湯下而和解之或用局方涼膈散加味涼膈散大劑以退其熱毋使熱盛危劇亦妙汗下後餘熱未盡煩不得眠口乾渴而身微熱者小品茅根湯外臺方合益元散清利以和解之甚則用加味導赤散王孟英方其功尤捷二溫涼並用之謂和者以寒非溫不散濕非溫不化而熱則非涼不清火則非涼不瀉也古今名醫如宋和劑局方主用六神通解散金劉河間主用防風通聖散前清張路玉主用涼膈合天水散尤在涇主用大黃飲子其方皆發表攻裡宣上導下氣血兼顧面面周到使風寒濕熱從表裡三焦一齊通解誠為和解之捷法然此惟體實證實雜感風寒暑濕者適宜若但病濕溫濕熱當從三焦分治上焦宜芳淡開泄如五葉蘆根湯加味二陳湯加味五苓散藿樸二陳湯藿樸夏苓湯之類中焦宜苦降辛通如枳實梔豉湯白虎加蒼朮湯仲景傷寒論方黃連溫膽湯觀聚方要補方藿香左金湯連樸飲霍亂論方之類下焦宜苦寒淡滲如茵陳五苓散金匱要略方龍膽瀉肝湯局方加味八珍散劉河間方清熱滲濕湯醫門法律方宣清導濁湯葉天士醫案方之類惟素稟陰虛而挾濕熱者膏粱輩每多患此治法與尋常濕熱迥殊若用風藥勝濕虛火易於僭上淡滲利水陰津易於脫亡專於燥濕必致真陰耗竭純用滋陰反助痰濕上壅務使潤燥合宜剛柔協濟輕清和解始克漸漸奏功如元米煎用炒香江西術錢半第二次米泔水泡術約六句鍾去朮煎飲薛生白方參麥冬瓜湯北沙參五錢原麥冬錢半黃草川斛三錢炒香枇杷葉三錢鮮冬瓜皮子各一兩煎湯代水加味導赤散王孟英方加減甘露飲之類養陰逐濕兩擅其長樊師喜用童便四草湯鮮茅草根鮮車前草各一兩鮮三白草三錢鮮荸薺草二錢瑩白童便一杯廣鬱金磨汁四匙和勻作兩次分沖亦穩而靈三苦辛分消亦謂之和解者因溫熱結邪在裡非苦辛開泄不足以解其里結非分消其夾邪不足以解其伏邪也其間卻有輕重緩急之分夾邪重而病勢急者當先進飛馬金丹沈樾亭驗方傳信方吐瀉兼施以去其夾邪然後再治溫熱本病夾邪輕而病勢緩者當察其所夾何邪參用消藥以和解如枳實梔豉湯合陸氏潤字丸小陷胸湯合樸黃丸之分消痰食加味小陷胸湯加減半夏瀉心湯加味連茹橘半湯加味枳實梔豉合小陷胸湯之分消痰火昌陽瀉心湯小陷胸合加減半夏瀉心湯之分消濕熱痰火漏蘆橘皮湯加味小陷胸湯合控涎丹之分消痰水加減小柴胡湯增損小柴胡湯四逆散合白薇湯之分消瘀熱對症酌用歷驗不爽他如沉香百消曲善能消食消痰消水消瘀其功甚捷隨症均可佐使惟病後液枯氣逆肝火上衝者膏粱輩最多此症最難消解治以五汁四磨飲西瓜汁甘蔗汁雅梨汁鮮生地汁金汁各一瓢廣鬱金廣木香上沉香烏藥各磨汁一茶匙衝入開水一半和勻即飲薛生白方最妙以諸汁滋胃液辛香散逆氣凡治陰虛氣滯者均可仿此用藥以和解之四補瀉兼施者因其人平素體虛或宿有內傷復感溫熱伏邪不得不邪正並治標本兼顧於是乎有補瀉合用之法有先瀉後補之法有寓瀉於補之法如參蘇飲人參敗毒散倉廩湯喻氏醫門法律方之類益氣與發表並用七味蔥白湯小品茅根湯外臺方加減葳蕤湯之類滋陰與解肌並用人參白虎湯竹葉石膏湯加減竹葉石膏湯廉臣驗方之類益氣與清熱並用黃連阿膠湯仲景方千金生地黃煎犀角地黃湯千金要方之類滋陰與瀉火併用水解散外臺方陶氏黃龍湯溫疫論方之類補正與逐邪並用補中益氣湯調中益氣湯補中益氣湯加片芩神麯之類益氣與透邪並用三黃積術丸枳實導滯丸東垣方之類益氣與消導並用黃耆湯益氣與潤腸並用益血潤腸丸養血與潤下並用養榮承氣湯養血與通便並用豬苓湯仲景方加味導赤散滋陰與利溺並用陶氏逍遙湯清補陰氣與通逐敗精並用導赤合加味虎杖散豬苓湯合豭鼠矢散滋陰利溺與通逐敗精並用此皆補瀉合用之法也又如本病陰虛火旺復感風溫風熱則風助火勢而劫陰愈劇急宜辛涼散風以治標蔥豉湯加童便最穩重則荷杏石甘湯以速祛其邪次用五汁四磨飲千金生地黃煎之類滋陰降火以治本若復感暑濕濕熱則濕火交煎而陰氣愈傷急宜養陰逐濕以治標豬苓湯加味導赤散二方最穩重則童便四草湯亦可酌用次用參麥冬瓜湯加減甘露飲之類滋陰清裡以善後又如本病陽虛氣滯復感濕溫濕熱則中氣愈鬱而濕遏熱伏急宜芳淡泄濕加味二陳湯最當其次加味五苓散亦可參用以透邪次用香砂理苓湯即香砂理中湯合五苓散疏中益氣辛淡化濕以治本茵陳胃苓湯法亦標本兼顧此皆先瀉後補之法也若內傷肺癆病當中期之候一遇風溫與濕熱則外感與內傷交灼標邪與本病糾結風則引其喘濕則助其痰熱則增咳而動血若不細加診察每認本病變重仍與蠻補如以耆朮滯其氣膠地膩其血甚至白芍五味斂其邪勢急者譬如雙斧伐枯樹立刻傾折勢緩者亦如鼷鼠入牛角愈深入而難出矣此時急救之法雖宜補虛治本為主亦必兼輕理標症如葛氏保和湯十藥神書方之用薄荷紫蘇養陰清肺湯耐修子白喉抉微方之用薄荷桔梗之類皆能輕解風溫又如加減甘露飲樊師驗方之用茵陳芩枳沙參麥冬湯王孟英驗方之重用冬瓜皮子之類皆能清理濕熱此皆寓瀉於補之法也總之內傷兼外感其病虛中夾實實中夾虛調治固要輕靈亦必先明本體之氣虛血虛或氣血並虛精虛神虛或精神並虛繼必辨其為房勞傷思郁傷醫藥傷飲食傷然後參詳感邪之輕重急則先治標以去邪邪去正自安緩則但治本以養正正足邪乃去五平其復遺調其氣血者因伏邪之大勢已去而餘邪未解即用小方緩方平治復症遺症以和解之戴北山所謂平其亢厲是也或用發表攻裡消化而小其劑料參以調養或用清涼補益而變其湯方易以膏散丸丹者皆是方法甚多已詳載總論復症遺症篇茲不贅惟怒復而夙有飲痛胸脹脘悶諸法不效一瓢用千金五香湯千金霜一錢煎湯磨上沉香廣木香母丁香白檀香紫降香各一匙服迭瀉水飲而痊余歷驗不爽故特表彰之至其見症表裡三焦寒熱雜發濕火互結食痰水瘀內外夾發氣虛血鬱血虛氣滯變症多端未能一一曲盡聊陳大要如下寒熱往來盜汗口苦喜嘔咽乾頭眩舌苔白厚微兼淡黃煩渴胸脅滿痛耳聾小便黃嘔吐下利而心下痛口乾舌強而惡寒大小便閉而寒熱胸膈痞滿而悸二便自利而舌苔黏膩形體虛怯而舌苔滑厚以上宜和解之症引此數端余可類推方法大備總以對症發藥為要開透法凡能芳香開竅辛涼透絡強壯心機興奮神經等方皆謂之開透法惟一則去實透邪一則補虛提陷為異耳此為治溫熱伏邪內陷神昏蒙閉厥脫等危症之要法急救非此不可此等危症雖由於心肺包絡及胃肝內腎沖督等之結邪而無不關於腦與腦系腦系西醫曰腦筋東醫曰神經蓋以腦為元神之府心為藏神之臟心之神明所得乎腦而虛靈不昧開智識而省人事具眾理而應萬機但為邪熱所蒸痰濕所迷瘀熱所蔽血毒所攻則心靈有時而昏甚至昏狂昏顛昏蒙昏閉昏痙昏厥而全不省人事矣厥而不返亦必內閉而外脫矣何則人之神在心而心之靈以氣苟腦氣衰弱肺氣虛脫則心臟必麻痹而死故東西醫生理學以心肺腦為人身三大要經洵精確不磨也治宜先其所因解其所結補其所虛提其所陷以復心主之神明此開透法之所以出死入生而為最緊要最珍貴之良法也試為臚舉其方略一開竅透絡者葉天士所謂清絡熱必兼芳香開里竅以清神識是也里竅即神所出入之清竅屬心與腦因神以心為宅以囟為門六書精蘊說而其所出入之竅得以外見者惟目因心脈上連目系而目繫上通於腦故瞳神散大者心神虛散目不了了者腦被火爍目眶陷下者腦氣虛脫目瞪直視者腦髓無氣瞳神停而不輪舌強不語者腦與心神氣俱脫故昏厥如屍王清任醫林改錯曰腦髓中一時無氣不但無靈機必死一時洵足發明厥閉之精義也絡者絡脈即西醫所云回血管有陰絡陽絡之分陽絡即胃之大絡陰絡即肺脾心包肝腎沖督之內絡也內絡之間尤多孫絡即西醫所云微絲血管介於脈絡之間為交通經絡之細血管其在臟腑者則以心包絡與肝沖為最多以心包主血亦主脈橫通四布肝主藏血亦主四合回管上通腦而後貫督沖為血海導氣而上導血而下麗於胃而通於胞中者也觀此則邪熱內陷入絡不僅心包一症即藥之清透絡熱者亦各有所主不同然總以犀羚西黃龍腦蟾酥玳瑁西瓜硝等為最有效用而麝香尤為開竅透絡壯腦提神之主藥故凡治邪熱內陷里絡壅閉堵其神氣出入之竅而神識昏迷者不問蒙閉痙厥首推瓜霜紫雪方省庵方犀珀至寶丹廉臣驗方二方為前鋒安宮牛黃丸鞠通條辨方新定牛黃清心丸王孟英方局方紫雪醫通更定方次之牛黃膏河間六書方厥症返魂丹準繩類方又次之而以局方妙香丸局方來復丹為後勁總之熱陷神昏必先辨其陷入之淡深別其輕重以定方如熱初蒸及心之經心煩多言間有糊塗語其邪雖陷尚淺而輕但須丹溪清心湯去硝黃以泄衛透營可也迨陷入心包妄言妄見疑鬼疑神其邪陷漸深而重先以茶竹燈心湯細芽茶五分捲心竹葉三十片燈心兩小帚調下萬氏牛黃丸一顆至二顆每多奏效若服後猶不清醒反昏厥不語全不省人事者則邪熱直陷心臟極深而重急用新定牛黃清心丸或安宮牛黃丸甚或瓜霜紫雪丹調入石氏犀地湯劑中以開透之猶可十全一二或用加減服蠻煎祝春渠歌方集論方調入厥症返魂丹四五丸亦可幸全十中之一如或不應必至內閉外脫而斃此熱陷淺深之次第用藥輕重之方法也然昏沉雖系熱深卻有夾痰濁夾濕穢夾胃實夾血結夾毒攻夾沖逆之分而無不關係於神經其分布於心肺胃三經者即第十對迷走神經主心肺胃之知覺運動凡結邪在此神經其人知覺即昏迷即肝腎沖督亦有交感神經反射之作用由是推之肺主氣氣閉而神昏迷者由於痰濁迷漫神經也故曰痰迷亦曰痰厥治宜先用臥龍丹西黃金箔各四分梅冰荊芥鬧羊花各二錢麝香辰砂各五分豬牙皂角錢半細辛一錢燈心灰二錢五分共研細末搐鼻取嚏以通肺竅次用導痰開關散過玉書治疔匯要方開水調服一錢以吐稠痰若痰雖吐而神猶不醒急用犀角三汁飲犀角汁五匙生蘿蔔汁半碗梨汁三瓢雪水三煎沸和入三汁即服調入煉雄丹明雄黃一分牙硝六分研細同入銅勺內微火熔化撥勻俟如水時急濾清者於碗內俟其將凝即印成錠三釐或五釐徐徐冷灌一日三服每見有吐出清痰黏涎數碗而神識全清終以枇杷葉飲子外臺方調入岩制川貝顧松園方一二方去余痰以肅清肺氣或用二陳湯善其後此治痰厥重症之方法也若勢輕者加味導痰湯感症寶筏方亦效其夾濕穢而神昏迷者由於濕熱鬱蒸過極迷濛神經也故曰濕蒙治以芳香闢穢辛淡開閉藿樸夏苓湯去蔻樸加細辛三分白芥子八分蘆根一兩滑石五錢煎湯代水乘熱即飲蒙閉即開屢驗不爽甚則調入太乙紫金丹一丸投無不效若熱勢稍重者宜以清涼透熱芳烈宣竅清芳透邪湯鮮石菖蒲葉錢半澤蘭葉二錢薄荷葉八分青蒿腦錢半鮮茅根四十支水蘆根一兩解毒萬病丹一錠即紫金錠加雄黃琥珀各五錢徐洄溪驗方亦屢投輒驗樊師每用藿樸二陳湯亦屢驗或去本方中紫金片磨沖蘇合香丸一顆尤效若夾胃實而神昏迷者多屬胃熱蒸腦腦筋起炎神即昏蒙頭搖目瞪矣延及脊腦筋亦發炎則手足發痙甚則角弓反張矣蓋胃為五臟六腑之海其清氣上注於目其悍氣上衝於頭循咽喉上走空竅循眼系入絡腦腦為元神之府所以胃熱蒸腦無不發現神經諸病也此為溫熱病最多之候方法已詳載攻裡篇茲不贅其夾血結而神昏迷者蓄血迷亂神經也蓄血在上焦者屬心包絡症必脈細肢厥胸痹痛厥故曰血結胸法宜橫開旁達加味桂枝紅花湯葉氏溫病論方四逆散合白薇湯廉臣驗方二方最效甚則調入厥症返魂丹五粒屢驗蓄血在中焦者屬脾絡症必脘痛串脅脈澀肢厥脹痛在左脅者居多故名脾脹和血逐邪湯鱉血柴胡荊芥穗制香附嫩蘇梗秦艽各錢半川樸枳殼各一錢撫芎八分益母草澤蘭各三錢絳通一錢生薑皮二分沈月光驗方甚效五枝松針湯紫蘇旁枝錢半川桂枝五分樟樹嫩枝桃樹嫩枝各五寸酒炒嫩桑枝二尺青松針八錢煎湯代水廉臣驗方亦驗重則加鱉甲煎丸張仲景方四五錢或加寬膨散葉氏驗方一錢奏功最捷蓄血在下焦者屬肝絡衝脈症必左脈弦澀手足厥冷大便溏黑小便自利神昏如狂治宜宣氣解結透絡通瘀葉氏加減小柴胡湯天士論溫二十則方舒氏增損小柴胡湯馳遠傷寒集註方四逆散合白薇湯三方酌用延久必變肝脹血蠱治宜開鬱通絡如新加絳復湯徐氏醫學舉要方開鬱通絡飲薛瘦吟醫贅方開鬱正元散金鑑婦科心法方當歸活血湯醫通方代抵當丸寒溫條辨方無極丸本草綱目方回生至寶丹華氏婦科驗方桃仁承氣合逍遙散加味王馥原驗方之類臨時對症選用可也若夾毒攻而神昏迷者血毒攻心也名曰血閉其症有三一為溫毒爍血血毒攻心法宜峻下已詳前攻裡篇一為產後結瘀血毒攻心回生至寶丹最靈黑神丸洄溪驗方最穩而效一為溺毒入血血毒攻心甚或血毒上腦其症極危急宜通竅開閉利溺逐毒導赤瀉心湯陶節庵傷寒六書方調入犀珀至寶丹或導赤散合加味虎杖散廉臣驗方調入局方來復丹二三錢尚可幸全一二此皆治實症之開透法也若夾沖逆而神昏痙厥者症屬陰虛火亢法宜鎮攝不在此例二強心提神法為溫熱病已經汗下清透後內傷氣血精神而其人由倦而漸昏由昏而漸沉乃大虛將脫之危症急宜強壯心機興奮神經不得不於開透法中籌一特開生面之峻補提陷法庶幾九死者尚可一生此與普通調補法迥殊其法有四一為強壯心腦如參歸鹿茸湯聶久吾方衝入葡萄酒東西醫用以壯腦提神近已盛行一瓢人參養榮湯和劑局方衝入鹿茸酒一瓢補中益氣湯加鹿茸血片三分程祖植醫學新報方之類能治腦氣衰弱心神虛散者惟此三方最力大而效速為急救大虛昏沉之峻劑二為急救陰陽如陶氏回陽急救湯黑附塊安邊桂川薑各五分別直參湖廣朮辰茯神各一錢姜半夏炒橘白各七分炙甘草五分五味子三分麝香三釐沖最妙凡治溫熱病涼瀉太過克伐元陽而陽虛神散者多效此為節庵老名醫得意之方妙在參附桂與麝香同用世俗皆知麝香為散氣通竅之藥而不知其實為壯腦補神之要藥閱過丁氏實驗化學新本草及曹氏麝香辨者皆深悉之惜吾醫界多茫茫耳次如馮氏全真一氣湯別直參二錢提麥冬五錢北五味三分大熟地五七錢至一兩江西術三錢淡附片一錢酒蒸懷牛膝二錢亦佳凡治濕熱症劫傷太甚陰損及陽而神沉不語者頗驗此為楚瞻錦囊中得意之方功在於一派滋養陰液之中得參附氣化俾上能散津於肺下能輸精於腎且附子得牛膝引火下行不為食氣之壯火而為生氣之少火大有云騰致雨之妙故救陰最速陶馮二方雖同為急救陰陽之良劑而一則注重陽氣一則注重陰氣臨症用方時務宜注意三為復脈振神如復脈湯衝入參桂養榮酒一瓢奏功最速其次千金生脈散煎湯沖鹿茸酒一瓢亦靈二方之效效在酒能提神刺激血液之循環以強壯心機而復經脈之運行庶幾脈無息止而神亦因之清醒矣四為開閉固脫其症有二一內閉而外脫內閉者絡閉外脫者氣脫葉天士云平時心虛有痰外熱一陷里絡就閉人即昏厥發痙若不急開其閉或開閉不得其法必致心氣與肺氣不相順接而其人膚冷汗出躁擾不臥脈細而急疾便為氣脫之症矣此時急救之法急宜開其內閉固其外脫如葉氏加減復脈湯去苡仁枇杷葉加綿耆皮錢半北五味念粒調入牛黃清心丸甚則陶氏回陽急救湯調入葉氏神犀丹尚可幸全十中之一二一外閉而內脫外閉者邪束陽郁之謂也內脫者陽盛陰涸之謂也多由溫熱病兼風兼寒之候不先祛風散寒以解表早用苦寒直降致表不解而邪陷入內此時仍以輕揚發表者解其外而外不閉如邵氏熱鬱湯五葉蘆根湯之類以撤熱存陰者救其內而內不脫如竹葉石膏湯加減竹葉石膏湯之類皆可酌用以奏功一方並治如外臺三黃石膏湯楊氏增損三黃石膏湯之類若胸腹脹滿痛而拒按大便不通者急宜下之法詳攻裡篇此皆補虛提陷之法也與開透法雖迥異而用意則同惟治外閉內脫則不在此例謹述宜於開透及提陷諸症如下邪熱初蒸心經之候心神不安睡多夢語醒時自清甚則心神漸煩而多言然所言皆日用常行之事無糊塗語夜間或有一二譫語然猶清白語居多舌紅苔黏小便黃赤裡熱重而表熱反輕胸悶不舒邪陷心包熱深厥深之候神昏譫語言多妄見妄聞甚至疑鬼疑神人所未見未聞然對而呼之猶省人語舌色絳而尚有黏膩似苔非苔望之若干手捫之尚有津液兩目大小眥赤唇紅耳聾心中熱痛拒按而軟四肢厥冷指甲青紫大便溏黑極臭或下鮮血小便黃赤澀痛邪熱深入心臟之候神昏不語不省人事如癡如醉形若屍厥面有笑容目瞪直視舌硬或卷短舌苔紅中有黑點黑中有紅點身冷肢厥胸中獨熱按之灼手神氣雖醒似睡時作鼾睡聲齒齦結瓣紫如干漆按此等見證雖臟氣將絕之候若囊不縮面不青息不高喉顙不直鼻不扇耳不焦不魚目不鴉口尚有一線生機大劑急救頻頻灌服藥能下咽至胃者猶可幸全十中之一如目珠不輪瞳神散大舌色淡灰無神遺溺自汗者必死不治熱陷痰迷之候終日神昏嗜睡似寐非寐或煩躁狂言或錯語呻吟或獨語如見鬼或喉中有水雞聲不語如屍厥口吐黏涎胸雖滿痛按之則軟鼻扇氣急舌絳而潤捫之黏膩或舌雖欲伸出口而抵齒難驟伸者甚或悶亂搐搦狀如驚癇熱陷濕蒙之候胸膈痞滿心煩懊憹兩眼欲閉神昏譫語舌苔白滑甚或黃膩小便短澀黃熱大便溏而不爽面色油膩口氣穢濁耳聾乾嘔熱陷血厥之候神昏如醉呼之即覺與之言亦知人事若任其自睡而心放即神昏譫語甚或昏厥不語身重胸痛四肢厥逆糞雖硬而大便反易色紫黑小便自利舌色紫暗而潤邪熱結瘀血毒攻心之候神昏如狂或如驚癇喜笑怒罵見人慾齧舌紫而暗口噤難開或手足發痙溺毒入血血毒上腦之候頭痛而暈視力矇矓耳鳴耳聾噁心嘔吐呼氣帶有溺臭間或猝發癲癇狀甚或神昏痙厥不省人事循衣摸床撮空舌苔起腐間有黑點汗下清消後大虛將脫之候神由倦而漸昏由昏而漸沉或鄭聲錯語或獨語如見鬼聲顫無力語不接續如癡如迷喜向里睡似寐非寐似寤非寤呼之不應四肢厥冷面色蒼白眼珠現青白色冷汗自出氣少息促二便清利循衣摸床撮空舌色淡晦少神或闊大胖嫩或淡紅圓厚按診治以上諸症不論其脈速用強壯心腦急救陰陽復脈振神等方對症發藥庶可幸全一二稍緩則不及救矣醫家病家幸毋遲疑貽誤邪陷正虛內閉外脫之候神昏譫語甚則昏厥發痙不語如屍或妄笑如癡目閉舌強欲伸而不得伸氣短息促揚手躑足躁不得臥手足厥逆冷汗自出在男子則囊縮在婦人則乳縮舌苔焦紫起刺或色絳而胖嫩熱深陽郁外閉內脫之候目眥赤或眼白現紅絲鼻孔干唇紅燥耳聾心煩渴喜涼飲舌苔黃黑而燥起刺如鋒小便黃赤澀痛大便黃黑稠黏或溏瀉而極臭或下鮮血下時肛門熱痛胸至少腹熱甚按之灼手一身肌表反不發熱雖熱亦微惡寒無汗反欲擁被向火甚則四肢厥冷指甲青紫清涼法溫熱鬱於氣分為伏熱鬱於血分為伏火通稱伏邪熱與火未有不當清涼者也當其伏邪外潰在表法宜辛涼開達使熱從表泄則發表法亦清涼法也伏邪內結在裡法宜苦寒通降使火從下泄則攻裡法亦清涼法也伏邪在半表半裡法宜雙方和解使熱從表泄火從里泄則和解法亦清涼法也若在表已得汗而熱不退在裡已下而熱不解在半表裡已和解而熱猶不淨或本來有熱無結則惟以清涼直折以肅清其火而已故清涼法可濟發表攻裡和解之不逮四者之用可合而亦可分溫熱病當清涼者十之六七則清涼法不可不細講也凡用清涼方法必先辨其為伏熱為伏火熱屬氣分為虛而無形俗稱浮游火如盛夏酷暑炎蒸雖揮汗淋漓一遇涼風而即解故人身之熱氣清即退至其清熱之法首用辛涼繼用輕清者所以清肅氣分之浮熱也終用甘寒者所以清滋氣分之燥熱也火屬血分為實而有物俗稱實火其所附麗者非痰即滯非滯即瘀非瘀即蟲但清其火不去其物何以奏效必視其附麗者為何物而於清火諸方加入取消痰滯瘀積蟲等藥效始能捷如燔柴炙炭勢若燎原雖沃以水猶有沸騰之恐慌必撤去柴炭而火始熄故凡清火之法雖以苦寒直降為大宗而歷代醫方往往有清火兼消痰法清火兼導滯法清火兼通瘀法清火兼殺蟲法者皆所以清化火之所附麗者也若無所附麗之伏火但為血鬱所化者自以清其絡熱宣其氣機為第一要義而有時苦寒復甘寒法者甘苦化陰以存胃腸之津液使苦寒不致化燥苦寒復酸寒法者酸苦泄肝善通孫絡之積血彙報云酸味能通微絲血管之積血使絡熱轉出氣分而解苦寒復鹹寒法者鹹苦達下一則清利內腎之溺毒一則清鎮沖氣之上逆一則清通外腎之敗精也總而言之凡溫熱病宜於辛涼開達者早用苦寒直降即為誤遏冰伏其邪而內陷宜於苦寒直降者但用輕清甘寒只能清熱不能退火雖然火散則為熱熱聚則為火火與熱只在聚散之間故清熱與瀉火可分而亦可合但其先後緩急之間所用方法界限必須分清耳試為臚舉其方略一辛涼開達其法有二一為宣氣達衛使伏邪從氣分而化衛分而解兼風者透風於熱外劉氏桔梗湯加味梔豉湯二方最靈而穩挾濕者滲濕於熱下五葉蘆根湯藿樸夏苓湯二方亦輕而靈俾風濕不與熱相搏從或汗或㾦而外解則伏熱勢孤自易肅清一為透營泄衛使伏邪從營分而透轉氣分而解毒盛者清營解毒加減銀翹散醫原方最妙羚地清營湯驗方傳信方犀角大青湯涼血解毒湯犀地桑丹湯樊師驗方四方亦可選用挾穢者透營闢穢清芳透邪湯徐洄溪醫案方加味翹荷湯磨沖太乙紫金丹二方最靈即一起舌絳咽乾甚有脈伏肢冷之假象亦不外此二方加減次與五味消毒飲加紫金片清解余穢俾毒與穢從疹斑而解或從戰汗而解間有邪盛正虛不能一戰而解者法宜益胃透邪七味蔥白湯加西洋參鮮茅根服後停一二日再戰汗而解但戰汗出後肺氣空虛其人雖倦臥不語膚冷一晝夜卻非脫症待氣還自溫暖如常矣余方詳載發表篇參看可也二輕清化氣王孟英所謂展氣化以輕清如梔芩蔞葦等味是也又謂伏氣溫病自里出表先從血分而後達氣分初起多舌潤無苔但診其脈軟而或弦或弦而微數口未渴而心煩惡熱夜甚無寐或斑點隱隱即宜投以清解營熱之藥迨伏邪從氣分而化苔始漸布然後再清其氣分可也然其氣分之所以不清者濕熱居多痰熱次之病之為腫為喘為痞為悶為懊憹為咳嗽為呃逆為四肢倦懈為小便黃赤為便溏不爽皆由於此總以輕清化氣為首要其清氣分濕熱如葉氏新加梔豉湯光杏仁十粒生苡仁三錢飛滑石錢半白通草一錢浙苓皮三錢淡香豉錢半焦梔皮一錢鮮枇杷葉三錢加減蘆根飲活水蘆根一兩光杏仁冬瓜子生苡仁鮮枇杷葉各三錢白蔻仁三分沖以上皆天士驗方蘆根通橘湯活水蘆根一兩川通草一錢廣橘皮一錢鮮枇杷葉五錢生薑皮五分淡竹茹錢半此外臺偶方六花葦莖湯旋覆花三錢滁菊花錢半川樸花八分豆蔻花佛手花各五分代代花二分葦莖一錢生苡仁冬瓜子各四錢廉臣驗方之類其輕清氣分痰熱如陳氏清肺飲疫痧草方蔞杏橘貝湯栝蔞皮錢半光杏仁三錢蜜炙橘紅一錢川貝母三錢桔梗一錢鮮枇杷葉三錢冬瓜子三錢冬桑葉錢半葉天士驗方新加桑菊飲廉臣驗方枇杷葉飲子外臺方加岩制川貝顧氏醫鏡方之類此皆能清化肺氣通調水道下輸膀胱俾氣分伏熱上能從咯痰而出下能從小便而出吳茭山曰凡氣中有熱者當用清涼薄劑吳鞠通曰治上焦如羽非輕不舉王孟英曰用藥極輕清極平淡者取效更捷皆屬此類三甘寒救液其法有二一為清養氣液如金匱麥門冬湯千金麥冬湯清燥救肺湯喻嘉言驗方葉氏養胃湯沙參杏仁湯南沙參甜杏仁川貝各三錢鮮枇杷葉四錢雅梨汁青蔗漿各一瓢沖潤肺雪梨膏以上皆葉天士驗方參燕麥冬湯吉林參一錢龍芽燕八分麥冬三錢奎冰四錢江筆花醫鏡方之類一為清養血液如千金生地黃煎清燥養榮湯吳氏溫疫論方葉氏竹葉地黃湯葉氏加減復脈湯皆天士驗方顧氏八汁飲甘蔗汁藕汁梨汁蘆根汁西瓜汁鮮生地汁鮮茅根汁各一酒杯鮮荷葉汁三匙曉瀾驗方之類此皆溫熱大病後劫傷氣津血液善後調養之良方總之溫熱諸病未經汗下和解而化燥者火盛則燥也當用苦寒清火為主已經汗下和解而化燥者液涸則燥也當以甘寒滋燥為主此其大要也四苦寒直降即葉天士所謂苦寒直清裡熱也黃芩湯傷寒論方梔子黃芩湯河間六書方二方最輕黃連解毒湯外臺方較重準繩三黃石膏湯內科準繩類方尤重當察伏火之淺深輕重對證選用凡溫熱病之宜於苦寒者切忌早用甘寒蓋因苦寒為清甘寒為滋自時醫以鮮地鮮斛元參麥冬等之清滋法認作清泄法於是熱益壯神益昏其弊由甘寒清滋之藥得大熱煎熬其膏液即化為膠涎結於脘中反致伏火不得從里而清泄從此為閉為厥為痙為癲甚則為內閉外脫變症蜂起者多由於此五清火兼消痰者因伏火熏蒸津液液郁為痰故兼用化痰藥以分消之法宜苦辛開泄如小陷胸湯黃芩加半夏生薑湯皆傷寒論方石膏大青湯千金方黃連溫膽湯觀聚方要補方連樸飲昌陽瀉心湯王氏霍亂論方加味小陷胸湯加減半夏瀉心湯加味連茹橘半湯皆醫原方之類皆可選用其法與苦寒清泄有別清泄是直降一意肅清伏火開泄是橫疏兼能清化痰濁分際最宜斟酌葉天士所謂舌白不燥或黃白相兼或灰白不渴慎不可亂投苦泄雖有脘中痞痛宜從苦辛開泄是也六清火兼導滯者因溫熱病最多夾食一症也王孟英曰凡治溫熱病必察胸脘如拒按者即舌絳神昏亦宜開化其方如枳實導滯湯三黃枳朮丸枳實導滯丸陸氏潤字丸之類皆可酌用梔樸枳實湯仲景方沖生蘿蔔汁方亦靈穩七清火兼通瘀者因伏火鬱蒸血液血被煎熬而成瘀或其人素有瘀傷不得不兼通瘀法以分消之如黃連解毒合犀角地黃湯加減小柴胡湯增損小柴胡湯四逆散合白薇湯之分消瘀熱皆可對證酌用此即葉天士所謂宿血在胸膈中舌色必紫而暗捫之潮濕當加散血之品於清火法中如琥珀丹參桃仁丹皮等否則瘀血與伏火相搏阻遏正氣遂變如狂發狂之症也八清火兼殺蟲者因伏火在胃胃熱如沸蛔動不安因而脘痛煩躁昏亂欲死者名曰蛔厥但清其胃略兼殺蟲之藥蛔厥自愈清中安蛔湯薑汁炒川連二錢黃柏錢半枳實二錢烏梅三個川椒三十粒傷寒廣要方犀角黃連湯犀角一錢小川連錢半青木香五分烏梅三個外臺方二方最效惟有下症者宜用三黃瀉心湯加青木香棗兒檳榔胡連等攻下之九清絡宣氣者所以清其血熱靈其氣機使無形者令其轉旋有形者令其流暢也蓋因溫熱伏邪內舍於營盤踞絡中其血必鬱而熱其氣亦鈍而不靈凡春夏溫病晚發秋冬伏暑晚發邪伏深沉者類多如此此即王孟英所謂邪伏深沉不能一齊外出雖治之得法而苔退舌淡之後逾一二日舌復干絳苔復黃燥正如抽蕉剝繭層出不窮不比外感溫暑由衛及氣自營而血也且每見有變為癰腫者徐洄溪云凡伏邪留於隧絡深則入於臟腑骨髓之中無從發泄往往上為發頤肺癰中為肝癰痞積下為腸癰便毒發於皮肉則為癍疹瘡瘍留於關節則為痛痹拘攣注於足脛則為鶴膝足痿此等證候皆絡瘀為之也精氣旺則不發至血氣偶虛或有所感觸雖數年之久亦有復發者其病俱屬有形煎丸之力太輕則不能攻邪太重則反傷其正當用外治之法以透毒散瘀內服丸散以消其痰火化其毒涎或從咯吐而出或從二便而出而以輕清宣透芳香通靈之煎劑以托其未透之伏邪內外之症皆然醫者均所當知也觀此二則辨論絡中結邪之病理發明殆盡但其間用藥最難此等絡瘀之伏火非芩連所能清非參耆所能托惟有用輕清靈通之劑漸漸撥醒其氣機宣通其絡瘀庶邪氣去而正氣不與之俱去若一涉呆鈍則非火閉即氣脫非氣脫即液涸矣選藥制方可不慎之又慎歟以余所驗清宣肺絡首推清宣瘀熱湯活水蘆筍鮮枇杷葉各一兩旋覆花三錢包煎真新絳一錢青蔥管二寸廣鬱金磨汁四匙沖常熟曹仁伯醫案驗方最靈其次六花絳復湯滁菊花二錢新銀花錢半藏紅花三分豆蔻花佛手花各五分旋覆花三錢真新絳一錢青蔥管三寸沖五皮絳復湯白蔻皮六分陳香櫞皮五分雅梨皮三錢丹皮錢半紫荊皮錢半旋覆花三錢新絳一錢青蔥管三寸沖以上皆廉臣驗方方亦輕穩惟胸痹氣急痰多者宜用蔞薤絳復湯栝蔞皮二錢干薤白三枚桂枝二分仙半夏錢半浙苓三錢旋覆花五錢新絳錢半青蔥管五寸春砂殼七分徐守愚醫案驗方清宣包絡首推石氏犀地湯加減服蠻煎二方其次晉三犀角地黃湯犀角汁四匙鮮生地汁二瓢同沖青連翹三錢生甘草八分王氏古方選注方加味清宮湯元參心二錢連翹心一錢竹葉捲心二錢蓮子心五分犀角汁四匙竹瀝梨汁各一瓢鮮石菖蒲汁五匙和勻同沖吳氏溫病條辨方方亦清靈清宣肝絡首推二仁絳復湯桃仁九粒柏子仁錢半歸鬚錢半新絳一錢旋覆花三錢青蔥管三寸沖天士驗方新加絳復湯二方為主氣滯挾濕者四七絳復湯仙露夏錢半川樸花八分紫蘇旁枝一錢赤苓三錢白前二錢旋覆花三錢新絳一錢青蔥管五寸沖徐守愚醫案驗方化濕宣絡血虛氣鬱者首推四物絳復湯細生地三錢歸鬚一錢赤芍錢半撫芎五分新絳一錢旋覆花三錢青蔥管三寸沖其次魚膠絳復湯墨魚骨三錢真阿膠二錢真新絳錢半旋覆花三錢青蔥管三寸養血濡絡或用活血通絡湯歸鬚三錢川芎錢半酒炒白芍一錢秦艽錢半冬桑葉三錢雞血藤膠一錢廣橘絡二錢雷少逸時病論方榮筋舒絡絡傷血溢者羚地清營湯清絡止血以上各方均沈樾亭驗方傳信方孫氏五膽墨熊膽汁牛膽汁豬膽汁青魚膽汁各一分羊膽汁二分當門子五釐陳京墨研粉六錢和搗成錠每重三分金箔為衣孫文垣歷驗秘方尤為神妙又次四汁絳復湯鮮生地汁一瓢生藕汁兩瓢童便五瓢陳京墨汁五匙同沖真新絳八分旋覆花三錢蔥須二分廉臣驗方亦靈而穩絡瘀化脹者三蟲二甲湯羌螂蟲一對青糖一錢拌炒䗪蟲五隻酒炒九香蟲三隻生鱉甲五錢炒川甲一錢桃仁錢半蜜炙延胡錢半歸鬚二錢五靈脂錢半淨楂肉三錢葉天士驗方開鬱通絡飲二方最靈絡燥發痙者犀羚鎮痙湯陸定圃驗方羚麻白虎湯邴味清驗方犀羚白虎湯王孟英驗方三方最效輕則新加桑菊飲亦驗若陽邪亢極厥深熱深之候其人昏厥四逆自利醬糞雖急當清絡宣氣救逆存陰如羚地清營湯犀地桑丹湯四汁紫金錠西瓜汁蘆根汁生蘿蔔汁各五瓢甘蔗汁一杯紫金錠五分磨汁沖徐洄溪驗方之類方雖神效然須防熱去寒起每見服後神識雖清而虛煩自利手足仍冷口燥渴飲者即轉機而用既濟湯吉林參五分原麥冬錢半生甘草五分仙露夏一錢淡附片五分鮮竹葉念片荷葉包生粳米三錢宋玉碩易簡方其應如神須知陽極似陰其人根氣必虛也甚則有用當歸四逆湯仲景方調入犀珀至寶丹廉臣驗方或用五枝絳復湯川桂枝五分西河柳嫩枝三錢紫蘇旁枝錢半嫩桑枝二尺桃樹嫩枝一尺真新絳錢半旋覆花三錢青蔥管五寸沈云臣驗方調入局方來復丹皆能通陰回陽而令神清厥回者然一經肢溫陽回即當易轍不可過劑以耗其精液此為根氣下虛者而設若根氣不虛但因火鬱絡中而四逆瘈瘲者治宜仲景四逆散川柴胡八分小枳實錢半赤芍錢半生甘草五分加雙鉤藤天仙藤絡石藤各三錢嫩桑枝二尺桔梗一錢發越肝絡之伏風使轉出氣分而解又如肢冷甲青唇黑便秘者當參厥應下之一法治宜仲景大柴胡合絳復湯通泄肝絡之伏邪轉出腸絡而解亦為正宗治法惟肝絡血鬱延累包絡手足厥陰同病神昏肢冷血厥如屍者宜用通竅活血湯赤芍川芎各一錢桃仁三錢藏紅花五分青蔥管五寸鮮薑汁二滴紅棗二枚當門子五釐王勳臣醫林改錯方調入珠黃散一服珠粉西黃辰砂各二分川貝末六分周澹然溫證指歸方服後每見有咯出紫血及黏涎而神清厥回者清宣腦絡瓜霜紫雪丹濟生羚犀湯羚角一錢犀角八分生石膏四錢生甘草六分旋覆花三錢紫菀前胡各錢半細辛三分嚴用和濟生方二方最靈其次犀羚鎮痙湯亦有殊功此皆清絡宣氣之精要者也余詳開透法中夾血結一節十苦寒復甘寒法者陳修園謂之苦甘化陰法吳鞠通謂之甘苦合化陰氣法因伏火爍津耗液或其人素稟液虛雖治當苦寒清火亦必參以甘寒生津此為清氣血兩燔之正法輕則如白虎加生地黃湯王孟英方清燥養榮湯吳又可方加減白虎湯廉臣驗方之類重則如千金生地黃煎準繩三黃石膏湯白虎合黃連解毒湯準繩類方之類若汗出或疹癍出後熱仍不解者胃津亡也當以甘寒為主略參苦泄以堅陰如白虎加人參湯仲景方人參化癍湯準繩類方加味蘆根飲子廉臣驗方之類皆可酌用新定五汁飲鮮生地汁鮮金釵汁各三瓢鮮蘆根汁雅梨汁甘蔗汁各二瓢重湯燉溫服廉臣驗方尤為靈效此為甘寒參苦寒法總之苦寒復甘寒者注重在清降實火甘寒參苦寒者注重在清滋虛熱先後虛實之間臨症制方不可不細辨也十一苦寒復酸寒法者苦以清胃酸以泄肝也如黃芩湯仲景方之芩芍並用犀角黃連湯外臺方之連梅並用清中安蛔湯汪琥傷寒論注方之連柏烏梅並用清毒活血湯聶久吾方之芩連木通與赤芍山楂並用連梅安胃湯川連六分川楝子一錢生白芍錢半烏梅肉三分歸鬚八分賴橘紅五分炒川椒一分葉天士驗方之黃連川楝與烏梅白芍並用皆內經所謂酸苦泄熱也若胃陰已虧者宜用吳氏連梅湯小川連一錢烏梅肉一錢連心麥冬三錢細生地三錢阿膠二錢鞠通驗方酸苦復甘寒法若胃陽已虛者宜用王氏安胃湯米炒潞黨參錢半淡乾薑八分小川連五分烏梅肉五分炒枳實八分炒川椒二分晉三新制驗方酸苦復辛甘法他如張氏豬臟丸景岳全書方加味臟連丸廉臣驗方一則槐米與醋同煮一則槐連與醋同煮則為苦以堅腸酸以泄肝法臟連六味丸則為酸苦泄熱酸甘化陰法人參烏梅湯西洋參錢半烏梅肉三分木瓜八分炙甘草五分淮山藥三錢帶心石蓮子一錢吳氏溫病條辨方則為酸甘化陰微苦泄熱法總之同一酸苦泄熱而立法各有不同功用各擅其長臨時對症選用可也十二苦寒復鹹寒法者取其鹹苦達下也其法有四一清利內腎溺毒如陳氏奪命飲犀羚二鮮湯皆疫痧草方效力最大小便飲子童子小便鮮生地汁生藕汁各一杯生川柏浸汁兩瓢龐安常傷寒總病論方紅白散辰砂一錢人中白元明粉各五分開水泡去渣服龔居中壽世仙丹方導赤散沖四汁飲細木通錢半生甘梢八分淡竹葉二錢開水一碗煎成衝入鮮生地汁生藕汁鮮茅根汁童便各一杯廉臣驗方童便四草湯四方亦屢奏捷效一清鎮沖氣上逆資液救焚湯醫門法律方平陽清裡湯梁氏舌鑑辨正方加減犀羚二鮮湯廉臣驗方三方最有效力黃連阿膠湯仲景方衝入童便一杯三甲白薇湯生鱉甲生打左牡蠣生龜甲心各六錢東白薇五錢西洋參錢半歸鬚一錢生甘梢八分金銀器各一具煎湯代水廉臣驗方二方亦極靈驗一清通外腎敗精首推千金梔豉加石膏鼠矢湯陶氏逍遙湯陶節庵傷寒全生集方二方其次導赤散合加味虎杖散豬苓湯合豭鼠矢散皆廉臣驗方皆可酌用若子宮蓄有敗精每與血濁互結其症小腹脹痛牽引腰腹攻刺難忍二便不通不能坐臥立哭呻吟宜急治之緩則自下脹上十死不救急用鼠麝通精丸雄鼠粉王不留行各一兩炒黑醜五靈脂炒穿甲桃仁各五錢杜牛膝汁粉三錢麝香三分研勻令細生韭汁泛丸如麻子大每服一錢廉臣驗方一錢或錢半煎牽牛楝實湯炒黑丑三錢鹽水炒川楝子錢半炒穿甲一錢小茴香三分李瀕湖驗方送下往往一服而減三服而平一清滋任脈陰精丹溪大補陰丸最妙滋腎益陰煎炙龜板大熟地各四錢川柏八分知母二錢生甘梢八分春砂仁六分金鑑婦科心法方亦靈他如滋腎六味湯知母錢半川柏六分熟地三錢山萸肉八分丹皮澤瀉赤苓各錢半淮藥四錢炙龜板三錢蒙自桂二分童便一杯沖救陰滋任湯大黑豆三錢熟地二錢麥冬冬桑葉丹皮山藥南沙參各錢半豬脊髓一條青鹽二分皆廉臣驗方亦多奏效以上一十二節皆述清涼法之條目至於熱之淺者在營衛以石膏黃芩為主柴葛為輔熱之深者在胸膈以花粉知母蔞仁梔子豆豉為主熱在腸胃者當用下法不用清法或下法兼清亦可熱入心包者黃連犀角羚羊角為主熱直入心臟則難救矣用牛黃猶可十中救一須用至錢許少則無濟非若小兒驚風諸方每用分許即可有效如戴北山原書云云者此但言其大要耳今將當清涼諸症詳列於下熱在營衛之候身熱汗自出不惡寒反惡熱身重頭面項紅腫周身紅腫眼白黃目珠脹鼻孔干唇燥煩躁輕發疹㾦重發丹斑舌苔白而底絳或兩邊白苔而中紅或身熱反減惡熱反甚咳嗽有痰上氣喘急口渴或嘔四畔舌色紫絳中見粉白苔熱在胸膈氣分抑鬱之候咽乾喉痛胸脅滿痛甚或胸前紅腫按之熱甚小便色黃舌苔厚白而糙或黃膩而燥或見朱點或有裂紋或黃白相兼或灰白熱陷心包及心血分灼爍之候譫語發狂或沉昏嗜睡或煩擾不寐四肢厥逆指甲青紫大便溏黑極臭小便赤澀或痛舌絳無苔或舌上略有黏苔余詳開透法諸症中邪熱攻腦或溺毒上腦之候暈厥不語兩手發痙狀如驚癇時瘈瘲頭獨搖甚或遺尿直視筋惕肉瞤循衣摸床撮空舌苔起腐間有黑點或起黑暈黑瓣熱在胃腸之候便血便膿血譫語多言腹滿痛唇裂齒燥舌苔黃燥余詳攻裡法諸症中熱陷肝腎之候日輕夜重朝涼暮熱面少華色口乾消渴氣上衝心心中痛熱飢不欲食食則吐蛔四肢厥逆煩躁不寐小便澀痛甚或癃閉腰痠足冷大便或秘或溏甚或瀉水舌絳無苔干黏帶澀或紫中兼有黑點熱陷衝任之候朝涼暮熱衝任脈動少腹裡急陰中拘攣甚或舌卷囊縮小便澀痛男則遺精腰痛女則帶下如注舌色焦紫起刺如楊梅或舌紫無苔而有點或舌紅無苔而膠干或舌紅中有白糜點溫燥法溫熱為伏火症本不當用溫燥然初起客寒包火搏束過甚致伏邪不能外達不得不暫用溫散法如劉氏蘇羌飲局方芎蘇散之類亦有濕遏熱伏抑鬱太甚致伏邪不能外出不得不暫用辛燥法如藿香正氣散九味羌活湯之類一經寒散熱越濕開熱透即當轉用他法以速清其伏邪此在表兼寒兼濕之當用溫燥法也更有初起夾水氣症在表時不宜純用辛涼發散若純用辛涼則表必不解而轉見沉困有里症不可遽用苦寒若早用苦寒則裡熱內陷必轉加昏蒙此水氣鬱遏伏邪陽氣受困宜於發表清裡藥中加溫燥之品以祛水氣如藿香厚朴半夏蒼朮草果豆蔻廣皮赤苓等品皆可對症酌用迨水氣去郁遏開然後議攻議涼則無不效者矣又有夾冷食傷胃往往有脈沉肢冷者若胸膈痞滿舌苔白厚益為食填膈上之明證即當用溫化燥削如加味平胃散戴北山驗方沉香百消曲道藏方絳礬丸張氏醫通方之類甚則用吐法以宣之如椒鹽湯生蘿蔔汁等使膈開而陽氣宣達然後伏邪外潰或當解表或當清裡自無誤治矣此在裡夾水夾食之當用溫燥法也此等兼症夾症每用溫燥藥見功者遂相訟清熱瀉火之非歸咎於冰伏涼遏之弊不知溫熱乃其本氣兼夾乃其間氣也豈可拘執兼症夾症之用溫燥法見功遂並其溫熱本症之當用清涼而一概抹煞也耶更有並無兼症夾症而邪深入里失於攻下而熱深厥深反欲擁被向火凜凜惡寒身冷肢厥而二三處獨見火症如目大小眥赤舌苔黃黑燥小便黃赤澀痛大便稀黃極臭或下利鮮血此皆熱深陽郁之象當以溫燥通郁為主佐以辛涼透熱如新定達原飲加減藿樸夏苓湯之類使裡氣通而鬱陽發反大熱而煩渴即轉機而用清用下以收全功者甚多至若本系溫熱伏邪因其人平素陽虛或年已衰老醫用發表攻裡太過至汗出不止嘔利俱作四肢微厥脈微惡寒者不得不暫用溫燥扶陽如胃苓湯合半硫丸之溫運脾陽朮附湯合半硫丸皆吳氏溫病條辨方之溫固命陽但須知雖屬陽虛卻從熱症來而陰必虧半硫桂附亦不可過用當佐以護陰藥為妙如歸耆建中湯參附養榮湯之類皆可酌用總之此症溫補略緩及溫補不到必死或過用溫補陽雖回而陰竭亦死此處不可不斟酌至當也又如濕溫濕熱方伏於膜原未經傳變之時胸膈必多痰滯有見其煩躁而過用知膏芩連者有因其作渴而遽用生地麥冬者有病者自認火症而恣啖冷水西瓜梨薺太早者皆能抑鬱陽氣壅閉伏火火遏於中下二焦停痰滯於上焦每見惡寒胸痞甚則煩躁昏譫宜先以宣導痰滯為主如加味二陳湯藿樸二陳湯吳氏導痰湯三子導痰湯之類痰滯通則伏火之症發現隨其傳變以施涼解攻利之劑乃有效也以上溫補溫化二法非治溫熱正病特救藥誤食誤耳總之溫熱諸症中惟濕溫一症其病情半陰半陽其病原水火互結其病狀反復變遷不可窮極在上焦如傷寒在下焦如內傷在中焦或如外感或如內傷至其變症則有濕痹水氣咳嗽痰飲黃汗黃疸腫脹瘧疾痢疾淋症帶症便血疝氣痔瘡癰膿等症其間宜清涼芳烈者固多宜溫化燥滲者亦不少方法已詳溫熱即是伏火篇若夫病後調理凡屬濕溫濕熱當以扶陽為法溫健胃陽如香砂理中湯六君子湯之類溫升脾陽如補中益氣湯參胡三白湯之類然亦有病後化燥有當用甘涼濡潤者或有用酸甘化陰者全在臨症者活法機變也謹述宜溫燥諸症條列於下溫熱兼寒新涼外束之候頭痛身熱惡寒無汗甚或肩背腰痛或膝脛痛口雖不渴間有煩躁口苦便溏不爽小便黃熱舌苔滑白或兩邊白中淡黃溫熱兼濕濕遏熱伏之候凜凜惡寒甚或足冷頭目脹痛昏重如裹如蒙身痛不能屈伸身重不能轉側肢節肌肉疼而且煩腿足痛而且酸沉困嗜睡胸膈痞滿渴不引飲或竟不渴午後先寒後熱狀若濕瘧舌苔白膩或白滑而厚或白苔帶灰兼黏膩浮滑或白帶黑點而黏膩或兼黑紋而黏膩甚或舌苔滿布厚如積粉板貼不松溫熱夾水停積胸脘之候胸脘滿痛按之則軟略加揉按漉漉有聲甚則腸下抽痛乾嘔短氣或腰重足腫下利溺少甚或沉困昏憒舌苔滑白間有轉黃轉黑而胖滑或滿舌黃黑半邊夾一二條白色或舌尖舌本俱黃中間夾一段白色溫熱夾冷食填塞膈脘之候惡食吞酸噯氣脹滿欲吐不吐嘔逆痞悶甚或脈沉肢冷舌苔白厚微間淡黃溫熱夾虛涼瀉太過之候氣少息促聲顫無力語不接續喜向里睡汗出惡寒嘔利俱作四肢微厥甚或兩足冷甚舌色淡紅圓厚或淡晦少神或舌青胖嫩溫熱夾痰冷遏太過之候頭目昏眩胸膈痞悶按之不痛口吐涎沫懊憹煩躁甚或神昏如迷舌苔白滑黃滑不等消化法消者去其壅也化者導其滯也凡人氣血所以壅滯者必有所因先其所因而堅者削之此即消化之法也雖然凡用消化方藥必須按其部分而君臣佐使駕馭有方使不得移則病處當之不致誅伐無過不明乎此而妄用克削則病處未消而元氣已傷其害不可勝言況其所以積滯者有食積痰積水積瘀積蟲積之不同種種見症不一而足務在明辨症候按法而消化之以余所驗溫熱伏邪臨時每多夾食夾痰夾水夾瘀夾蟲之故必為消化乃得其平一消食諸方如加味平胃散沉香百消曲絳礬丸之類皆可酌用而以枳實導滯湯枳實梔豉湯加竹瀝蘿蔔汁二方奏功尤速二消痰諸方如加味二陳湯藿樸二陳湯加減導滯湯加味小陷胸湯加減半夏瀉心湯雪羹加生蘿蔔汁星香導痰丸之類皆可選用而以節齋化痰丸淡天冬青子芩栝蔞霜青海粉賴橘紅各一兩苦桔梗制香附青連翹各五錢上青黛風化硝各三錢研細加薑汁蜜丸王節齋名醫雜著方岩制川貝二方效用最繁若痰塞咽喉可用導痰開關散雄黃解毒丸等吐之痰壅胸膈則以降痰奔馬湯雪梨汁一杯生薑汁四滴蜂蜜半杯薄荷細末一錢和勻器盛重湯煮一時之久任意與食降痰如奔馬善治痰氣壅塞故名陳飛霞幼幼集成方調下珍珠滾痰丸半夏五十粒巴豆三十粒去殼同半夏煮待半夏熟爛取出巴豆止用半夏烘乾為細末米糊為丸如菜子大硃砂為衣曬乾用蘿蔔汁吞服七丸大人倍之吳庚生按此方治痰極有效癲癇痰厥及喉閉之屬有痰者均可用趙恕軒串雅內編方服之立效痰迷清竅當以昌陽瀉心湯沈氏六神湯二方隨症加減症輕加萬氏牛黃丸及珠黃散等症重加牛黃清心丸新定牛黃清心丸安宮牛黃丸集成太極丸天竺黃杜膽星各五錢酒炒生錦紋二錢直殭蠶三錢麝香梅冰各二分蜜丸如芡實大硃砂為衣小兒每服一丸大人五丸陳氏幼幼集成方等宣化之痰積胃腸宜以五仁橘皮湯光杏仁四錢生苡仁栝蔞仁各五錢蔻仁八分拌搗郁李淨仁三錢蜜炙賴橘紅錢半廉臣驗方加味小陷胸湯為主酌加節齋化痰丸或集成金粟丹九制杜膽星明天麻明乳香各二兩炒竹節白附子淨全蠍代赭石直殭蠶各一兩赤金箔五十張真麝香二分梅花冰片三分蜜丸皂角子大貼以金箔每用一丸薑湯化服此方比抱龍金液保命至寶定命等方功倍十百善治咳嗽上氣喘急不定嗽聲不轉眼翻手搐昏沉不醒等症一服即全因九制膽星雖真牛黃莫能及此惟虛寒之痰無根之氣絕脫之證不可用陳氏幼幼集成方等消逐之症勢極重者必用張氏新加涼膈散合礞石滾痰丸青子芩酒蒸大黃各八兩火硝煅礞石一兩上沉香五錢水丸量大小用之王汝言養生主論方消化而峻逐之痰滯經絡宜以竹瀝五汁飲淡竹瀝一杯生薑汁一匙生蘿蔔汁鮮桑枝汁生雅梨汁各三羹瓢荊瀝陳酒各一瓢和勻重湯煮一時之久溫服廉臣驗方為主輕加指迷茯苓丸浙茯苓二兩半夏一兩生研澄粉炒枳實半兩風化硝二錢半薑汁和丸如桐子大每服三十丸徐洄溪蘭臺軌範通治方重加聖濟大活絡丹白花蛇烏梢蛇威靈仙兩頭尖如無可用竹節白附子代之草烏煨天麻淨全蠍制首烏炙龜板麻黃貫眾炙甘草羌活官桂藿香烏藥川連熟地酒蒸大黃廣木香沉香以上各二兩細辛赤芍淨沒藥公丁香明乳香白殭蠶薑製南星青皮骨碎補白豆蔻安息香酒熬黑附塊炒黃芩浙茯苓制香附元參白朮以上各一兩防風二兩半葛根炙虎脛骨當歸各一兩半血竭七錢炙地龍犀角麝香松脂各五錢牛黃片腦各一錢半人參三兩共五十味為末蜜丸如桂圓核大金箔為衣陳酒送下徐洄溪蘭臺軌範通治方云頑痰惡風熱毒瘀血入於經絡非此方不能透達凡治肢體大症必備之藥也汪謝城方甲云近人所制人參再造丸一名回生再造丸即此方減去草烏貫眾黃芩香附骨碎補麝香沒藥乳香八味加入黃耆琥珀白芷桑寄生川芎厚朴天竺黃草果紅花穿山甲薑黃萆薢十二味治證並同宣化而消散之三消水諸方分消上焦之積水蔞蘆橘皮湯葉氏加減蘆根飲葉氏新加梔豉湯三方酌用分消中焦之積水宜以茵陳胃苓湯藿樸胃苓湯二方為主或加三因控涎丹或加神芎導水丸隨其輕重而選用之分消下焦之積水茵陳五苓散加味八珍散二方為主勢重者或用加味控涎丹或合大陷胸湯使積水從二便而逐去之舟車神祐丸炒黑醜四兩酒炒錦紋二兩煨甘遂煨大戟醋炒芫花炒青皮廣橘紅各一兩廣木香五分輕粉一錢水法丸劉河間方尤能捷效四清瘀諸方輕劑如沉香百消曲香殼散醫通方失笑散五靈脂生蒲黃各一兩研末每服二錢至三錢武氏濟陰綱目方七釐散真血竭一兩粉口兒茶二錢四分明乳香淨沒藥杜紅花各錢半飛辰砂一錢二分冰麝各一分二釐研細每服七釐增廣新編驗方九分散明乳香淨沒藥各一兩麻黃燒酒浸馬前子各五錢研細每服九分新編驗方之類重劑如飛馬金丹無極丸鬱金丸廣鬱金海南子明乳香淨沒藥飛雄黃硃砂巴霜各四錢合研極勻細米醋飛麵糊為丸如綠豆大大人每服九十一丸小兒五丸三丸孕婦忌服服時宜先備冷粥見所下既多而不止者即飲一二杯止之見沈樾亭驗方傳信局方聚寶丹廣木香上沉香春砂仁各三錢麝香八分炒延胡明乳香淨沒藥各三錢血竭錢半共研細末糯米粉糊丸彈子大硃砂為衣顧松園醫鏡方之類皆可隨症佐入於清解劑中屢投輒效尤以童便陳酒生藕汁活䗪蟲漿等四味效用最多隨症均可加入確為普通消瘀之良藥至於專門消瘀當分部位消一身經絡之瘀羌防行痹湯羌活防風各一錢威靈仙全當歸各三錢川斷秦艽各二錢明乳香淨沒藥杜紅花各五分先用嫩桑枝三兩青松針一兩煎湯代水頭痛加白菊花一錢川芎六分背痛加片薑黃八分肩背痛加桔梗錢半腰膝腳痛加淮牛膝川萆薢各三錢筋絡拘攣加絡石藤煅羊脛骨各三錢紅腫疼痛加鮮生地五錢酒炒青子芩錢半顧氏醫鏡方身痛逐瘀湯羌活秦艽川芎杜紅花制香附各一錢全當歸三錢五靈脂淮牛膝酒炒地龍各二錢原桃仁淨沒藥各錢半炙甘草一錢王清任醫林改錯方二方最靈消上焦血府之瘀血府逐瘀湯生枳殼二錢苦桔梗錢半炙甘草一錢川芎八分全當歸鮮生地各三錢原桃仁赤芍各錢半鱉血柴胡淮牛膝各錢半藏紅花三分醫林改錯方加味桂枝紅花湯二方最驗消中焦膈下之瘀膈下逐瘀湯當歸原桃仁各三錢五靈脂赤芍丹皮烏藥各二錢制香附炒枳殼各錢半蜜炙延胡川芎炙甘草各一錢藏紅花五分醫林改錯方鞠通桃仁承氣湯拔萃犀角地黃湯加琥珀五靈脂䗪蟲蒲黃等奏功皆捷消下焦少腹之瘀少腹逐瘀湯當歸尾生蒲黃各三錢五靈脂赤芍淨沒藥各二錢蜜炙延胡川芎官桂各一錢酒炒小茴香七粒黑炮姜二分醫林改錯方葉氏加減小柴胡湯舒氏增損小柴胡湯沈氏和血逐邪湯四方選用消一身竅隧之瘀通竅活血湯犀珀至寶丹蘇合香丸等皆可酌用消一身絡脈之瘀已詳清涼法中清絡宣氣一節用方者參看可也茲不贅五消蟲積諸方當分安蛔殺蟲二法安蛔如犀角黃連湯清中安蛔湯連梅安胃湯沈氏椒梅飲炒川椒一分烏梅五枚乾薑二分小川連一錢川楝子三錢水煎檳榔一錢磨汁沖沈氏驗方傳信方等選用如因涼瀉太過確有虛寒現症者宜用晉三安胃湯甚則仲景烏梅丸烏梅三百個人參六兩當歸四兩黃連一斤黃柏細辛桂枝各六兩乾薑十兩蜀椒四兩淡附片八兩共十味研細末以醋浸烏梅一宿去核蒸之五升米下飯熟搗成泥和藥令相得納臼中與蜜杵二千下丸如桐子大先食飲服十丸日三服稍加至二十丸禁生冷滑物臭食等傷寒論方殺蟲輕則檳黃丸棗兒檳榔一兩雄精制綠礬各五錢為末飯糊丸如小米大空心服一錢至三錢量人虛實用之重則下蟲萬應丸醋製雷丸棗兒檳榔炒黑醜酒炒錦紋廣木香各一兩上沉香五錢共研細末皂莢苦楝根各四兩煎水泛丸綠豆大每服一錢至三錢五更時砂糖湯送下以上皆顧氏醫鏡方程氏化蟲丸蕪荑白雷丸各五錢棗兒檳榔二錢半雄黃錢半廣木香白朮陳皮各三錢炒神麯四錢酒炒錦紋五錢以百部二兩熬膏糊丸如桐子大每服錢半米飲下醫學心悟方山西青金丹煅透使君子五十個香墨棗大一塊金銀箔各五張輕粉二錢先研使君子墨令細次箔次粉再加麝香少許合研勻細稀糊為丸如桐子大陰乾每服一丸至三丸薄荷湯磨下山西一家制售此藥治小兒驚疳積滯風癇之疾日得數十萬錢傳已數世矣皆可酌用使君子蛋輕粉五釐使君子二枚蔥白半寸合研細擊雞蛋小孔一個入藥封好蒸熟日吃二枚以上二方見沈氏驗方傳信尤為靈妙余如沉香百消曲更衣丸椒梅丸加味控涎丹等皆有殺蟲消積之功總而言之不拘食積痰積水積瘀積蟲積喬氏陰陽攻積丸吳茱萸炮乾薑官桂炒川烏薑汁炒川連姜半夏浙茯苓炒延胡人參各一兩上沉香真琥珀各五錢巴豆霜一錢為末皂角四兩煎汁糊丸綠豆大每服八分加至錢半淡薑湯下見李士材醫宗必讀喬三餘方秘方化滯丸小川連姜半夏各三錢三稜莪朮廣木香各二錢巴霜陳皮丁香各一錢蜜丸每服五分至八分唐容川血證論方二方最有效力隨症均可佐入謹述宜消化諸症條列於下食滯胃腸之候食積在上胸膈飽悶噯腐吞酸食積在中腹滿硬痛拒按食積在下繞臍硬痛拒按痰滯胸脘之候頭目暈眩耳鳴頰赤眼皮及眼下有煙霧灰黑色煩滿膈熱口乾思水吞酸嘈雜二便滯赤甚則神昏如迷口吐涎沫氣喘息粗水停三焦之候乾嘔吐涎或咳或噎或短氣心下雖滿痛按之則軟揉之作水聲甚或腰重足腫下利溺少面目兩手腫而且亮瘀積三焦之候胸腹脅肋結痛痛有定處而不移轉側若刀錐之刺遇夜則甚甚則神思如狂面色暗黑或吐紫血或便如黑漆蟲積脘腹之候脘腹痛有休止面白唇紅或唇之上下有白斑點或口吐白沫飢時更甚飽食則安補益法內經云精氣奪則虛虛者補之難經云損其肺者益其氣損其心者調其營衛損其脾者調其飲食適其寒溫損其肝者緩其中損其腎者益其精此用補益法之原理也溫熱為伏火症本不當用補益法然內經謂冬不藏精春必病溫病溫虛甚死當實其陰以補其不足此即後賢治四不足與四損者復病溫熱創立先補後瀉先瀉後補補瀉兼施之法之導師也況溫熱諸症每有屢經汗下清解不退者必待補益而始痊此由本體素虛或因素有內傷或為病藥所殘自當消息其氣血陰陽以施補益之法溫熱雖傷陰分血液者居多然亦有涼藥太過而傷陽氣者則補血補陰補氣補陽又當酌其輕重不可偏廢凡屢經汗下清和而煩熱更甚者當補陰血以濟陽所謂寒之不寒責其無水者是也屢汗下清和熱退而昏倦痞利不止者當補陽氣以培元所謂祛邪必先扶正正足邪自去也試述清補溫補調補平補峻補食補諸方法以發明之一清補即清滋法張景岳所謂阻虛者宜補而兼清二冬地芍之類是也陸九芝所謂甘寒為滋生地石斛以養胃陰是也如金匱麥門冬湯千金麥冬湯千金生地黃煎葉氏養胃湯竹葉地黃湯吳氏五汁飲雪梨汁荸薺汁蘆根汁麥冬汁藕汁臨時斟酌多少和勻涼服不甚喜涼者重湯燉溫服溫病條辨方之類為溫熱病後清滋津液之良方惟徐洄溪謂大病後必有留熱治宜清養獨推仲景竹葉石膏湯為善後要方雖然清滋之法亦當分辨如肺胃之陰則津液也惟清潤之品可以生之如參燕麥冬湯清燥救肺湯養陰清肺湯加減甘露飲潤肺雪梨膏景岳四陰煎細生地三錢麥冬白芍蘇百合北沙參各二錢浙茯苓錢半生甘草一錢景岳新方三參冬燕湯太子參西洋參各一錢北沙參四錢麥冬二錢光燕條八分青蔗漿一酒杯建蘭葉三片樊師驗方程氏月華丸天麥冬生熟地山藥百部北沙參川貝阿膠茯苓獺肝廣三七各五錢冬桑汁葉二兩煎膏將阿膠化入膏內和藥稍加煉蜜為丸如彈子大每服一丸噙化日三服程氏醫學心悟方八仙玉液藕汁二杯梨汁蘆根汁蔗汁人乳童便各一杯先將生雞子白三枚白茅根四十支煎取濃汁二杯和入前六汁重湯燉溫服顧氏醫鏡方之類皆可隨症選用心肝脾腎之陰則血液也清補心陰如清燥養榮湯葉氏加減復脈湯王氏小復脈湯原麥冬五錢甘杞子三錢炙甘草一錢鮮刮淡竹茹三錢南棗兩枚王孟英新驗方等選用清補脾陰如補陰益氣煎潞黨參一錢歸身二錢淮山藥熟地炭各三錢新會皮一錢炙甘草八分升麻二分柴胡三分景岳新方參燕異功煎潞黨參一錢光燕條八分生曬術五分浙茯苓一錢炙甘草新會白各八分見何書田醫學妙諦參粉甘芍湯西黨參錢半南花粉三錢炙甘草八分炒白芍錢半唐容川血證論方之類而慎柔養真湯西黨參生曬朮嫩棉耆甜石蓮各錢半淮山藥生白芍提麥冬各三錢炙甘草六分北五味二分慎柔五書方煎去頭煎止服二三煎取甘淡以養脾深得清滋脾陰之秘法清補肝陰如吳氏小定風珠溫病條辨方加減四物湯四物絳復湯阿膠雞子黃湯均見沈樾亭驗方傳信地骨皮飲地骨皮五錢粉丹皮細生地生白芍各三錢歸身錢半川芎五分見陳修園時方歌括酒瀝湯焦山梔粉丹皮歸身各錢半生白芍三錢鱉血柴胡八分辰茯神三錢生曬術五分蘇薄荷三分陳酒一匙淡竹瀝一瓢和勻同沖張氏醫通婦科方等選用而魏氏一貫煎細生地三錢歸身麥冬各錢半北沙參四錢甘杞子一錢川楝子錢半口苦燥者加酒炒川連六分見魏玉橫續名醫類案柔劑和肝善治胸脘脅痛吞酸吐苦疝氣瘕聚一切肝病尤為清滋肝陰之良方清補內腎之陰如甘露飲宋和劑局方知柏地黃湯戴氏廣溫疫論顧氏保陰煎見松園醫鏡新加六味湯見周小顛三指禪等選用腦督外腎之陰則精髓也蓋以腦為髓海督為脊髓外腎主藏精非黏膩之物不能填之清補腦腎之陰如六味加犀角湯見陸定圃冷廬醫話桑麻六味湯見何書田醫學妙諦救陰滋任湯清滋脊髓湯熟地炭炙龜板各四錢鹽水炒川柏八分知母錢半豬脊髓一條甲魚頭一枚煎成沖甜醬油半瓢均何廉臣驗方等選用總之清補之法必須清而不涼滋而不膩時時兼顧脾胃庶足為病後滋陰之善法二溫補之法張景岳所謂補而兼暖桂附乾薑之屬是也然亦有辨一胃中之陽後天所生者也一腎中之陽先天所基者也胃中之陽喜升浮虛則反陷於下再行清降則生氣遏抑不伸腎中之陽貴降納虧則恆浮於上若行升發則真氣消亡立至此陽虛之治有不同也溫補胃陽首推理中湯別直參錢半湖廣朮錢半炒乾姜八分炙甘草八分黃耆建中湯皆仲景方二方為主次如養中煎潞黨參三錢浙茯苓二錢炒扁豆二錢炒黃乾薑炒山藥各一錢炙甘草八分五君子煎西黨參三錢江西術浙茯苓各二錢炒乾薑炙甘草各一錢聖朮煎冬白朮五錢炒乾薑蒙自桂各一錢炒廣皮八分苓朮二陳煎浙茯苓三錢炒冬朮姜半夏各二錢炒廣皮炒乾姜各一錢澤瀉錢半炙甘草八分以上皆景岳方歸耆建中湯葉天士醫案方之類皆可對症選用溫補腎陽約分二法一為剛劑回陽其方如四逆湯厚附塊三錢乾薑二錢炙甘草錢半通脈四逆湯即前方加蔥白五枚白通湯蔥白四枚乾薑二錢黑附塊三錢白通加豬膽汁湯即前方加豬膽汁一匙童便一杯沖以上皆仲景方四味回陽飲別直參炒乾薑黑附塊各二錢炙甘草錢半景岳新方附姜歸桂湯黑附塊炒乾薑全當歸各錢半安邊桂一錢淨白蜜一瓢陳酒一瓢加水同煎喻嘉言經驗方之類一為柔劑養陽其方如六味回陽飲西黨參大熟地各五錢黑炮姜三分淡附片一錢白歸身三錢炙甘草一錢理陰煎大熟地五錢白歸身三錢炒黃乾薑一錢炙甘草八分蒙自桂五分鎮陰煎大熟地二兩淮牛膝二錢炙甘草一錢澤瀉錢半淡附片八分蒙自桂五分胃關煎熟地五錢炒山藥炒扁豆炒冬朮各二錢吳茱萸炒乾姜各五分炙甘草一錢四味散米炒西黨參五錢淡附片炒乾姜各一錢炙甘草一錢烏梅炭五分共為細末每服一二錢溫湯調下以上皆景岳方全真一氣湯馮氏錦囊方附姜歸桂參甘湯淡附片黑炮薑全當歸官桂各錢半西黨參炙甘草各二錢鮮生薑兩片大紅棗兩枚淨白蜜一瓢加水同煎喻嘉言驗方參茸養陽湯葉天士醫案方加味都氣飲感證寶筏方之類而金匱腎氣丸即附桂六味丸方尤為溫補腎陽之祖方他如溫補肺陽參耆保元湯別直參錢半炙綿耆二錢官桂八分炙甘草六分魏桂岩驗方為主其次參姜飲老東參三錢黑泡姜炙甘草各五分景岳新方觀音應夢散吉林參一錢胡桃肉一枚蜜煨生薑兩片江筆花醫鏡方亦可對症酌用溫補心陽首推人參養榮湯見時方歌括其次參附養榮湯別直參淡乾薑各一錢淡附片八分白歸身熟地炭各二錢酒炒白芍錢半吳又可溫熱論方亦佳溫補脾陽首推補中益氣湯李東垣脾胃論方六君子湯和劑局方二方為主壽脾煎別直參一錢炒冬朮二錢炒乾姜八分淮山藥二錢炒湘蓮三十粒炒棗仁錢半歸身二錢遠志肉五分炙甘草五分景岳新方方亦純粹溫補肝陽首推當歸四逆湯仲景方其次暖肝煎當歸甘杞子赤苓各二錢小茴香官桂烏藥沉香各五分五物煎全當歸熟地炭各三錢酒炒白芍二錢川芎一錢蒙自桂五分以上皆景岳方方亦精當溫補督陽首推龜鹿二仙膠鹿角龜板各十斤甘杞子二十兩西黨參十五兩龍眼肉五兩如法熬膠初服酒化一錢五分漸服三錢張氏醫通方參茸聚精丸線魚膠一斤沙苑子五兩西黨參十兩鹿茸片五錢每服八九十丸溫酒下張路玉婦科方二方最有效力此皆溫補方法之大要者也三調補之法為虛而不受峻補者設由溫熱病後氣液雖虧夾有氣鬱或夾痰涎或夾瘀血或夾食滯或夾濕濁或夾敗精必兼用對症療法以調理之古謂病有三虛一實者先治其實後治其虛是也此為虛症夾實其症大約有三一者濕熱盤踞中焦先以小分清飲真川樸炒枳殼各五分赤苓生苡仁各三錢豬苓澤瀉各錢半景岳新方吳氏四苓湯新會皮錢半茯苓三錢豬苓澤瀉各錢半吳又可溫疫論方等調脾胃而宣其濕熱繼則察其氣虛者香砂理中湯和劑局方小其劑而調補之液虛者吳氏五汁飲清潤法以調補之二者肝木橫穿土位當分乘脾犯胃二種乘脾則腹必脹滿大便或溏或不爽用藥宜遠柔用剛四七絳復湯最妙其次逍遙二陳湯枳殼五分拌炒仙居術八分仙半夏浙茯苓各錢半炒橘白歸鬚赤芍各一錢川柴胡五分蘇薄荷四分炙甘草二分代代花十朵沖廉臣驗方亦效犯胃則噁心乾嘔脘痞脅脹甚或吐酸嘈雜胃痛不食用藥則忌剛喜柔二仁絳復湯合左金丸最效其次連梅安胃湯亦妙若脾陽已虛氣滯失運者則以治中湯麗參鬚八分焦冬朮一錢炒黃乾薑五分炙甘草三分炒橘白八分醋炒小青皮三分和劑局方六味異功煎即五君子煎加廣皮一錢景岳新方調補脾陽以疏肝若胃液已虧肝風內擾者則以阿膠雞子黃湯桑丹泄肝湯冬桑葉二錢醋炒丹皮錢半石決明六錢茯神木三錢生白芍四錢東白薇三錢大麥冬二錢鮮石斛三錢木瓜八分童便一鍾沖廉臣驗方等調補胃陰以柔肝三者前醫誤用