body:
  text: 第二卷驗方梔豉湯焦山梔三錢淡豆豉三錢葛根芩連湯生葛根錢半青子芩錢半小川連八分炙草六分麻杏石甘湯青麻黃六分光杏仁三錢生石膏四錢炙草五分黃芩湯青子芩三錢生白芍錢半生甘草八分紅棗兩枚葳蕤湯生玉竹錢半石膏三錢青麻黃五分光杏仁一錢川芎六分青木香八分東白薇一錢獨活八分炙草五分按此方為冬溫咳嗽咽乾痰結髮熱自利之專藥即春時伏氣發溫更感於風之證亦不出此妙在麻黃配石膏則有分解寒熱互結之功倘病勢較輕去麻黃石膏獨活川芎杏仁等味加蔥白香豉之類足矣如果熱勢鬱結急須開泄者麻黃石膏又所必需在用方者臨病之權衡耳六神通解散青麻黃五分生石膏五錢杜蒼朮八分黃芩錢半飛滑石三錢生甘草五分淡香豉三錢蔥白三枚藿樸夏苓湯杜藿香二錢真川樸一錢姜半夏錢半赤苓三錢光杏仁三錢生苡仁四錢白蔻末六分豬苓錢半淡香豉三錢建澤瀉錢半茵陳胃苓湯杜蒼朮一錢真川樸一錢炒廣皮錢半浙苓三錢生曬術錢半川桂枝五分建澤瀉錢半豬苓錢半炙甘草五分先用西茵陳八錢煎湯代水茵陳五苓散西茵陳三錢生曬術錢半川桂枝六分浙苓三錢建澤瀉二錢豬苓二錢除疸丸阿硫黃三兩淨青礬一兩以上兩味水泛為丸姜半夏粉一兩為衣每服一錢或錢半一日兩次為治黃疸之第一良方清熱滲濕湯焦川柏錢半製蒼朮一錢小川連八分澤瀉錢半生曬術一錢淡竹葉錢半生甘梢五分赤苓三錢黃連溫膽湯小川連八分小枳實錢半姜半夏錢半赤苓三錢新會皮錢半生甘草五分鮮刮淡竹茹五錢煎湯代水藿香左金湯杜藿香三錢吳茱萸二分小川連六分廣皮二錢姜半夏錢半炒枳殼錢半炒車前錢半赤苓三錢六一散四錢細木通一錢建澤瀉二錢豬苓錢半先用鮮刮淡竹茹五錢炒香鮮枇杷葉一兩井水河水各一碗煎至一碗分兩次服服後毋多飲茶多飲茶則連藥吐出不得藥力矣切宜忍耐按夏秋霍亂多因濕遏熱伏兼飲食過飽而發亦有觸穢惡而發者此方化滯通痞以止嘔分利小便以止瀉為夏秋熱霍亂症正治法惟黃連吳茱萸分兩隨濕熱輕重配合為要凡治吐瀉轉筋痞痛鳴腸煩渴吐蛔眶陷失音手足厥冷爪紫脈伏或微者即用此湯和陰陽治嘔瀉投之輒效附加減法舌赤營熱加廣鬱金三錢蘇丹參三錢去茱萸半夏熱閉昏煩加行軍散二分鮮石菖蒲汁四匙氣衝呃逆加母丁香五分柿蒂三十個脘腹痛甚加炒延胡錢半紫金片四分若轉筋甚加酒炒木瓜錢半生苡仁六錢原方去竹茹枇杷葉用絲瓜絡寬筋草各一兩煎湯代水若瀉止嘔數日不止加絹包旋覆花三錢代赭石四錢原方去二苓滑澤車前木通若渴甚煩熱加生石膏六錢西瓜汁一瓢原方去萸夏藿枳二苓滑通若吐蛔多加烏梅肉五分胡連六分炒川椒二分絳礬丸皂礬五錢麵裹燒紅杜蒼朮五錢真川樸八錢廣皮六錢炒焦甘草三錢煮紅棗肉為小丸姜半夏粉一兩為衣每服錢半或二錢一日兩次淡薑湯送下蠶矢湯晚蠶沙五錢生苡仁四錢大豆卷四錢通草一錢陳木瓜三錢仙露夏一錢焦山梔錢半黃芩一錢吳茱萸三分拌炒小川連二錢地漿或陰陽水煎稍涼徐服按此方分量悉遵原方專治霍亂轉筋肢冷腹痛口渴煩躁目陷脈伏濕阻熱鬱之時行急證燃照湯飛滑石四錢真川樸一錢焦山梔二錢黃芩錢半製半夏一錢淡香豉三錢省頭草錢半水煎去滓研沖白蔻仁八分溫服苔膩而厚濁者去白蔻仁加草果仁一錢連樸飲小川連一錢真川樸二錢石菖蒲一錢香豉三錢製半夏一錢焦山梔三錢水蘆根二兩煎湯代水星香導痰丸制南星三兩製半夏三兩香附子三兩陳皮五兩上四味同研末薑汁皂角膏糊丸梧桐子大每服三錢開水送下按丹溪翁云此家傳秘方治痰嗽氣逆屢驗沉香百消曲五靈脂一斤制香附一斤黑醜二兩白醜二兩上沉香一兩製法仿六神麯每塊一錢按此曲善能消水消食消痞消痰消氣消滯消瘀消痢消蠱消膈並痰迷心竅等症俱治其功甚捷加味枳實梔豉合小陷胸湯小枳實錢半焦山梔三錢淡豆豉三錢連翹三錢栝蔞仁五錢姜半夏二錢小川連八分條芩二錢西茵陳二錢姜水炒木通一錢先用活水蘆根二兩燈心一錢煎湯代水加味蘆根飲子水蘆根二兩鮮竹茹五錢南花粉三錢知母三錢生粳米三錢鮮荷葉包生薑皮五分加減白虎湯生石膏八錢白知母四錢生甘草八分鮮竹葉五十片先用西瓜翠衣四兩鮮枇杷葉一兩去毛淨剪去大筋煎湯代水加減銀翹散光杏仁錢半牛蒡子錢半木賊草八分銀花錢半栝蔞皮錢半川貝母三錢老紫草三錢連翹三錢粉丹皮錢半鮮竹葉三十片加味二陳湯姜半夏三錢浙茯苓四錢北細辛三分廣皮二錢白芥子八分生苡仁六錢飛滑石四錢豬苓二錢建澤瀉二錢炙甘草六分先用絲通草三錢煎湯代水加味五苓散生曬術錢半浙茯苓四錢川桂枝六分拌滑石六錢建澤瀉二錢水蘆根一兩淡竹葉錢半豬苓錢半加味小陷胸湯栝蔞仁五錢姜半夏二錢小川連一錢枳實二錢真川樸一錢帶皮苓四錢新會皮二錢加減半夏瀉心湯姜半夏三錢小川連一錢青子芩二錢均用姜水炒飛滑石四錢絲通草錢半淡竹瀝一瓢薑汁四滴控涎丹白芥子甘遂大戟各一兩研末薑汁糊丸每服十丸重則服三十丸淡薑湯送下伐木丸製蒼朮一斤黃酒麴二兩同蒼朮炒赤色皂礬半斤醋拌曬乾入陽城罐火煅醋糊丸梧子大每服三四十丸好酒米湯任下日二三服按張三丰仙傳方云此治黃腫如土色其效如神李時珍云絳礬丸不及此方之妙加味連茹橘半湯小川連一錢青子芩二錢龍膽草一錢廣皮錢半仙露夏錢半鮮石菖蒲根葉錢半先用鮮竹茹五錢鮮茅根一兩煎湯代水加減小陷胸合半夏瀉心湯栝蔞仁五錢仙露夏二錢小川連一錢條芩二錢淡竹瀝一瓢生薑汁四滴昌陽瀉心湯鮮石菖蒲錢半條芩一錢仙露夏一錢蘇葉四分小川連六分真川樸八分紫菀三錢先用鮮竹茹五錢鮮枇杷葉一兩去毛抽筋活水蘆根二兩煎湯代水按此方除痰泄熱宣氣通津專治暑穢夾痰釀成霍亂胸痞心煩神昏譫語或渴或呃或嘔酸吐苦湯水礙下小便秘澀等症太乙紫金丹山慈菇二兩川文蛤二兩蘇合油兩半大戟兩半白檀香兩半安息香兩半千金霜一兩琥珀五錢明雄黃五錢當門子三錢梅冰三錢上十一味各研極細再合研勻濃糯米飲杵丸每重錢許外以飛金為衣按薛一瓢先生云此丹比蘇合丸而無熱較至寶丹而不涼兼玉樞丹之解毒備二方之開閉專治霍亂痧脹嵐瘴中惡水土不服喉風中毒蛇犬蟲傷五絕暴厥癲狂癰疽鬼胎魘魅及暑濕溫疫之邪瀰漫熏蒸神明昏亂危急諸症厥症返魂丹飛辰砂明雄黃生玳瑁麝香白芥子各二錢半上藥同研如粉於瓷器中熔安息香和丸如綠豆大按此丹專治屍厥不語或沖惡不語每服五丸用童便化下小兒熱風痙厥只服一丸承氣陷胸湯小枳實錢半真川樸八分生錦紋三錢川連一錢栝蔞仁六錢仙露夏三錢先用活水蘆根鮮冬瓜子各二兩煎湯代水陰虛者加鮮生地一兩元參五錢小陷胸湯合樸黃丸栝蔞仁六錢仙露夏三錢樸黃丸三錢川連八分上藥煎成用絹篩濾清服樸黃丸真川樸陳皮各十二兩制錦紋一斤四兩木香四兩上用荷葉水泛為丸如綠豆大每服三錢開水下小兒二錢枳實導滯丸小枳實六神麯各五錢制錦紋一兩小川連三錢青子芩生曬術各三錢浙茯苓三錢建澤瀉二錢神芎導水丸生錦紋青子芩各二兩炒黑醜飛滑石各四兩小川連蘇薄荷川芎各五錢上為細末滴水為丸如小豆大溫水下十丸至十五丸每服加十丸日三服冷水下亦得按此丸瀉濕熱消酒食清頭目利咽喉能令胃腸結滯宣通氣和而愈屢用輒效陸氏潤字丸酒炒錦紋一兩製半夏前胡山楂肉天花粉廣陳皮白朮枳實檳榔各一錢二分五釐每藥須略炒或曬乾為末薑汁打神麯為丸如梧子大每服二三錢按此丸善治濕熱食積胸滿不食腹痛便閉及夏秋赤白痢等證最穩最靈方載陸養愚三世醫驗中調胃承氣湯生錦紋一錢元明粉錢半炙甘草六分犀連承氣湯白犀角一錢小川連一錢生錦紋三錢枳實錢半元明粉三錢真川樸五分桃仁承氣湯原桃仁三錢生錦紋二錢元明粉錢半桂枝三分生甘草六分按此湯乃仲景原方吳又可去桂枝甘草二味加當歸赤芍丹皮各二錢亦名桃仁承氣湯吳鞠通去元明粉桂枝甘草三味加細生地六錢丹皮四錢澤蘭二錢人中白二錢名加減桃仁承氣湯同一治蓄血症涼血通瘀之功較原方尤勝犀角地黃湯白犀角一錢鮮生地一兩粉丹皮三錢赤芍二錢茵陳蒿湯西茵陳五錢焦山梔四錢生錦紋二錢千金生地黃湯鮮生地二兩生錦紋一錢生甘草八分紅棗四枚芒硝一錢養榮承氣湯鮮生地一兩油當歸三錢生白芍二錢知母三錢生錦紋一錢小枳實錢半真川樸五分雪羹加味煎淡海蜇四兩大荸薺六個鮮地汁二瓢元參三錢栝蔞仁五錢雅梨汁一瓢淨白蜜二匙薑汁二滴先用鮮冬瓜皮子一個同海蜇荸薺煎湯代水阿膠雞子黃湯真阿膠錢半左牡蠣五錢大生地四錢白芍三錢女貞子三錢黃甘菊二錢雞子黃一枚童便一鍾按此方甘鹹靜鎮善熄肝風專治肝風上翔頭眩心悸耳鳴躁擾狂厥等症導赤散合加味虎杖散鮮生地一兩淡竹葉錢半生甘梢八分木通一錢杜牛膝一兩茺蔚子三錢琥珀末五分麝香一分豬苓湯合豭鼠矢散飛滑石四錢真阿膠一錢建澤瀉二錢豬苓二錢兩頭尖一錢赤茯苓錢半韭菜白一錢新定達原飲真川樸八分花檳榔錢半草果仁五分枳殼錢半焦山梔三錢淡豆豉三錢青子芩二錢桔梗錢半鮮荷葉包六一散三錢知母三錢先用活水蘆根二兩北細辛三分煎湯代水加減甘露飲細生地四錢西洋參錢半淡天冬錢半麥冬二錢青子芩一錢西茵陳錢半雅梨汁一瓢蔗漿一瓢先用炒香鮮枇杷葉一兩鮮茅根二兩煎湯代水參麥六味湯潞黨參三錢提麥冬三錢大熟地四錢淮藥二錢山萸肉錢半浙茯苓三錢粉丹皮錢半澤瀉錢半加減復脈湯炙甘草六錢大生地六錢生白芍六錢麥冬五錢真阿膠三錢大麻仁三錢脈虛大欲散者加人參二錢石氏犀地湯白犀角一錢鮮生地一兩青連翹三錢銀花二錢廣鬱金三錢雅梨汁一瓢淡竹瀝一瓢薑汁二滴鮮石菖蒲根葉錢半先用活水蘆根二兩燈心一錢煎湯代水按此方涼血開閉泄熱化濕涼而不遏潤而不膩用藥最為空靈善治邪傳包絡化燥傷陰神昏譫妄舌赤無苔等證屢用輒效如或不應再用瓜霜紫雪丹或新定牛黃清心丸透熱宣竅功力尤勝瓜霜紫雪丹白犀角羚羊角青木香上沉香各五錢寒水石石膏靈磁石飛滑石各五兩元參升麻各一兩六錢硃砂五錢生甘草八錢公丁香二錢麝香一錢二分金箔一兩西瓜硝八錢冰片三錢製法照局方紫雪按此方以西瓜硝八兩為君又加冰片三錢方載方省庵喉科較局方紫雪尤勝專治邪火毒火穿經入臟狂越躁亂發斑發黃瘴毒疫癘蠱毒鬼魅口瘡腳氣小皂驚癇火痘咽痛喉風重齶痰核舌疔紫泡等證善能消解其效如神拔萃犀角地黃湯白犀角一錢鮮生地兩半生錦紋三錢川連一錢青子芩二錢葉氏加減復脈湯炙甘草一錢大生地錢半真阿膠錢半麥冬三錢吉林參五分生苡仁四錢北沙參四錢燕窩一錢枇杷葉三錢去毛蜜炙南棗兩枚咳血加白芨一錢夜熱加地骨皮四錢便溏舌燥去生地三甲復脈湯生龜板六錢生鱉甲五錢生牡蠣六錢生地四錢真阿膠錢半炙甘草一錢生白芍三錢麥冬三錢大麻仁三錢邵氏熱鬱湯蘇薄