body:
  text: 第一卷溫熱總論世之治傷寒者每誤以溫熱治之而治溫熱者又誤以傷寒治之此辨之不明也即明其為溫熱病矣而又有新感伏氣之不同前哲發明新感溫熱者如葉氏香岩之論溫二十則陳氏平伯之風溫病篇吳氏鞠通之溫病條辨張氏鳳逵之治暑全書立説非不精詳然皆為新感溫暑而設非為伏氣溫熱而言即江本載薛生白濕溫病篇亦屬暑濕相搏之一種他如張石頑傷寒緒論周禹載溫熱暑疫全書陳素中寒溫條辨雖辨明伏氣溫熱惜皆語焉而不詳以豫所見專論伏氣溫熱能各症精詳者自北山此書始茲先述其總論存其精而補其缺約十有三論溫熱四時皆有新增溫熱伏氣病也通稱伏邪病之作往往因新感而發所謂新邪引動伏邪也因風邪引動而發者曰風溫或曰風火因寒邪引動而發者曰冷溫或曰客寒包火因暑邪引動而發者曰暑溫或曰暑熱因濕邪引動而發者曰濕溫或曰濕遏熱伏若兼穢毒者曰溫毒其症有二一為風溫時毒一為濕溫時毒此以兼症別其病名也其發於春者曰春溫或曰春時晚發發於夏者曰夏溫或曰熱病發於秋者曰秋溫或曰秋時晚發或曰伏暑發於冬者曰冬溫或曰伏暑冬發此以時令別其病名也其病萌於春盛於夏極於秋衰於冬間亦有盛發於春冬者然總以盛發於夏秋為多何則春冬空氣清潔輕氣多而炭氣少故其為病亦清邪多而濁邪少除新感症外即有因伏邪而病純熱無寒者但為溫病而已兼寒者但為冷溫而已兼風者但為風溫而已雖間有時行溫毒然亦以風毒居多夏秋空氣最濁水土鬱蒸之氣每被日光吸引而蒸發發於首夏者曰黴雨蒸發於仲秋者曰桂花蒸其為病也皆水土穢氣雜合而成人但以暑濕賅其病之本貪涼飲冷賅其病之標而不知夏秋水土鬱蒸濕中有熱熱中有濕濁熱黏膩化生黴菌故謂之濕溫亦謂之濕熱西醫謂之黴毒氣害人最廣變症最繁較之風溫冷溫暑溫三症尤多而難治英醫合信氏云空氣乾熱不傷人惟濕熱最傷人因低窪地土或蘊有死水之潛熱或積有腐爛之草木此即水土穢氣化生黴菌之原因後得六十度熱表之日光接連曬之其黴毒氣乃勃發故在東南熱地夏秋之交其毒尤甚可見濕溫濕熱為有形黏膩之邪西醫不為無見嗚呼人在氣交之中一身生氣終日與穢氣相爭戰實則與微生物相爭戰不知不覺中伏許多危險之機可不驚且懼哉論溫熱五種辨法一辨氣風寒之氣從外收斂入內病無蒸氣觸人間有作蒸氣者必待數日後轉入陽明府症之時溫熱及濕溫症其氣從中蒸達於外病即有蒸氣觸人輕則盈於床帳重則蒸然一室以人身臟腑氣血津液得寒氣則內斂得火氣則上炎溫熱火氣也人受之自臟腑蒸出於肌表氣血津液逢蒸而敗因敗而溢溢出有盛衰充達有遠近非鼻觀精者不能辨之辨之既明治之毋惑知為溫熱而非傷寒則凡於頭痛發熱諸表症不得誤用辛溫發散於諸里症當清當下者亦不得遲回瞻顧矣二辨色風寒主收斂斂則結面色多繃結光而潔溫熱主蒸散散則緩面色多鬆緩而垢晦人受蒸氣則津液上溢於面頭目之間多垢滯或如油膩或如煙燻望之可憎者皆溫熱之色也一見此色雖頭痛發熱即不得用辛熱發散一見舌黃煩渴諸里症即宜攻下不可拘於下不厭遲之説三辨舌風寒在表舌多無苔即有白苔亦薄而滑漸傳入里方由白而黃轉燥而黑溫熱一見頭痛發熱舌上便有白苔且厚而不滑或色兼淡黃或粗如積粉或兼二三色或白苔即燥又有至黑不燥則以兼濕挾痰之故然必按之粗澀或兼有朱點有罅紋不可誤認為裡寒陰結也治溫熱者能先於表症辨之不能辛溫發散一見里症即用清涼攻下斯得之矣四辨神風寒之中人令人心知所苦而神自清如頭痛寒熱之類皆自知之至傳裡入胃如或有神昏譫語之時緣風寒為病其氣不昏而神清溫熱初起便令人神情異常而不知所苦大概煩躁者居多甚或如癡如醉攪亂驚悸及問其何所苦則不自知即問有神清而能自知者亦多夢寐不安閉目若有所見此即譫語之根也或亦以始初不急從涼散遷延時日故使然耳五辨脈溫熱之脈傳變後與風寒頗同初起時與風寒迥別風寒從皮毛而入一二日脈多浮或兼緊兼緩兼洪無不浮者傳裡始不見浮脈然其至數亦清楚而不模糊溫熱從中道而出一二日脈多沉逮自里出表脈始不沉而數或兼弦或兼大然總不浮其至數則模糊而不清楚凡初起脈沉遲勿認作陰症沉者邪在裡遲者邪在臟也脈象同於陰寒而氣色舌苔神情依前諸法辨之自有不同者或數而無力亦勿作虛視因其熱蒸氣散脈自不能鼓指但當解熱不當補氣受病之因各殊故同脈而異斷論溫熱與風寒各異一辨其氣之異風主疏泄寒主凝澀二氣雖有不同然初皆冷而不熱其中人也鬱而不宣方其初受在表自宜溫散麻黃湯桂枝湯葛根湯蘇羌飲等方皆散寒之劑非解熱之劑也溫熱由伏氣而成熱而不冷其傷人也立蒸而腐敗初起即宜涼解梔豉湯葛根芩連湯麻杏石甘湯黃芩湯葳蕤湯六神通解散等方皆解熱之劑非散寒之劑也以解熱之劑治風寒輕則寒中嘔利重則陽陷厥逆以散寒之劑治溫熱輕則衄渴譫妄重則枯竭亡陰此氣之不可不辨也二辨其受之異風寒從表入里自皮毛而肌腠而筋骨而胸膈胃腸一層漸深一層不能越此入彼故汗不厭早下不厭遲為散為和淺深毫不可紊以其氣皆屬冷必待寒化為熱邪斂入內方可攻下涼解否則虛其裡氣反引表邪內陷而成結胸痞痢諸症濕溫從膜原而發溫熱從血絡而發先踞膜絡之中必內潰而後變九傳由里出表雖出表而里未必全無邪戀經過之半表亦未必不為邪傷故下不厭早汗不厭遲為和為解淺深必不可拘以其氣皆屬熱熱能作蒸不必郁變而此蒸即帶彼熱未出表而誤溫之始則引熱毒燎原而為斑衄狂喘未傳則傷真陰為枯稿沉昏厥逆諸危候矣邴味清評此論深有見識三辨其傳經之異溫熱傳經與風寒不同風寒從表入里故必從太陽而陽明而少陽而入胃若溫熱則邪從中道而或表或里惟視人何經之強弱為傳變故伏邪之發有先表后里者有先里後表者有但里不表者有表而再表者有里而再里者有表裡偏勝者有表裡分傳者有表裡分傳而再分傳者有表裡三焦齊發者此為九傳醫必先明九傳之理由而後能治伏邪試言其要風寒從表入里必待漸次閉鬱而傳變故在表時不必兼見里症入里後不必復見表症溫熱本從里出表故見表症時未有不兼見一二里症者亦未有不兼見一二半表半裡症者且溫熱屬蒸氣表而里里而表原是不常有里症下之而其邪不盡仍可出表者有譫妄昏沉之後病愈數日復見頭痛發熱復從汗解者此所謂表而再表風寒必無是也更有下症全具用下藥後裡氣通而表亦達頭痛發熱得汗而解胸悶心煩暫從疹斑而解移時復見舌黑心悶腹痛譫妄仍待大下而後愈者此所謂里而再里風寒必無是也若夫表裡分傳三焦齊發之症風寒十無一二溫熱十有六七但據傳經之專雜為辨初起專見一經症者屬風寒初起雜見二三經症者屬溫熱日久而漸傳者屬風寒一日驟傳一二經或二三經者屬溫熱則雖病有變態而風寒不混於溫熱溫熱不混於風寒施治自無誤矣論溫熱伏氣與新感不同新增新感溫熱邪從上受必先由氣分陷入血分里症皆表症侵入於內也伏氣溫熱邪從里發必先由血分轉入氣分表症皆里症浮越於外也新感輕而易治伏氣重而難療此其大要也謂豫不信請述陸氏九芝評孟英之言曰仲景所論溫熱是伏氣天士所論溫熱是外感故以溫邪上受首先犯肺逆傳心包十二字揭之篇首以自別異果如其説則所稱溫熱者即俗所謂小風溫小風熱如目赤頤腫喉梗牙痛之類卻只須辛涼輕劑其病立愈更述薛瘦吟之言曰凡病內無伏氣縱感風寒暑濕之邪病必不重重病皆新邪引發伏邪者也但伏氣有二傷寒伏氣即春溫夏熱病也傷暑伏氣即秋溫冬溫病也邪伏既久血氣必傷故治法與傷寒傷暑正法大異且其氣血亦鈍而不靈故靈其氣機清其血熱為治伏邪第一要義第其間所伏之邪有微甚有淺深人之性質有陰陽有強弱故就中又有輕重之分焉醫必識得伏氣方不至見病治病能握機於病象之先然非熟於亢害承製之理亦豈能測未來之病乎然非謂司天運氣也雨暘寒燠在在留心久當自悟耳由是觀之同一溫熱症而新感之與伏氣病所之淺深不同病情之輕重不同病機之安危不同故其療法亦因之而不同論溫熱即是伏火新增凡伏氣溫熱皆是伏火雖其初感受之氣有傷寒傷暑之不同而潛伏既久蘊釀蒸變逾時而發無一不同歸火化中醫所謂伏火症即西醫所謂內炎症也王秉衡曰風寒暑濕悉能化火血氣鬱蒸無不生火所以人之火症獨多焉朱心農曰東南方天氣多熱地氣多濕最多濕溫濕熱之症正傷寒症極少即云冬月多正傷寒症亦不盡然歷症以來恆見大江以南每逢冬令太溫一遇感冒表分雖有外寒內則竟多伏火悉以伏火治之絲毫不爽故魏柳州曰壯火為萬病之賊嘉約翰曰炎症為百病之源中醫西醫其揆一也雖然同一伏火而濕火與燥火判然不同以治燥火之法治濕火則濕愈遏而熱愈伏勢必為痞滿為嘔厄為形寒熱不揚為腸鳴泄瀉甚則蒙閉清竅譫語神昏自汗肢厥或口噤不語或手足拘攣以治濕火之法治燥火則以燥濟燥猶撥火使揚勢必為灼熱為消渴為熱盛昏狂為風動痙厥甚則鼻煽音啞舌卷囊縮陰竭陽越內閉外脫是以對症發藥必據濕火燥火之現症為憑分際自清誤治自少濕火之症治試先論濕火之症治凡濕火症發於夏至以前者為濕溫夏至以後者為濕熱發於霜降立冬後者為伏暑挾濕其邪必伏於膜原內經所謂橫連膜原是也拯華注膜原即統腹膜空隙之處外通肌膚內近胃腸上連胸膈下包內腎膀胱中有夾縫最易藏邪邪伏於此症必胸腹熱甚按之灼手小便黃赤濁熱者職是之故故凡濕熱內伏之邪必由膜原達外其人中氣實而熱重於濕者則發於陽明胃腸中氣虛而濕重於熱者則發於太陰肺脾初起邪在氣分當分別濕多熱多濕多者濕重於熱也其病多發於太陰肺脾其舌苔必白膩或白滑而厚或白苔帶灰兼黏膩浮滑或白帶黑點而黏膩或兼黑紋而黏膩甚或舌苔滿布厚如積粉板貼不松脈息模糊不清或沉細似伏斷續不勻神多沉困嗜睡症必凜凜惡寒甚而足冷頭目脹痛昏重如裹如蒙身痛不能屈伸身重不能轉側肢節肌肉疼而且煩腿足痛而且酸胸膈痞滿渴不引飲或竟不渴午後寒熱狀若陰虛小便短澀黃熱大便溏而不爽甚或水瀉治法以輕開肺氣為主肺主一身之氣肺氣化則脾濕自化即有兼邪亦與之俱化宜用藿朴夏苓湯體輕而味辛淡者治之啓上閘開支河導濕下行以為出路濕去氣通布津於外自然汗解若兼神煩而昏者此由濕熱鬱蒸過極內蒙清竅前辛淡法去蔻仁厚朴加細辛二三分白芥子錢許辛潤行水開閉再加蘆根一二兩滑石四五錢輕清甘淡泄熱導濕蒙閉即開屢驗不爽若兼大便不利者此由濕阻氣滯或夾痰涎前辛淡法去藿朴豆豉重用栝蔞仁薤白小枳實等味或重用紫菀蘇子搗郁李仁等品此皆味辛質滑流利氣機氣機一開大便自解即汗亦自出隨症均可加入其有濕遏熱伏走入肌肉發為陰黃黃而昏暗如熏黃色而無煩渴熱象或漸次化熱舌苔黃滑口乾而不多飲其未化火者宜苦辛淡溫法如茵陳胃苓湯茵陳五苓散加除疸丸之類已化火者宜苦辛淡清法如清熱滲濕湯黃連溫膽湯藿香左金湯重加茵陳及梔柏絳礬丸之類若誤以脘痞等症為食滯而消之下之則脾陽下陷濕濁內漬轉成洞泄脹滿諸病矣其有腹痛痞滿嘔吐不納舌白或黃手捫之糙渴不引飲大便泄瀉小溲不利或赤而短此濕熱內結於脾而成濕霍亂也如舌苔白膩者宜辛開溫化法如蠶矢湯燃照湯之類舌苔黃滑者宜辛開清解法如藿香左金湯連朴飲之類夾食加楂曲青皮之類總之濕遏熱伏其熱從濕中來只要宣通氣分氣分濕走熱自止矣全在初起一二日藿朴豆豉疏中解表使濕邪從皮腠而排泄白蔻四苓芳淡滲濕使濕邪從內腎膀胱而排泄汗利兼行自然濕開熱透表裡雙解而伏邪自去矣雖然濕熱自內而出恆結於中焦而成痞滿必有痰食錯雜其間前辛淡法中痰鬱加星香導痰丸食滯加沉香百消曲又生萊蔔汁最妙既開濕火之鬱閉亦消痰食之停留隨症均可加入熱多者熱重於濕也其病多發於陽明胃腸熱結在裡由中蒸上此時氣分邪熱郁遏灼津尚未鬱結血分其舌苔必黃膩舌之邊尖紅紫欠津或底白罩黃混濁不清或純黃少白或黃色燥刺或苔白底絳或黃中帶黑浮滑黏膩或白苔漸黃而灰黑伏邪重者苔亦厚而且滿板貼不松脈息數滯不調症必神煩口渴渴不引飲甚則耳聾乾嘔面色紅黃黑混口氣穢濁余則前論諸症或現或不現但必胸腹熱滿按之灼手甚或按之作痛宜用枳實梔豉合小陷胸湯加連翹茵陳之清芬青子芩薑水炒木通之苦辛內通外達表裡兩徹使伏邪從汗利而雙解漸欲化燥渴甚脈大氣粗而逆者重加石膏知母清肺氣而滋化源惟蘆根燈心尤宜多用先煎代水輕清甘淡泄熱化濕下行從膀胱而解外達從白㾦而解或斑疹齊發而解至於傳變凡胃家濕熱鬱蒸肺氣致肺氣不能敷布水精外達下行必見煩渴多汗斑疹停飲發黃等症如熱汗時出大渴引飲輕者用蘆根飲子加花粉知母之類重者用白虎湯加鮮竹葉鮮枇杷葉之類清肺氣泄胃熱虛者加西洋參或珠幾參蓋濕熱一症肅肺清胃如溽暑炎蒸涼風驟起頃刻濕收熱退如登清涼界中矣其有邪走皮膚髮疹邪走肌肉發斑隱隱不現者用杏仁牛蒡木賊草栝蔞皮川貝銀花連翹鮮竹葉通草紫草丹皮之類辛涼開達輕清透絡最忌辛燥升散如藿香厚朴半夏升麻柴胡川芎葛根蘇葉荊芥之類斑疹已出熱重者用白虎湯酌加元參銀花蘆根紫花地丁以解毒而宣化之其飲停胸膈者必見胸膈滿痛心煩乾嘔渴欲飲水水入則吐等症斯時須辨舌苔如舌苔白膩則屬飲重熱因飲鬱而陷宜辛淡化飲辛能行水辛潤又不爍津二陳加芥子最妙重者加細辛二三分尤妙再加淡滲如滑石通草茯苓豬苓澤瀉苡仁之類或用五苓散加清淡如滑石淡竹葉蘆根之類如飲熱並重濕熱與氣液互結舌苔黃膩宜苦辛通降佐以淡滲如小陷胸湯加枳實厚朴浙苓廣皮之類半夏瀉心湯去參草大棗以薑汁炒芩連代乾薑均加滑石通草竹瀝薑汁等味清化濕熱以通利之便閉者必有黏涎濁飲互結胃腸再加控涎丹四五分以洗滌之其有濕熱瘀遏肌肉發為陽黃黃而鮮明如橘皮色宜苦辛佐淡滲茵陳五苓散加梔柏伐木丸以通泄之如濕熱鬱遏肝膽經脈耳聾乾嘔者宜用連茹橘半湯加條芩膽草石菖蒲等苦辛開泄脅痛及欲痙者重加羚角石決明海蛤殼童便等以咸降之既能泄肝又能化濕兩不相悖即邪傳心經神昏讝煩亦須辨舌苔如舌苔黃膩仍屬氣分濕熱內蒙包絡清竅與前同一病因宜用小陷胸湯合半夏瀉心湯去乾薑大棗參草加竹瀝薑汁或用昌陽瀉心湯辛潤以達之苦寒以降之清淡以泄之使濕熱濁邪無地自容其閉自開極重者再加太乙紫金丹如昏蒙而厥者可加厥症返魂丹又有神昏讝煩舌苔黃燥黑燥而有質地此胃腸實邪濁氣壅閉清氣因之亦閉宜小承氣湯合小陷胸湯急下其邪以決壅閉陰虛者加鮮生地元參蘆根鮮冬瓜子等輕利滑利之品滋燥養陰足矣若陰柔滋膩藥多雖用大黃亦恐不解是滋陰轉致傷陰也如舌苔黃厚而滑脈息沉數中脘按之微痛不硬大便不解此黏膩濕熱與有形渣滓相搏按之不硬多敗醬色溏糞宜用小陷胸湯合朴黃丸或枳實導滯丸等緩化而行重者合神芎導水丸或陸氏潤字丸等磨蕩而行設使大劑攻下走而不守則必宿垢不行反行稀水徒傷正氣變成壞症若舌苔黃如沉香色或黃黑而燥脈沉實而小甚者沉微似伏四肢發厥或渴喜熱飲此皆濕熱食滯互結胃腸裡氣不通之象酌用三承氣湯當臍及小腹按痛邪在小腸胃脘下口及臍兩旁按痛邪在大腸熱結旁流按之硬痛必有燥矢均宜調胃承氣湯鹹苦下之脘腹均按痛痞滿燥實堅悉具痞滿為濕熱氣結燥實堅為燥矢甚則上蒸心包下爍肝腎煩躁譫語舌卷囊縮宜大承氣湯加犀連急下之陰傷者加鮮生地元參知母川柏之類足矣蓋速下其邪即所以存津液也少腹按痛大便色黑如漆反覺易行若其人喜笑若狂是腸胃蓄血上干包絡小便色黑自利是膀胱蓄血均宜桃仁承氣湯急下之或合犀角鮮地黃湯以清包絡發黃小便不利腹滿者茵陳蒿湯緩下之其間有氣虛甚而邪實者宜參黃湯陰虧甚而邪實者宜千金生地黃湯去芒硝或養榮承氣湯緩下之即虛極不任下者宜用雪羹加鮮生地汁鮮冬瓜汁元參栝蔞仁蜂蜜梨汁稍加薑汁之類咸滑以去著辛潤以清燥慎勿當下不下徒用滋膩俾邪無出路轉致傷陰亦勿遲回顧慮致令失下虛人尤不可失失則邪愈盛正愈衰後即欲下而不可得矣更有濕熱化燥傷及腎陰旦慧夕劇面少華色或邪傷肝之經脈發痙發厥審其有熱無結則又惟有酌用阿膠雞子黃湯養陰熄風而已其或病中遺滑濕熱襲入精竅小便澀痛者導赤散合加味虎杖散一面養陰通竅一面化濕泄熱其症自愈或用豬苓湯合豭鼠矢散亦效切忌用止澀藥以強止之至於伏暑由夏令吸收之暑氣與濕氣蘊伏膜原至秋後而發者是也內經曰夏傷於暑秋必痎瘧又曰逆夏氣則傷心秋為痎瘧奉收者少冬至重病此即經論伏暑晚發之明文也就余所驗發於處暑以後者名曰伏暑病尚易治發於霜降後冬至前者名曰伏暑晚發病最重而難治其伏邪往往因新邪而發如葉氏云伏暑內發新涼外束確多是症初起惡寒發熱午後較重狀似瘧疾而不分明繼而但熱不寒熱甚於夜噁心胸悶口乾不喜飲至晨得汗身熱稍退而胸腹之熱不除日日如是往往五七候始解治法須辨其舌舌苔白膩而厚或中雖黃黑而邊仍白滑膜原濕遏熱伏也宜用新定達原飲加藿香青蒿達膜原而解外邪外邪解而熱不罷汗自出不惡寒反惡熱即伏邪發現矣苔必轉黃而糙或黃厚而膩症必胸腹痞滿按之軟而作痛大便或祕或溏或雖解不多或雖多而仍覺不爽小便必赤澀或黃濁此由濁熱黏膩之伏邪與腸中糟粕相搏必積有溏醬糞宜用加味小陷胸湯加陸氏潤字丸緩通之或加枳實導滯丸緩下之往往服二三錢大解一次再服再解不服不解如此服五六次行五六次而伏邪始盡若里邪已盡而熱仍不退者審其舌無多苔或苔薄而無質地即邪少虛多陰虛火旺矣則一以育陰養液肅清餘熱為主如甘露飲去熟地加西洋參蔗漿梨汁之類若虛甚而神氣消索一無實熱現象者甘涼猶不中的宜用甘平溫潤之劑如參麥六味加減復脈之類頻進而墊托之切勿見其無速效而中途易法致今不救余每見伏邪因中無砥柱內含空虛乘虛內陷得育陰墊托從中下焦血分復還氣分於胸腹缺盆肩頸肘臂等部位發白㾦而解若枯白無水則又為陰涸之象症多不治舌絳干光或鮮紅起刺症若悶瞀厥逆日輕夜重煩躁不寧左脈弦數者必邪伏血分深入陰經也病多凶變挽救之法須審其火重而便通者宜清石氏犀角地黃湯主之兼神昏蒙閉者重加瓜霜紫雪丹以宣心腦之絡熱火重而便閉者宜下拔萃犀角地黃湯主之兼風動痙厥者重加羚羊角龍膽草清童便以熄肝膽之風火大勢瘥後一以育陰潛陽為主三甲復脈湯加減或以葉氏加減復脈湯育陰墊托往往有從里達表舌起白苔伏邪由汗而解將欲汗時脈必浮緩苔必宣松汗解後白舌苔有即退者有遲一二日始退者必得苔淨脈靜身涼舌之兩旁再生薄白新苔方為邪盡如伏暑初起有因秋燥及冬溫時氣觸引而發者舌多燥白或望之似潤捫之仍糙症兼咳吐黏痰胸部串痛唇乾齒燥或咽乾喉痛當先以邵氏熱鬱湯辛涼輕潤以宣解上焦之新邪余可仍仿前法酌用之至於伏暑兼寒而化瘧挾滯而化痢參看溫熱兼症療法門可也茲不贅以上皆濕火症初中未傳變之大要也餘症詳本書溫熱各論中燥火之症治次論燥火之症治易曰火就燥燥萬物者莫熯乎火沈堯峰曰溫熱二症火氣兼燥薛瘦吟曰溫熱之邪皆從燥化其為病也多燥而少濕有熱而無寒故只須以中焦津液為主而清解絡熱為要由是觀之非特風溫暑溫伏暑溫毒之伏火症火易就燥即冷溫濕溫之兼寒兼濕而寒鬱之久必從火化濕鬱之極必兼燥化也其病四時皆有而深秋初冬為尤甚其邪必伏於血絡內經所謂內舍於營是也大凡肝絡鬱而相火劫液液結化燥者火盛則發於少陽膽經風動則發於厥陰肝經心絡鬱而君火爍陰陰虛化燥者上蒸則發於太陰肺經下爍則發於少陰腎經而無不纍及陽明胃腑者以胃主一身之津液也拯華注西醫云腸胃消化器為一身之津液路初起邪在血分當分別實火虛燥實火從伏邪入血血鬱化火火就燥而來病勢較濕火症尤急而重用藥必不可輕如發自少陽膽經者必相火熾而營分大熱首犯胃經血分其舌色必鮮紅起刺或鮮紅而舌根強硬或純紅而有小黑點或純紅而有深紅星間有紅點如蟲碎之狀者或純紅而苔黏有裂紋如人字川字爻字不等或裂紋如直槽者脈息弦滑而盛躁或右大而左弦數神多煩躁甚或如醉如狂攪亂驚竄色必面赤如朱目白均現紅絲症必壯熱而渴不惡寒反惡熱目眩耳聾口苦幹嘔胸腹熱甚按之灼手熱汗時出甚或發疹發斑小便短數赤熱大便燥結治法宜清解膽火之郁救胃液之燥以預防肝經風動先用犀地桑丹湯清營透絡俾伏邪從斑疹而解或從戰汗而解若斑疹及戰汗出後伏火猶熾則用犀連承氣湯合更衣丸急下之使伏火從大便而解亦有火毒內結清透之而斑疹不顯反從下後而斑疹始發透者或有透發不應只用清火解毒如犀羚白虎湯加金汁白頸蚯蚓甘蘿根汁斑疹反大透而伏火始解解後用千金生地黃煎清餘火而復胃液若虛羸少氣氣逆欲吐用竹葉石膏湯加鮮竹茹鮮茅根青蔗漿配薑汁數點和胃氣而復清津如發自厥陰肝經者必肝火熾而內風扇動最傷胃家津液其舌色焦紫起刺如楊梅或舌苔兩旁有紅紫點或舌紫而無苔有點或舌紅無苔而膠干或泛漲而似膠非膠或無液而干黏帶澀脈多弦緊搏數神多昏沉蒙閉或如癡如醉尸厥不語症必熱深厥深咽乾舌燥頭面動搖口噤齒齘腿腳攣急時發瘛瘲甚或睪丸上升宗筋下注少腹裡急陰中拘攣或腸燥拘急有似硬梗按之痛甚蜷曲難伸衝任脈失營養當臍上下左右按之堅硬動躍震手虛里穴及心房亦必動躍異常治法宜急救血液之燥熄風火之亢以預防陰竭陽越急用犀羚二鮮湯或滋液救焚湯重加瓜霜紫雪丹先清其神而熄風繼用龍膽瀉肝湯或平陽清裡湯鹹苦寒降以瀉火終用阿膠雞子黃湯或三甲復脈湯滋陰液以鎮肝陽虛燥從伏邪傷陰陰虛生火火就燥而成病勢較實火症似緩實重用藥必貴乎補如發於太陰肺經者必君火被內風相煽蒸肺津而消胃液其舌必嫩紅而干或絳底浮白舌形胖嫩甚或舌苔紅中有白糜點脈多右浮大無力左弦數無力甚則細徑神多困倦或反煩躁症多頭昏心悸咽乾喉燥氣喘咳逆或乾咳無痰即有稀痰亦黏著喉間咯吐不爽或痰中間有紅絲紅點睡時不能仰臥仰臥即氣逆而咳咳則心下煽動或只能側臥一邊翻身則咳不休朝涼暮熱少氣薄力治法宜清金制木保肺和胃為首要如清燥救肺湯加岩制川貝葛氏保和湯加潤肺雪梨膏之類以潤燥而止咳若燥回咳減而發熱不休者則以青蒿鱉甲煎合顧氏清金散以退陰分伏熱而平其氣咳大勢輕減後當以顧氏保陰煎善其後如發自少陰腎經者必君火與真水不交水愈虧則火愈旺其舌多嫩紅而燥或舌心雖黑無甚苔垢或舌本枯而不甚赤脈多右大無力左弦細數甚或沉細澀數或浮大革數神多虛煩甚或驚悸或極疲倦症多夢遺精滑或夢與鬼交潮濕盜汗平旦病減午後病增口乾舌燥顴紅唇赤五心煩熱腰痠足冷甚或骨痿於床氣浮而咳或氣喘而促或頭暈咽病大便多祕或反溏滑小便短數溺有餘瀝或精隨溺而帶出治法宜滋陰潤燥交濟心腎為首要周氏新加六味湯主之間有可用六味加犀角湯者若濟君火則加枸杞元參若輸肺金則加生麥散火甚者加黃柏龜板或專用丹溪大補陰丸滋陰潛陽以苦寒培生氣而堅陰較六味地黃湯更優如小便清和無痰氣者只須專意滋腎張氏左歸飲多服為佳以上皆燥火症實與虛傳變之大要也餘症亦詳本書溫熱各論中總之濕火燥火症治最要分清惟濕去燥來燥又夾濕之際最難調治稍一偏勝則非液涸即氣滯矣臨症者不可不細參也論溫熱本症療法新增自吳氏溫病條辨王氏溫熱經緯二書行世而醫家始知傷寒自傷寒溫熱自溫熱然皆言新感溫暑居多而於伏氣溫熱之理由尚未發明盡致茲將歷代前哲言伏氣溫熱之因症脈治一一詳述於後黃帝內經曰冬傷於寒春必病溫尺膚熱甚脈盛躁者其脈盛而滑者病且出也有病溫者汗出輒復熱而脈躁疾不為汗衰狂言不能食病名陰陽交交者死也故病溫虛甚死經又曰冬傷於寒春生疸熱熱病太陽之脈色榮顴骨與厥陰脈爭見者死期不過三日少陽之脈色榮頰前與少陰脈爭見者死期不過三日熱病三日而氣口靜人迎躁者取之諸陽五十九刺熱病七八日動喘而弦者急刺之熱病七日八日脈微小病者溲血口中乾一半日而死脈代者一日死熱病已得汗出而脈尚躁喘且復熱勿刺膚喘甚者死熱病七日八日脈不躁躁不散數後三日中有汗三日不汗四日死未曾汗者勿腠刺之熱病不知所痛耳聾不能自收口乾陽熱甚陰頗有寒者熱在骨髓死不可治熱病已得汗而脈尚躁盛此陰脈之極也死其得汗而脈靜者生熱病者脈尚躁甚而不得汗者此陽脈之極也死脈盛躁得汗而靜者生凡熱病不可刺者有九一曰汗不出大顴發赤噦者死二曰泄而腹滿甚者死三曰目不明熱不已者死四曰老人嬰兒熱而腹滿者死五曰汗大出嘔下血者死六曰舌本爛熱不已者死七曰咳而衄汗不出出不至足者死八曰髓熱者死九曰熱而痙者死腰折瘛瘲齒噤齘也此九者不可刺也當瀉其熱而出其汗實其陰以補其不足廉按此二句實治溫熱之總訣此軒岐之論溫熱也秦越人難經曰濕溫溫病熱病其所苦各不同濕溫之脈陽濡而弱陰小而急溫病之脈行在諸經不知何經之動也各隨其經所在而取之熱病之脈陰陽俱浮浮之而滑沉之散澀又曰熱病在內者取其會之氣穴也廉按腑會太倉臟會季脅筋會陽陵泉髓會枕骨血會膈俞骨會大杼脈會太淵氣會三焦外一筋直兩乳內此謂八會為當時治熱病者取穴用針之法此扁鵲之論溫熱也張長沙傷寒論張石頑云仲景溫病熱病諸例向來混入傷寒六經例中致使後世有以黃芩白虎湯誤治傷寒者有以黃芩白虎證誤呼傷寒者良由混次不分以致矇昧千古今將溫熱諸條另析此篇俾學者知傷寒論自有溫熱症治也曰太陽病發熱而渴不惡寒者為溫病若發汗已身灼熱者名曰風溫風溫為病脈陰陽俱浮自汗出身重多眠睡鼻息必鼾語言難出若被下者小便不利直視失溲若被火者微發黃色劇則如驚癇時瘛瘲若火熏之一逆尚引日再逆促命期太陽與少陽合病自下利者與黃芩湯若嘔者黃芩加半夏生薑湯主之陽明病脈浮而緊咽燥口苦腹滿而喘發熱汗出不惡寒反惡熱身重若發汗則躁心憒憒反譫語若加燒針必怵惕煩躁不得眠若下之則胃中空虛客氣動膈心中懊憹舌上苔者梔子豉湯主之廉按陸氏云心中懊憹三句語意當在汗下溫針之上若脈浮發熱渴欲飲水小便不利者豬苓湯主之陽明病汗出多而渴者不可與豬苓湯以汗多胃中燥豬苓湯復利其小便故也三陽合病脈浮大上關上但欲眠睡目合則汗三陽合病腹滿身重難以轉側口不仁面垢譫語遺尿發汗則譫語下之則額上生汗手足逆冷若自汗出者白虎湯主之廉按陸氏云白虎湯主之語意在汗下之上傷寒脈浮滑此表有寒里有熱白虎湯主之傷寒脈滑而厥者里有熱也白虎湯主之傷寒脈浮發熱無汗其表不解者不可與白虎湯渴欲飲水無表症者白虎加人參湯主之傷寒無大熱口燥渴心煩背微惡寒者白虎加人參湯主之傷寒若吐若下後七八日不解熱結在裡表裡俱熱時時惡風口渴舌上乾燥而煩欲飲水數升者白虎加人參湯主之服桂枝湯大汗出後大煩渴不解脈洪大者白虎加人參湯主之以上三陽發溫熱例師曰伏氣之病以意候之今月之內欲有伏氣假令舊有伏氣當須脈之若脈微弱者當喉中痛似傷非喉痹也病人云實喉中痛雖爾今復下利少陰病二三日咽痛者可與甘草湯不瘥者與桔梗湯少陰病下利咽痛胸滿心煩者豬膚湯主之少陰病得之二三日以上心中煩不得臥黃連阿膠湯主之少陰病下利六七日咳而嘔渴心煩不得眠者豬苓湯主之少陰病得之二三日口燥咽乾者急下之宜大承湯以上少陰發溫熱例廉按張石頑曰溫熱自里達表故三陽合病最多發於三陽者易治發於三陰者難治然發於三陰者必有所因或因冷酒傷脾或因鬱怒傷肝或因色欲傷腎皆元氣先傷伏邪乘虛而發設用甘溫調補豈不助邪轉熾若行苦寒峻攻真元立致消亡雖長沙復起恐難為力矣濕家其人但頭汗出背強欲得被復向火若下之早則噦胸滿小便不利舌上如苔者以丹田有熱胸中有寒渴欲得飲而不能飲則口燥煩也廉按丹田有熱是伏邪胸中有寒是新感寒濕此濕痹之偏於熱者即是濕遏熱伏之一證但頭汗出亦是濕熱上蒸惟背強欲得被復向火確是新感寒濕然必兼一身盡痛關節煩疼若純是寒濕誤下必下利不止而死矣實因濕未化燥熱未成實醫者下之太早故噦而胸滿小便不利矣張氏石頑主用黃連湯和解其上下之寒熱卻是濕溫救誤之良法故余仿其例引為長沙論濕溫之症此仲景之論溫熱也王氏傷寒例曰冬時嚴寒中而即病者名曰傷寒不即病者寒毒藏於肌膚至春變為溫病至夏變為暑病暑病者熱極重於溫也是以辛苦之人春夏多溫熱病者皆由冬時觸寒所致非時行之氣也若更感異氣變為他病者廉按異氣者謂伏邪將發未發之際又感別異之時氣引發伏邪而出也當依兩感症病而治之如脈陰陽俱盛重感於寒者變為溫瘧陽脈浮滑陰脈濡弱者更遇於風變為風溫陽脈洪數陰脈實大者更遇溫熱變為溫毒溫毒為病最重也陽脈濡弱陰脈弦緊者更遇瘟氣變為溫疫此叔和之論溫熱也巢氏諸病源候論曰辛苦之人春夏必有溫熱病者皆由其冬時觸冒之所致有冬月觸冒寒毒伏至春暖始發病者有冬月天時溫暖人感其氣未即發病至春又被積寒所折毒氣不得發泄至夏遇熱溫毒始發者皆由表裡受邪經絡損傷臟腑俱病也其候多端姑言其要一溫病發斑候或已發汗吐下而表證未罷毒氣不散故發斑溫毒發出於肌膚斑爛隱疹如錦紋也二溫病煩候此由陰氣少陽氣多故身熱而煩其毒氣在於心府而煩者則令人悶而欲嘔若其胃內有燥糞而煩者則謬語而繞臍痛也三溫病狂言候邪盛則四肢實實則能登高而歌熱盛於身故棄衣而走陽盛故妄言罵詈不避親戚大熱遍身狂言而妄聞視也四溫病嗽候邪熱客於胸府上焦有熱其人必飲水水停心下則上乘於肺故令嗽五溫病嘔候胃中有熱穀氣入胃與熱相併氣逆則嘔或吐下後飲水多胃虛冷亦為嘔也六溫病噦侯伏熱在胃令人胸滿胸滿則氣逆氣逆則噦若大下後胃氣虛冷亦令致噦七溫病渴候熱氣入於腎諼腎臟惡燥熱盛則腎燥腎燥則渴引飲八溫病變成黃候發汗不解溫毒氣瘀結在胃小便為之不利故變成黃身如金色九溫毒咽痛候熱毒在於胸府上攻咽喉故痛或生瘡十溫病毒攻眼候肝開竅於目肝氣虛熱毒乘虛上衝於目故赤痛重者生瘡翳也十一溫病衄候肺主氣而開竅於鼻邪熱傷於心故衄衄者血從鼻出也十二溫病吐血候熱毒入深結於五臟內有瘀血積故吐血十三溫病下利候風熱入於腸胃故令洞泄若挾毒則下黃赤汁及膿血十四溫病膿血利候熱毒甚者傷於腸胃故下膿血如魚腦或如爛肉汁此由溫毒氣盛故也十五溫病大便不通候脾胃有積熱發汗太過則津液少使胃干結熱在內故大便不通十六溫病小便不通候發汗後津液少膀胱有結熱故小便不通十七溫病下部瘡候熱攻腸胃毒氣既盛穀氣漸衰故三蟲動作食人五臟故下部生瘡重者肛爛十八溫病勞復候為病新瘥津液未復血氣尚虛因勞動早更生於熱熱氣還入經絡覆成病也故凡梳頭洗浴諸勞事等皆須慎之十九溫病食復候凡得溫毒病新瘥脾胃尚虛穀氣未復若食犬豬羊肉並腸血及肥魚炙脂膩食此必大下利下利則不可復救又禁食餅餌炙膾棗栗諸生果難消物則不能消化停積在於腸胃便脹滿結實大小便不通因更發熱覆成病也二十溫病陰陽易候陰陽易病者是男子婦人溫病新瘥未平復而與之交接因得病者名為陰陽易也其男子病新瘥未平復而婦人與之交接得病者名陽易其婦人得病雖瘥未平復男子與之交接得病者名陰易其病之狀身體熱沖胸頭重不舉眼中生眯四肢拘急小腹㽱痛手足拳皆即死其亦有不即死者病苦小腹裡急熱上衝胸頭重不欲舉百節解離經脈緩弱氣血虛骨髓竭便恍恍吸吸氣力轉少著床不能搖動起居仰人或引歲月方死二十一溫病交接勞復候病雖瘥陰陽未和因早犯房室令人陰腫縮入腹腹㽱痛名為交接之勞復也二十二溫病瘥後諸病候其人先有宿疾或患虛勞風冷積聚寒疝等疾因溫熱病發汗吐下之後熱邪雖退而血氣損傷腑臟皆虛故因茲而生諸病二十三熱病煩候此由陽勝於陰熱氣獨盛痞結於臟則三焦隔絶故身熱而煩二十四熱病疱瘡候此由表虛里實熱氣盛則發瘡重者周布遍身若瘡色赤頭白則毒輕色紫黑則毒重其形如登豆故名登豆瘡二十五熱病斑瘡候夫病在表或未發汗或已發汗吐下後表證未解毒氣不散煩熱而渴渴而不能飲表虛里實故身體發斑如錦紋二十六熱病熱瘡候表有風濕與熱氣相搏則身體生瘡癢痛而膿汁出甚者一瘥一劇二十七熱病口瘡候此由脾臟有熱衝於上焦故口生瘡二十八熱病咽喉瘡候上實下虛熱氣內盛熏於咽喉故生瘡二十九熱病大便不通候病經發汗汗出多則津液少津液少則胃干結熱在胃故大便不通又有腑臟自生於熱者此由三焦痞隔脾胃不和蓄熱在內亦大便不通也三十熱病小便不通候熱在膀胱流於小腸熱盛則脾胃干津液少故小便不通三十一熱病下利候熱氣攻於腸胃胃虛則下赤黃汁挾毒則成膿血三十二熱病𧈟候熱氣攻於腸胃則穀氣衰所以三蟲動作食人五臟及下部重者肛爛見腑臟三十三熱病毒攻眼候肝開竅於目肝氣虛熱毒乘虛則上衝於目重者生瘡翳及赤白膜也三十四熱病毒攻手足候人五臟六腑井滎俞皆出於手足指今毒氣從腑臟而出循於經絡攻於手足故手足指皆腫赤焮痛三十五熱病嘔候胃內有熱則穀氣不和新谷入胃與熱氣相搏胃氣不平故嘔或吐下已後臟虛亦令嘔也三十六熱病噦候伏熱在胃則令人胸滿胸滿則氣逆氣逆則噦若大下已後飲水多胃內虛冷亦令噦也三十七熱病口乾候此由五臟有虛熱脾胃不和津液竭少故口乾三十八熱病衄候心臟傷熱所為也肺開竅於鼻邪熱與血氣並故衄衄者血從鼻出也三十九熱病勞復候夫熱病新瘥津液未復血氣尚虛因勞動早勞則生熱熱氣乘虛還入經絡故復病也四十熱病後沉滯候凡病新瘥後食豬肉及羊血肥魚脂膩等必大下利醫所不能復治也必至於死若食餅餌粢飴哺炙膾棗栗諸果物及堅牢難消之物胃氣尚虛弱不能消化必結熱復病還以藥下之此元方之論溫熱也孫氏千金方曰風溫之病脈陰陽俱浮汗出體重其息必喘其形狀不仁默默但欲眠下之者則小便難發其汗者必譫語加燒針者則耳聾難言但吐下之則遺矢便利如此疾者宜服葳蕤湯又治溫熱病方十一治肝腑臟溫病陰陽毒頸背雙筋牽先寒後熱腰強急縮目中生花方梔子豆豉柴胡鮮生地大青芒硝白朮桂心生薑石膏二治肝腑臟溫病陰陽毒先寒後熱頸筋攣牽面目赤黃身中強直方元參細辛梔子黃芩升麻芒硝石膏竹葉車前草三治心腑臟溫病陰陽毒戰掉不安驚動方大青黃芩梔子知母芒硝麻黃元參石膏生葛根生地黃四治脾腑臟溫病陰陽毒頭重頸直皮肉痹結核隱起方大青羚羊角升麻射干芒硝梔子寒水石元參五治肺腑臟溫病陰陽毒咳嗽連續聲不絶嘔逆方麻黃梔子紫菀大青元參葛根桂心甘草杏仁前胡石膏六治腎腑臟溫病身面如刺腰中欲折熱毒內傷方茵陳梔子芒硝苦參生葛鮮生地石膏蔥白豆豉七治溫毒攻胃下黃赤汁及爛肉汁赤滯下伏氣腹痛諸熱毒方梔子豆豉薤白八治溫病後勞復或食或飲或動作方梔子豆豉石膏鼠屎九治溫病後食太飽不消勞復脈實者方梔子豆豉鼠屎大黃十治溫病後勞復氣欲絶方麥冬甘草大棗竹葉粳米又曰凡熱病新瘥後食堅實難消之物胃氣尚虛弱不能消化必更結熱適以藥下之則胃氣虛冷大利難禁不下之必死下之復危皆難救也熱病及大病之後多坐此死不可不慎也故凡溫熱病新瘥後但得食糜粥寧少食令飢慎勿飽不得他有所食雖思之勿與之也引日轉久可漸食羊肉白糜若羹汁雉兔鹿肉不可食豬狗肉亦然又當靜臥慎勿早起梳頭洗面非但體勞亦不可多言語用心使意勞煩凡此皆令人勞復余勞尚可女勞則死當吐舌數寸或吐涎而死故溫病新瘥未滿百日氣力不平復而犯房室名為陰陽易之病皆難治多死此思邈之論溫熱也王氏外臺祕要曰溫熱病頭痛骨肉煩疼口燥心悶者外寒內熱者或已下之餘熱未盡者或熱病自得利有虛熱煩渴者宜服古今録驗知母解肌湯或已下及自得下虛熱未歇者除麻黃加知母葛根病熱未除因而夢泄者除麻黃加白薇人參各二錢則止冬溫未即病至春被積寒所折不得發至夏熱其春寒解冬溫毒始發出肌中斑爛隱疹如錦紋而咳心悶嘔吐清汁眼赤口瘡下部亦生瘡宜服古今録驗漏蘆橘皮湯得下為佳下後餘症未除更服葛根橘皮湯溫毒發斑赤斑者五死一生黑斑者十死一生宜服備急黑奴丸若渴但與水須臾當寒寒訖便汗則解日移五丈不覺更服一丸此療六日胸中當大熱口噤名壞病醫所不療服此丸多瘥若但溫毒發斑宜服肘後黑膏使毒從皮中出則愈溫病有熱飲水暴冷而厄者宜服小品茅根湯枇杷葉飲子亦效茅根橘皮湯尤佳肺腑臟熱暴氣斑點宜服刪繁香豉湯溫毒病吐下後有餘熱而渴宜服深師芍藥湯此圭孫之論溫熱也朱氏類證活人書云夏至以前發熱惡寒頭疼身痛其脈浮緊者此名溫病也病由冬傷於寒伏至夏至以前發為溫病蓋因春溫暖之氣而發也治法解肌湯最良熱多者煩渴發熱不惡寒或虛煩並竹葉石膏湯次第服之脈尺寸俱浮頭疼身熱常自汗出體重其息必喘四肢不收默默但欲眠此名風溫也其人素傷於風因復傷於熱風熱相薄即發風溫主四肢不收頭疼身熱當自汗出不解治在少陰厥陰不可發汗發汗即譫言獨語內煩躁擾不得臥若驚癇目亂無精療之者復發其汗如此死者醫殺之也治法宜葳蕤湯若身灼熱者知母乾葛湯渴甚者栝蔞根湯脈浮身重汗出者漢防己湯兩脛逆冷滿腹滿多汗頭目痛苦妄言此名濕溫也病由濕熱相薄則發濕溫其脈陽濡而弱陰小而急治在太陰不可發汗汗出必不出言耳聾不知痛所在身青面色變名曰重暍如此死者醫殺之也白虎加蒼朮湯主之初春病人肌肉發斑癮疹如錦紋而咳心悶但嘔清汁此名溫毒也溫毒發斑者冬時觸冒疹毒至春始發病初在表或已發汗吐下而表證未罷毒氣不散故發斑黑膏主之又有冬月溫暖人感乖戾之氣冬未即病至春或被積寒所折毒氣不得泄至天氣暄熱溫毒始發則肌肉斑爛癮疹如錦紋而咳心悶但嘔清汁葛根橘皮湯主之黃連橘皮湯尤佳病人先熱後寒尺寸脈俱盛此名溫瘧也白虎加桂枝湯主之久不愈者服瘧母煎丸當自愈夏月發熱惡寒頭疼身體肢節痛重其脈洪盛者此名熱病也病由冬傷於寒因暑氣而發為熱病治法桂枝石膏湯主之梔子升麻湯亦可選用此奉議之論溫熱也劉河間傷寒六書云有表而熱者謂之表熱無表而熱者謂之裡熱凡表裡俱熱之症或半在表或半在裡汗之不可吐之又不可法當和解用涼膈天水二散合服水煎解之或表熱多裡熱少天水一涼膈半或裡熱多表熱少涼膈一天水半合和解之若仍不能退其熱者用黃連解毒湯直清裡熱熱勢更甚者大柴胡合大承氣湯下之雙除表裡之熱大柴胡合三一承氣湯亦佳下症未全不可下者用白虎湯或知母石膏湯其症初起有暴發而為熱者病在心肺宜用局方雄黃解毒丸有里病積熱者病在腎肝宜用局方妙香丸如上焦熱而煩者宜用牛黃散但上焦熱無他症者宜用桔梗湯中焦有濕熱不能食而熱者脾虛也宜以藿朴白朮陳皮之類治之中焦有實熱能食而熱者胃實也宜以梔子黃芩湯或三黃丸之類治之臟腑熱極大便閉結者宜用大黃牽牛散若病久憔悴寢汗發熱五臟齊損瘦弱虛煩腸澼下血骨蒸痿弱四肢無力不能運動者此久熱骨蒸也病在下焦肝腎宜養血益陰熱能自退當歸生地合錢氏地黃丸之類如熱入血室發狂不認人者宜用牛黃膏以宣解之如陽狂奔走罵詈不避親疏此陽有餘陰不足宜用當歸承氣湯下之若兩脅肋熱或一身夜熱或日晡肌熱者皆為血熱也四順飲子主之若小便閉而不通臍下狀如復碗痛悶不可忍者乃腸胃乾涸膻中氣不下三焦氣不化也宜用八正散加沉香木香令氣通達小便自通此守真之論溫熱也李氏此事難知云冬傷於寒春必溫病蓋因房室勞傷與辛苦之人腠理開泄少陰不藏腎水涸竭而得之無水則春木無以發生故為溫病至長夏之時時強木長因絶水之源無以滋化故為大熱病也邪之所感淺者其病輕而易治深者其病重而難治尤深者其病死而不治此東垣之論溫熱也朱氏脈因證治云因房勞辛苦之過腠理開泄少陰不藏觸冒冬時殺厲之氣嚴寒之毒中而即病曰傷寒不即病寒毒藏於肌膚之間至春變為溫病至夏變為熱病皆熱不得發泄鬱蒸於內遇感而發雖曰傷寒實為熱病死症甚多一溫病二三日體熱腹滿頭痛飲食如故脈直而疾者八日死二溫病四五日頭痛腹滿而吐脈來細徑十二日死三溫病八九日頭身不痛目不赤身不變而反利脈來牒牒按之不彈手時大心下堅十七日死四溫病汗不出出不至足者死五溫病厥汗出腎脈強急者生虛緩者死六溫病下痢腹中痛甚者死七熱病七八日不汗躁狂口舌暴燥焦黑脈反細弱或代者死八熱病得汗脈躁者死脈轉大者死九熱病七八日脈不躁喘不數後三日中有汗不汗者四日死十熱病脈澀小疾腹滿膨脹身熱不得大小便死十一熱病脈浮大絶喘而短氣大衄不止腹中疼死十二熱病脈浮洪腸鳴腹滿四肢清注泄死十三熱病脈絶動疾便血奪形肉身熱甚死十四熱病脈小疾咳喘眩悸奪形肉身熱死十五熱病腹脹便血脈大時時小絶汗出而喘口乾視不見者死十六熱病脈轉小身熱甚死十七熱病脈轉小身熱甚咳而便血目陷妄言循衣縫躁擾不臥死十八熱病嘔血咳而煩滿身黃腹脹泄不止脈絶死十九熱病瘛瘲狂走不能食腹滿胸痛引腰脊嘔血死二十熱病不知所痛不能自收口乾陽熱甚陰頗有寒者死二十一熱病在腎口乾渴舌燥黃赤日夜飲水不知腹大脹尚飲目無精光者死二十二熱病喘咳唾血手足腹腫面黃振栗不言名肺絶死丁日死後仿此二十三熱病頭痛嘔宿汗嘔逆吐血水漿不入口狂妄腹大滿名脾絶死二十四熱病煩滿骨痛嗌腫不可咽欲咳不能咳歌笑而哭名心絶死二十五熱病僵臥足不安地嘔血血妄行遺屎溺名肝絶死二十六熱病喘悸吐逆骨痛短氣目視不明汗如珠名腎絶死此丹溪之論溫熱也王氏溯洄集云傷寒以病因而為病名溫病熱病以天時與病形而為病名傷寒即發於天令寒冷之時而寒邪在表閉其腠理故非辛甘溫之劑不足以散之此仲景桂枝麻黃等湯之所以必用也溫病熱病後發於天令暄熱之時伏熱自內而達於外郁其腠理無寒在表故非辛涼或苦寒或酸苦之劑不足以解之此仲景桂枝麻黃等湯獨治外者之所以不可用而後人所處水解散大黃湯千金湯防風通聖散之類兼治內外者之所以可用也夫即病之傷寒有惡風惡寒之證者風寒在表而表氣受傷故也後發之溫病熱病有惡風惡寒之證者重在風寒新中而表氣亦受傷故也若無新中之風寒則無惡風惡寒之證故仲景曰太陽病發熱而渴不惡寒者為溫病溫病如此則知熱病亦如此且溫病熱病亦有先見表證而後傳裡者蓋伏熱自內達外熱鬱腠理不得外泄遂復還里而成可攻之證非如傷寒從表而始也或者不悟此理乃於春夏溫病熱病而求浮緊之脈不亦疏乎殊不知緊為寒脈有寒邪則見之無寒邪則不見也其溫病熱病或見緊脈者乃重感不正之暴寒與內傷過度之冷食也豈其本然哉夫溫病熱病之脈多在肌肉之分而不甚浮且右手反盛於左手者誠由鬱熱在內故也其或左手盛或浮者必有重感之風寒否則非溫病熱病自是暴感風寒之病耳凡溫病熱病若無重感表證雖間見而里病為多故少有不渴者斯時也法當治裡熱為主而解表兼之亦有治里而表自解者余每見世人治溫熱病雖誤攻其里亦無大害誤發其表變不可言此足以明其熱之自內達外矣其間有誤攻裡而致大害者乃春夏暴寒所中之新感症邪純在表未入於裡故也不可與溫病熱病同論雖然傷寒與溫病熱病其攻裡之法若果是以寒除熱固不必求異其發表之法斷不可不異也若溫病熱病被時行不正之氣所發及重感異氣而變者則又當觀其何時何氣參酌而治尤不可例以仲景即病傷寒藥通治也此安道之論溫熱也汪氏證治要訣云溫與熱有輕重之分故仲景云若遇溫氣則為溫病更遇溫熱則為溫毒熱比溫為尤重故也苟但冬傷於寒至春而發不感異氣名曰溫病病稍輕溫病未已更遇溫氣變為溫毒亦可名曰溫病病較重此伏氣之溫病也又有不因冬月傷寒至春而病溫者此特春溫之氣可名曰春溫如冬之傷寒秋之傷濕夏之中暑相同此新感之溫病也以此觀之是春之病溫有三種不同有冬傷於寒至春發為溫病者有溫病未已更遇溫氣則為溫病與重感溫氣相雜而為溫病者有不因冬傷於寒不因更遇溫氣只於春時感春溫之氣而病者若此三者皆可名為溫病不必各立名色只要辨其病源之不同而已此石山之論溫熱也王氏傷寒準繩云從立春節後其中無暴大寒又不冰雪而有人壯熱為病者此屬春時陽氣發於外冬時伏寒變為溫病按活人所云溫病有二其用升麻解肌湯者乃正傷寒太陽證惡寒而不渴者特以其發於溫暖之時故謂之溫病爾其用竹葉石膏湯者乃仲景所謂渴不惡寒之溫病也必須細別勿令誤也然不惡寒而渴之溫病四時皆有之不獨春時而已發汗不解身灼熱者為風溫其證脈浮汗自出身重多眠其病不獨見於春間脛冷腹滿頭痛渴而熱者為濕溫汗少者白虎加蒼朮汗多者白虎加桂枝陽脈洪數陰脈實大者遇溫熱變為溫毒初春發斑咳嗽其病最重若無汗者以三黃石膏湯汗之若有自汗者宜人參白虎湯主之煩熱錯語不得眠者白虎黃連解毒湯主之表熱又盛者加葛根若內實大便不通宜三黃瀉心湯下之或大柴胡湯加芒硝下之亦可若斑出如錦紋者多難治人參化斑湯元參升麻合黑膏大青四物湯主之若冬傷於寒至夏而變為熱病者此則遇時而發自內達表之病俗謂晚發是也又非暴中暑熱新病之可比但新中暑病脈虛晚發熱病脈盛此肯堂之論溫熱也方氏丹溪心法附余云溫熱之病皆由秋冬之時外感風寒內傷飲食其時天氣收藏不能即發以致氣血怫鬱變為積熱至春夏之際又因外感內傷觸動積熱其時天氣升浮故能發出其熱自內達外初以表裡俱熱宜用涼膈散雙解散之類辛涼之劑兩除表裡之熱久則表熱微而裡熱甚又宜用大柴胡湯三一承氣湯之類苦寒之劑以瀉之則熱退身涼而病自已也但涼膈雙解治表裡俱實者最妙如初起表虛者多自汗二方中宜去麻黃薄荷裡虛者多泄瀉二方中宜去芒硝大黃若表裡俱虛而燥熱煩渴者宜用人參白虎湯今人不諳伏氣溫熱之證表裡俱熱認作即病傷寒之證表熱里和便用麻黃湯桂枝湯五積散聖散子辛溫之劑以發表則內熱愈甚而斑黃狂亂之證起矣或未用辛涼之劑以發表便用承氣湯苦寒之劑以攻裡則表熱未去而結胸虛痞之證作矣故治溫熱病全在初起時辨明發表攻裡之先後方可施治此古庵之論溫熱也自上古以迄前明歷代前哲論溫熱之因症脈治可謂言之詳明矣奈近今傷寒專家尚不知傷寒自傷寒溫熱自溫熱更不知傷寒自表傳裡溫熱自里達表之病理凡遇伏氣溫熱率稱傷寒辛溫發表雜藥亂投以致輕者重重者危危者莫救間有明知溫熱首用辛涼清解或苦辛開泄者反誣其將邪遏進殊不知溫熱之邪自內而出病本熱結在裡表裡俱熱自宜雙解表中里三者之熱為正治何遏之有哉茲集諸家名論以表彰之俾學者知溫熱本證自有精當之療法矣論溫熱兼症療法溫熱伏邪也凡言兼者伏邪兼他邪二邪兼發者也治法以伏邪為重他邪為輕故略治他邪而新病即解約而計之大約有八兼風其一兼風病名風溫初起一二日見症與伏邪略同惟鼻塞鼻鳴咳嗽清涕與伏邪異脈亦多浮而與伏邪之不浮不沉而數者亦異治法惟葛根蔥白湯最合勢重者防風解毒湯荷杏石甘湯繆氏竹葉石膏湯選用勢輕者桔梗湯加味梔豉湯選用咳加前胡杏仁蘇子痰多加栝蔞川貝竺黃之類大抵伏邪兼寒能令病勢增重兼風反令病勢易解以寒主凝澀則伏邪內郁郁一分病勢增固一分風主遊揚則伏邪外疏疏一分病勢解散一分雖然溫熱屬伏火一兼風邪風助火勢火假風威病勢最急尤宜速治稍緩則津枯液涸痙厥兼臻醫家病家不可不預防也兼寒其二兼寒病名冷溫初起一二日必有頭痛發熱身痛惡寒諸表症與傷寒頗同而以脈辨則不同伏邪多軟數而不浮兼寒則多浮數浮弦浮大甚至有浮緊者再以症辨亦多有不同伏邪多汗兼寒則無汗但受寒者無煩躁口苦口臭症伏邪兼寒必有煩躁口苦口臭症也一遇此等更當辨其受寒與伏邪孰輕孰重熱重寒輕者煩躁口臭症多無汗惡寒必少則當以荷杏石甘湯蔥豉白虎湯梔豉芩葛湯選用或六神通解散尤捷寒重於熱者惡寒無汗必甚煩躁必輕則宜用蘇羌飲蔥豉加葛根湯等先散其外束之新寒若在冬令寒束於外既無汗惡寒邪鬱於內復見煩躁者麻杏石甘湯亦可正用若挾寒濕九味羌活湯去生地最為的當此症若治寒遺熱必有斑黃狂衄之變治熱遺寒復有嘔利痞厥之憂馴至沉困不可不知然此皆為初起一二日言之也若日久則伏邪勃發表寒不能自存而為熱則惟以治伏邪之法治之而已兼暑其三兼暑病名暑溫一名暑熱初起一二日身大熱背微惡寒與傷寒略同但傷寒先惡寒而後發熱雖熱甚亦周身惡寒暑溫則先發大熱熱極而後背惡寒繼則但熱無寒口大渴汗大出且必有面垢齒燥心煩懊憹便閉溺澀或瀉不爽等兼症脈則右洪數左脈反小甚則厥深熱深手足逆冷脈滑而厥治法宜察病勢勢輕者但先輕宣上焦如桔梗湯加苦杏仁青蒿露或五葉蘆根湯加西瓜翠衣銀花露之類勢重者必肅清上中二焦如荷杏石甘湯竹葉石膏湯之類甚則三黃石膏湯去麻黃加薄荷青蒿若熱深肢厥神識昏迷者熱厥也即熱氣閉塞空竅所致必須辛涼重劑兼芳香開竅如白虎湯加鮮竹葉童桑枝瓜霜紫雪丹之類挾痰者加竹瀝竺黃石菖蒲川貝白薇新定牛黃清心丸犀珀至寶丹等選用若肝風內動手足發痙必須熄風清火涼血透絡如犀羚白虎湯重加桑葉丹皮菊花鉤藤童便等之類若熱盛爍肺絡仿咯血者必須涼血降火肅清絡熱如白虎湯重加鮮竹茹鮮茅根童便等之類血再不止加鮮生地犀角汁若熱盛傷氣脈大而芤者必須清熱扶氣白虎加人參湯主之若喘喝欲脫汗多脈散者必須斂津益氣千金生脈散主之惟其間挾酒濕食滯肌熱無汗胸膈痞滿者最忌白虎法清涼寒潤必須苦辛開泄小陷胸加枳實合瀉心法最效間有表見身痛宜參用香薷秦艽里見腹滿宜參用蒼朮厚朴者正不必以寒涼逆折其邪也雖然伏邪兼風兼寒四時皆有至若兼暑一症惟長夏有之故溫熱症總以風溫冷溫為最多兼濕兼燥其四兼濕病名濕溫一名濕熱其五兼燥病名溫燥一名燥熱其實即濕火燥火症也已詳前溫熱即是伏火篇茲不贅惟戴氏原論謂伏邪多汗兼暑更多汗則表必虛故發表之味不可妄用至濕熱最宜分利燥脾木通為上滑石次之豬苓赤苓澤瀉又次之蓋分利則濕與熱皆從清道出邪有去路此論真足啓迪後學也兼毒其六兼毒病名溫毒一名熱毒通稱時毒有風毒穢毒之別風毒者即風溫時毒也症勢較各種溫熱症為尤重治法當分三種一溫毒痄腮及發頤初起咽痛喉腫耳前後腫頰腫面正赤或喉不痛但外腫甚則耳聾口噤難開俗名大頭瘟蝦蟆溫者是也加減普濟消毒飲主之或用代賑普濟散一日五六服或咽下或含漱最效荊防敗毒散加金汁亦妙外腫處貼水仙膏貼後若皮間有小黃瘡如黍米者不可再敷水仙膏過敷則痛甚而爛須易三黃二香散敷之若熱毒熾盛神昏譫語者必須清涼解毒芳香宣竅如伍氏涼血解毒湯費氏清火解毒湯之類加瓜霜紫雪丹主之若熱結便閉神昏痙厥者必須大劑涼瀉拔萃犀角地黃湯加金汁元明粉主之下後可用竹葉地黃湯涼血救液總之此症凡用疏散須防化燥必佐苦寒甘涼以清火救津也凡用清涼須防冰伏必佐活血疏暢恐凝滯氣血也二溫毒發斑不因失汗失下初起脈浮沉俱盛壯熱煩躁起臥不安外或頭面紅腫咽喉腫痛吐膿血面赤如錦紋身痛如被杖內則煩悶嘔逆腹痛狂亂躁渴或狂言下利如是而發斑者點如豆大而圓色必紫黑而顯胸背腰腹俱稠毒氣瀰漫營衛三焦壅閉燔灼氣血斯時而任白虎之化斑犀角大青之解毒邪毒得涼而愈郁反致不救惟下之則內壅一通邪氣因有出路斑毒亦從而外解矣治法惟紫草承氣湯拔萃犀角地黃湯二方合用加金汁皂角刺最效病勢極重者症必渾身發臭不省人事口開吹氣舌現黑苔黑瓣底必須用十全苦寒救補湯生石膏加重四倍循環急灌一日夜連投多劑病人陸續瀉出極臭之紅黑糞次日舌中黑瓣漸退始漸輕減若下後斑不透犀角大青湯已透熱不退本湯去升麻黃芩加西洋參鮮生地銀胡地骨皮清潤之發斑已盡外熱已退內實不大便間有譫語只須雪羹調葉氏神犀丹以清泄之至其辨法發斑紅赤者為胃熱紫為胃傷黑為胃爛也大抵鮮紅起發者吉雖大不妨稠密成片紫色者半死半生雜色青紫者十死不一生矣惟斑色紫者雖為危候黃連解毒合犀角地黃湯連投數劑亦可十中救二三若斑黑色而下陷者必死三溫毒喉痧俗稱爛喉痧多發於春冬之際不分老幼遍相傳染發則始必惡寒後但壯熱煩渴斑密肌紅宛如錦紋咽喉痛疼腫爛或紅腫而痛或但痛不腫不紅甚則白腐喉爛微者飲食如常甚則胸痞咽阻不能食脈形弦數或濡數或沉數或沉弦不數或右寸獨大或兩寸並沉或左部兼緊惟痧有一見即化者有透後始化者其症雖一團火熱內熾而表分多風邪外束醫家見其火熱甚也率投以犀羚芩連梔柏膏知之類寒涼強遏輒至隱伏昏閉或喉爛廢食延挨不治或便瀉內陷轉眼凶危治法初起時急進解肌散表使溫毒外達如劉氏桔梗湯去黃芩加紫草丹皮栝蔞皮川貝母之類或加減普濟消毒飲去板藍根加紫花地丁野菊葉大青葦莖之類若蟬衣葛根皂角刺三味痧點隱約不透者可暫用以透達見痧點後切不可用如冬天寒甚痧毒因外寒束縛而不得透出者暫用蜜炙麻黃少則三分多至五分但取輕揚之性以達毛竅往往一劑立見見後切勿再用且喉痧未有無痰涎者方中必加生蘿蔔四兩鮮青果四枚煎湯代水其次即當下奪燎原之勢非杯水所能滅所以僅施清滋不為功下藥首推風化硝生錦紋其次青瀉葉郁李淨仁又次淡海蟄生蘿蔔其方如陳氏四虎飲拔萃犀角地黃湯加元明粉金汁之類最效其用下之法略如吳又可洽疫之意必大便行過數次脈靜身涼苔轉薄白飲食漸復然後內無留邪火不復熾矣然此為病勢最重者言之若進解肌散表後表邪已解火熾已盛痧透脈弦喉爛舌絳口渴神煩二便尚通者只須重用清化如陳氏奪命飲犀羚二鮮湯之類足矣清泄餘火喻氏清燥救肺湯陳氏清肺飲曹氏桑丹瀉白散三方加減善後調理或養胃陰如葉氏養胃湯之類或和胃氣如金匱麥門冬湯之類或清養肺液如耐修子養陰清肺湯之類或滋腎涼肝如桑麻六味湯之類對症酌用可也其間外治之法亦足補方藥之不逮今擇外治十要以補其缺一要備撑嘴鉗凡牙關緊閉之時若用金鐵之器硬撑其口必傷其齒用烏梅冰片搽擦不開者則必用撑嘴鉗緩緩撑開其口牙環寬而齒不受傷最為靈妙二要備壓舌片凡看喉之際將舌壓住則喉關內容之形色一目瞭然三要備杏仁核彎刀凡杏仁核腫大勢必漲塞喉關藥食難下必用彎刀於杏仁核上放出膿血喉關寬而藥食可下且無誤傷帝丁之弊較中國喉槍喉刀尤為便利四要備照喉鏡察看喉關之內容能隱微畢顯以補助目力所不及五要備皮膚針以便射入血清急解喉痧之毒奏功最捷此名血清療法據上海工部局報告凡治喉痧初起歷試輒驗六要提疱以泄毒用異功散斑蝥四錢去翅足糯米炒黃去米不用血竭沒藥乳香全蠍元參各六分麝香冰片各三分共研細末如蠶豆大放膏藥上貼患處喉外兩旁一周時起疱夏日貼二三時即能起疱不必久貼起疱後速即挑破擠出黃水倘紫色或深黃色宜用藥貼於疱之左右仍照前挑看以出淡黃水為度再用大蒜頭搗爛如蠶豆大敷經渠穴在大指手腕處寸口動脈陷中男左女右用蜆殼蓋上扎住數時起疱挑破揩乾以去毒氣七要漱喉以去毒涎取鮮土牛膝根葉搗汁一碗重湯燉溫不時漱喉漱畢即低頭流去毒涎再漱再流須耐心十餘次毒涎方淨此品為治喉聖藥善能消腫散血止痛化痰無論何種喉症用之皆效以其能去風痰毒涎也凡喉症以去風痰毒涎為第一要義倘紅腫白腐用紫金錠三錢熱水沖化俟冷含漱患處吐出再含再漱此法不獨能去喉腐且能導吐風痰八要吹鼻以通氣吐痰凡喉痧肺氣無不窒塞首用吹鼻一字散豬牙皂七錢雄黃二錢生研藜蘆末一錢蠍尾七枚共為細末吹少許入鼻孔即噴嚏出而吐毒痰若鼻塞喉閉必用喉閉塞鼻棗蟾酥七分細辛四分辰砂三分麝香二分五釐冰片二分五釐豬牙皂四分半夏三分辛夷四分巴豆四分去油牛黃二分雄黃四分研極細末用紅棗切破一頭去核將藥少許納入棗內用線扎封棗口左痛塞右鼻右痛塞左鼻若小孩鼻小棗不能塞或用棉花包藥扎塞亦可但不能令藥靠肉以免腫爛之患若喉閉勢重者用兩棗將兩鼻齊塞治喉痧喉閉氣息不通命在垂危者有起死回生之功較之用臥龍丹紫金丹開關各法不能得嚏百無一生者不若此棗一塞痰氣漸鬆人事轉醒洵多神效也九要吹喉以解毒去腐退炎止痛首用爛喉去腐藥用杜牛膝根葉汁之曬乾淨末一兩蘇薄荷末五分浣花青黛五分梅花冰片三分共研勻瓷瓶密藏不可泄氣受潮如潮但可曬乾再研不可火烘以流去毒涎接吹錫類散象牙屑焙珍珠粉各三分飛青黛六分梅花冰片三釐壁蟢窠二十枚牆上者佳西牛黃人指甲焙男病用女女病用男分別配合各五釐將各焙黃之藥置地上出火氣研極細粉密裝於瓷瓶內勿使泄氣專治爛喉時症及乳蛾牙疳口舌腐爛凡屬外淫為患諸藥不效者吹入患處瀕死可活以去腐止爛末用珠黃散珍珠粉六分西牛黃三分京川貝煅龍骨各四分煅青果核三枚共研細末瓷瓶密藏以清餘毒而生肌十要刮後頸以散毒於頸窩處搽真薄荷油少許用錢一文如刮痧樣往下順刮須千餘刮顯出塊點用瓷片鋒刺破即以蜞口吮出惡血無蜞時則用小吸氣筒以吸出之散毒最效此治喉痧喉痹及各種風火喉症之第一妙法也至若所謂穢毒者即濕溫時毒也一名濕溫挾穢又名濕穢凡夏秋間俗稱痧氣痧穢者多屬此症初起惡寒繼則純熱頭重脹痛胸脘痞滿噁心欲嘔腹痛悶亂膚熱自汗肌肉煩疼四肢倦怠右脈濡滯舌白或黃治法雖均宜芳香化濁如藿香正氣散加減然當辨其偏於熱重者必兼舌苔黃膩心煩口渴宜用枳桔梔豉合小陷胸湯加青蒿滑石偏於濕重者必兼舌苔白膩口黏不渴宜用藿朴二陳湯加佩蘭葉蒼朮白檀香白蔻末之類如膚髮黃豆或如疙瘩塊癢而麻木者此濕毒從皮膚排泄也前方加杜赤小豆土茯苓連翹皂角刺透發之輕則但發白㾦如水晶色前方合千金葦莖湯輕宣之如濕毒阻滯筋肉一身盡痛者前方加羌活防風桂枝秦艽疏通絡脈以發散之如濕毒阻滯胸膈氣壅而厄者前方加廣皮淡竹茹公丁香柿蒂沉香汁開降之如濕毒阻滯清竅神識如蒙者前方加太乙紫金丹開泄之蘇合香丸亦效如濕毒挾食阻滯胃腸不飢不食不便者前方加小枳實海南子炒黑醜疏逐之如濕毒入絡氣鬱化脹便溏溺澀者前方合二金湯疏泄之薛氏開鬱通絡飲合寬膨散奏效尤捷如濕毒久羈三焦氣滯胸痹神昏竅阻少腹硬滿大便不下者此必有濁痰黏涎膠結於內也宜宣清導濁湯去寒水石加控涎丹琥珀末鮮石菖蒲開逐之如濕毒兼誤食生冷寒凝氣阻三焦俱閉二便不通者胃苓湯合半硫丸主之如濕毒因多服苦寒濁滯久留下焦下注直腸而氣閉肛門墜痛胃不喜食舌苔腐白者朮附湯合半硫丸挽救之兼瘧其七兼瘧溫熱二病有似瘧轉瘧兼瘧之不同用藥亦有微異似瘧者乃寒熱往來或一日二三次或一次而時無定也溫熱兼風寒症初起多有之轉瘧者溫熱症譫妄煩渴大劇之後已經大汗大下仍有餘邪不解復作寒熱轉成瘧象也溫熱症末路多有之兼瘧之症乃寒暑時邪合病也其症寒熱有常期瘧症全具但熱多寒少且多躁渴擾亂熱勢迅速或更昏憒穢氣觸人為異秋令多有之溫熱症所以似瘧者因伏邪盤踞膜原欲出表而不能透達欲陷里而未得空隙故見半表半裡之少陽症也治法以新定達原飲為主溫熱症所以轉瘧者因汗下後邪氣已衰正氣來復出與邪爭故在先陽氣獨亢有熱無寒者今則以陰液漸回而寒熱相爭矣在先邪氣充斥夜燥熱無休止時者今則邪氣漸退正氣漸復而寒熱發作有時矣治法以養正為主祛邪佐之補中益氣湯炙甘草湯柴胡四物湯參胡三白湯量餘邪之盛衰視陰陽之盈虧酌而用之至若兼瘧之症最為難治吳又可曰瘧疾二三發或七八發忽然晝夜煩熱發渴不惡寒舌上苔刺心腹痞滿飲食不進下症漸具此伏邪症現而瘧症隱也以伏邪方藥治之則生瘧家方藥治之則劇治之如法脈靜身涼每日或間日寒熱復作有常期者伏邪解而瘧邪未盡也仍以瘧法治之蓋伏邪初起本與瘧病不甚相遠伏邪多濕溫二氣相合瘧多風寒暑濕四氣相合其邪氣之雜而不純橫連膜原原是一路但伏邪之火氣發則為亢陽故宜清宜下之症多瘧之暑氣停則為鬱滯故宜宣利之症多耳所以伏邪初起方用新定達原飲與瘧之主方用清脾飲藥品亦多相類至其傳變則緩急輕重迥乎不同善悟者於此而細參之思過半矣兼痢其八兼痢伏邪本多自利症表症初起即每日解數次稀臭水者是也詳見後自利條下更有春夏之交一得伏邪即兼下利紅白而裡急後重者名為兼痢初起慎勿作痢治蓋痢屬裡症今見伏邪之發熱頭痛為表裡俱病先用透伏邪之法解其表表解而里自和其痢多有不治而愈者若用治痢之法先清其里裡氣虛而表邪陷輕者增其煩躁神昏重者遂至嘔逆昏憒而危矣所以古人於時痢初起專主倉廩湯一意先解其表但加陳倉米以和中俟表症解後裡熱症具方可議清議下不但香連承氣之類初宜暫緩即淡滲分利亦宜緩投於表症未解之先若表症已解而里積未除則宜葛根芩連湯加青陳楂曲清消之甚加枳實導滯丸緩攻之中路可用白頭翁湯苦堅之大凡痢症夾表先見身熱即宜緩用苦寒淡滲清裡之藥用之必增嘔逆此歷驗不爽者不特時行症兼痢為然若溫熱病而兼痢多屬濕熱與積滯互結胃腸治法總以疏利推蕩清火為主惟伏邪火毒太甚驟發即下純紅純紫惡血或兼見舌燥譫妄諸症者黃連大黃犀角鮮地又在所急不可拘此論也綜而言之以上八條其辨明所以為溫熱兼症固已不憚逐類詳審然總以前所列五辨為主五者之中必有一二確據方於溫熱門求治否則各按各門施治可也若反混以時邪治之為害甚矣溫熱夾症療法溫熱伏邪也凡言夾者伏邪夾實夾虛二邪夾發者也如夾痰水食郁蓄血等邪屬實者則以夾邪為先伏邪為後蓋清其夾邪而伏邪始得透發透發方能傳變傳變乃可解利也如夾脾虛腎虛及諸亡血家症則以治伏邪為主養正為輔蓋邪留則正益傷故不可養正遺邪也如夾哮喘心胃痛疝氣諸舊病則但治伏邪舊病自已蓋舊病乃新邪所迫而發也約計之則有十一夾痰水飲入於胃經蒸變而稠濁者為痰未經蒸變而清稀者為水痰與水一物也痰能作熱水能作冷溫熱屬伏火症故夾痰者更增其熱每見昏眩痞悶右脈滑盛治法宜桔梗湯加化橘紅栝蔞貝母甚則可加稀涎散先吐膈上之伏痰如痰迷清竅神昏如迷口吐涎沫胸腹按之不痛者宜加味導痰湯加牛黃清心丸或昌陽瀉心湯加萬氏牛黃丸若夾水則脈往往相悖治法亦有不同不可不細辨也溫熱之脈必數而有水在胸膈其脈多緩甚則遲弦此脈夾水之辨也溫熱之舌一經傳裡則轉黃轉燥轉黑若有水在胸膈則煩躁譫妄沉昏諸症具備而舌色白潤間有轉黃轉黑者亦必仍有滑苔或滿舌黃黑半邊夾一二條白色或舌尖舌本俱黃中間夾一段白色此舌夾水之辨也溫熱胸滿心下硬痛手不可按一有水在胸隔心下雖滿痛按之則軟略加揉按漉漉有聲甚則腸下抽痛乾嘔短氣或腰重足腫下利溺少此症夾水之辨也溫熱症見夾水脈症雖有表不宜純用辛涼發散純用則表不能解而轉見沉困有里症不可早用苦寒早用則必轉加昏憒此水氣鬱遏熱邪陽氣受困宜於發表清裡藥中加辛燥利水利氣之品以祛水氣逮水氣去郁遏發然後議攻議涼則無不效者矣燥濕則半夏蒼朮利水則木通苓澤利氣則萊蔔子草果仁青木香甚則有可投控涎丹大陷胸湯者故溫熱雖屬伏火往往有投三承氣黃芩白虎而偶用溫燥藥收功遂至訟清熱之非者不知伏火乃其本氣夾雜乃其間氣耳二夾食滯溫熱夾食滯者最多而有食填胸膈食入腸胃之不同入腸胃則為陽明積熱症治法備於三承氣湯惟食在胸膈雖症見惡食吞酸噯氣腹滿欲吐不吐嘔逆痞悶而往往有脈沉手足冷者誤認三陰投以溫劑卻無一毫熱渴而煩躁倍增甚則一二日即死蓋膈間為陰陽升降之路食填之則氣閉氣閉則鬱熱無所疏泄誤溫則熱愈郁熱鬱於內故外無發熱症熱鬱於下故上無口渴症伏邪以出表為淺入里為深此病一溫則逼邪入里故並至死而不見熱症也由前五辨法既辨得為溫熱症矣而遇脈沉手足冷即當細詢其胸膈若痞塞悶痛即是夾食再辨其舌苔白厚而微兼淡黃益為食填膈上明證可於桔梗湯中加枳殼青皮萊蔔曲糵甚則用吐法以宣之外治用連豆散敷之使膈間陽氣宣達然後熱症自見則解表清裡無或誤矣三夾氣鬱溫熱症夾氣鬱者初起時症悉同而多脈沉手足冷嘔逆胸滿頗類夾食但夾食為有物為實邪舌苔厚白而微黃胸膈滿痛不可按按亦不移夾氣為無物為虛邪舌苔白薄胸膈滿痛半軟而可按先宜宣通其鬱然後解表清裡自無不效若不舒鬱而徒發表則裡氣不能外達而難於徹汗遽用清下則上氣不宣多致痞逆惟於解表藥中加蘇梗青皮鬱金香附之類以宣其氣則表易解於清裡藥中加栝蔞川貝以舒其鬱則里易和但川貝母雖為舒郁要藥而力薄性緩必用至五錢一兩方能奏效若加四磨飲子則尤捷四夾蓄血伏邪傳經之後蓄血最多從治攻裡茲不具論惟本有內傷停瘀復感伏邪於初起一二日病之表症悉具而脈或芤或澀頗類陽症陰脈但須細詢其胸腹脅肋四肢有痛不可按而澀者即為蓄血確知其非陽症見陰脈則是表症見里脈矣治法必兼消瘀紅花桃仁歸尾赤芍元參元胡山楂之類量加一二味重則加炮穿山甲一錢則表邪易解而芤澀之脈亦易起若誤認芤澀為陰而投溫劑輕則變劇重則危矣至於里症發現宜用吳氏桃仁承氣湯加乾漆炒川連瀉火攻血其蓄血或從嘔出或從泄出須審其色紅紫而散者可治色如敗衄而凝結成塊多兼血水此正氣已脫邪不能留也又或如汙泥而黏膩不斷臭穢異常者此津氣已敗與濁腐同下也症多不治如脅痛少腹痛手不可按甚至昏迷不省少頃復蘇乃瘀血上衝症名血厥大便或祕或黑輕則香殼散重則代抵當丸拔萃犀角地黃湯加炮穿山甲一錢最破瘀積若瘀結不散必發熱如狂咳喘嘔逆若發汗太過誤觸瘀血則或嘔或泄或發厄逆但活血消瘀則嘔泄厄逆自止五夾脾虛溫熱較之風寒本為難治以風寒傳變有次序溫熱傳變無常經風寒表邪一發即散伏邪散而復集且往復再三風寒傳裡症一攻即和伏邪攻而復合有下之又下而不和者此伏邪所以難治也而脾虛者則更為難治蓋溫熱必得汗清下而後解脾虛者表不能作汗里不任攻下或得汗矣而氣隨汗脫得下矣而氣從下脫即純用清泄中氣亦不克支持往往藥愈涼而邪愈遏今時習俗尤偏於溫熱傷陰之説不知中氣內虛熱鬱灼津之理每見苔赤便用大劑清滋是濁熱已遏中焦氣分又用濁藥兩濁相合逼令邪氣深入膏肓深入骨髓遂成錮結不解之勢又或舌苔黃膩明是中焦氣分被濕熱熏蒸法宜苦辛開化乃不用開化而用大劑涼藥如三黃白虎三石玉女煎之類有闔無開亦足逼令邪氣深伏邪伏則脾氣不得上升舌苔因之亦伏轉成舌絳無苔見其舌絳無苔又用犀角地黃清宮增液諸湯更令邪氣深伏藥愈清滋舌肉愈燥愈赤愈黑甚至音啞神昏竅閉變在須臾故治此等症汗不強汗解表必兼養正如參蘇飲七味蔥白湯之類下勿輕下攻裡必兼顧本如三黃枳朮丸黃龍湯之類涼不純涼清中必兼益氣生液如人參白虎湯竹葉石膏湯黃連瀉心湯參胡溫膽湯參胡芍藥湯之類其外症似無甚分別惟脈必虛弱不任尋按可據然邪有進退當其邪焰方張雖虛而脈亦尋按有力不可泥也又必以神情氣色脈症相參如面色萎黃神情倦怠氣息微促皆脾虛中氣不振之象更須通體合參如通體皆有餘實象而獨見一二虛象則虛象反為吃緊通體俱見虛象而獨見一二實症則實症又為吃緊是故權衡標本為尤急也如實症居標虛症居本則虛症為重如虛症居標實症居本則實症為重到此虛實關頭苟不精心診察則草菅人命矣六夾腎虛溫熱症夾脾虛者為難治矣夾腎虛者更難治溫熱屬伏火腎氣虛則手足反冷溫熱屬實邪腎氣虛則眩暈驚悸腰膝痿軟腎虛之中又有陰虛陽虛之分溫熱必待汗下清而後解陽虛者一經汗下清則脫絶之症隨見陰虛者一經汗下清則枯竭之症隨見必須時時諦察凡在表時見腰痛異常小便頻數膝脛冷軟精泄如注當細詢其人之平日如有淋濁遺泄陽痿等症則當於疏表藥中加人參白芍陽虛兼官桂杜仲陰虛兼元參知母以照顧本元免後來意外之虞若入里當下必千金生地黃湯陶氏黃龍加減為主當清氣分人參白虎湯血分犀角地黃湯加減為主或屢清屢下而熱更甚舌上燥而無苔或有黑苔愈清而愈長或有燥苔愈下而愈裂者是皆屬於腎陰虛察其陽明無實症可據即當治以六味地黃湯熟地改用生地加知母黃柏或甘露飲熟地切片泡湯代水煎藥王太僕所謂寒之不寒責其無水壯水之主以制陽光者此也再不應則合生脈散以滋水之上源或用黃連阿膠湯小甘露飲滋陰瀉火但似此熱勢燎原非杯水所能救故必大作湯液乃有濟耳見機若早十救二三涸竭已見十難救一或更兼脾胃敗症如嘔厄噦利之類潤藥難任甚或湯藥不下百不救一矣七夾諸亡血溫熱症亡血有三其一未病之先素亡血而陰虛一受伏邪則邪熱乘虛煎熬亡陰最易用藥解表清裡必步步照顧營血如七味蔥白湯之用生地麥冬劉氏雙解散之用歸身白芍是也其二當病之時忽然吐衄女子崩漏甚至血暈昏厥熱甚危急病家但知血之可駭醫家亦忽其伏邪惟汲汲於止血清涼滋補多至危殆不知血由邪逼惟當清其伏邪伏邪解血自止也惟此症徐見於伏邪既盛發熱數日後者易知而猝見於邪郁陰經並無發熱頭痛時者難識但見微惡寒而大作嘔急當如前用五辨法辨之若舌有白苔即屬濕溫傷絡當以新定達原飲為主嘔加竹茹廣皮脹加青皮大腹皮舌有黃苔或紫絳色即屬溫熱傷絡宜用涼膈散加茅根童便血大溢者加大黃黃連但治伏邪血症自已若脫血太甚而氣欲絶者必用人參麥味以固中氣俟伏邪傳變歸經然後按經治之此溫熱症夾亡血之最危者其三伏邪大張之後煩熱躁渴之餘而見亡血症則又溫熱症之常態詳後血症各條八夾哮喘哮喘乃肺家所時有本有寒痰熱痰二症一受溫熱則無非痰火由其濕熱之氣從其類而入肺發其哮喘遇此當行前五辨法有伏邪但治伏邪而哮喘自除或於治伏邪藥中加栝蔞川貝蘇子白前千金葦莖湯合文蛤散尤捷二邪並解法更精密若哮喘勢重則白果定喘湯蘇子降氣湯二方亦可借用以治標惟麻黃必須蜜炙沉香亦宜磨汁再加生石膏海蛤殼以清鎮之庶免辛燥劫液之弊九夾胃痛溫熱症有夾胃痛者於其痛時先用前五辨法若有伏邪見症但治伏邪可也雖平時因寒而發於此則但治其熱蓋濕溫伏於膜原溫熱伏於血絡蘊釀蒸變必從火化伏邪自里達表而發其胃痛痼疾者多屬熱痛則但於治伏邪藥中加乳香沒藥以止痛延胡桃仁以活絡速使其伏邪透發而胃痛自已若誤認平常寒胃痛用桂附薑萸必致危殆十夾疝氣伏邪夾疝其腎囊少腹引痛全是疝症當如前五辨法一有伏邪不必治疝但於治伏邪藥中加橘核青皮而疝自消若依常治疝法用吳萸桂附茴香諸燥品輕者變為囊癰重者變為厄逆噦厥昏沉而莫救矣總而言之溫熱夾症最多非刻意精別用藥必致差誤凡遇有內傷宿病之人更患伏氣溫熱不得用峻汗峻攻峻清之法必參其人之形氣盛衰伏邪微甚本病之新久虛實向來之宜寒宜熱宜補宜瀉宜燥宜潤宜降宜升或近日服過何藥之相安不相安其間或夾痰水或夾食滯或夾積瘀或夾氣鬱或夾氣虛或夾血虛或夾陽虛或夾陰虛務在審症詳明投劑果決自然隨手克應而無顢頇之弊矣溫熱復症療法溫熱復症有復至再三者皆由病人不講衛生病家不知看護所致每見屢復之後多有釀成四損四不足者約計其復之病因則有四一勞復溫熱瘥後元氣未復餘邪未清稍加勞動其熱復作不必大費氣力即梳洗沐浴多語更衣之類亦能致復復則諸症復起惟脈不沉實為辨輕者靜養自愈重者必先察其虛實虛則調其營衛和其臟腑待其表裡融和方愈誤用攻下清涼必致不救安神養血湯主之實則主以仲景枳實梔豉湯撤表邪而清裡熱如兼頭痛惡寒加薄荷蔥白如兼寒熱寒多加羌活紫蘇熱多加知母黃芩一二劑後必復汗而解此屢試屢驗者不可妄投補益以致閉邪增病雖然勞復之中有氣虛勞復陰虛勞復房勞復之分氣虛勞復者溫熱瘥後餘邪未盡止因正氣大虛因勞復熱微兼惡寒四肢倦怠無氣以動脈虛右大舌潤無苔胸膈寬暢者此真氣虛勞復也宜補中益氣湯甘溫補之惟升柴須蜜炙如兼汗多惡寒歸耆建中湯最妙若正氣雖虛尚有餘熱未清其人虛羸少氣氣逆欲嘔者竹葉石膏湯加薑汁主之或陳氏六神湯加銀胡地骨皮亦佳陰虛勞復者由溫熱傷陰腎液已虧稍加勞動微挾風寒其病復作症仍頭痛發熱惡風舌燥口渴六脈浮數無力者此真陰虛勞復也宜七味蔥白湯清潤而微汗之或金水六君去半夏用生地加川斛丹皮豆豉蔥白之類滋養陰液以汗之如兼嘔惡當留半夏加竹茹以和胃如兼咳嗽加旋覆花甜杏仁以降氣如兼虛火上冒目赤顴紅大渴煩躁嘔惡不納者亦宜金水六君煎加麥冬代赭之類養陰鎮逆房勞復者即女勞復一名色復溫熱瘥後氣血未充早犯房事則內損真氣外觸邪氣而復作也其症頭重不舉目中生花腰脅痛小腹裡急絞痛憎寒發熱或陰火上衝頭面烘熱胸中煩悶是也若卵縮入腹脈離經者死舌伸出數寸者亦死治法必用豭鼠屎湯調下燒裩散虛極者宜六味飲加麥冬豆豉梔子煎湯調服燒裩散虛極熱盛者則用陶氏逍遙湯調服若小腹急痛脈沉足冷則用當歸四逆加吳茱黃湯調服外用吳茱萸五錢食鹽二兩拌炒熱尉小腹二食復溫熱瘥後胃氣尚虛餘邪未盡若納穀太驟則運化不及餘邪假食滯而復作其症仍發熱頭痛煩悶不納宜枳實梔子豉湯加山楂肉麥芽連翹萊蔔汁等涼疏之腹痛不大便者加生錦紋若溫病新瘥飲酒者必復熱以酒味辛性熱助其餘邪熱毒故也必兼煩悶乾嘔口燥不納等症急用川連葛花銀花連翹枳實焦梔烏梅花粉枳椇子等清解之三自復乃伏邪未盡也當問前見何症服何藥而解仍用前藥以滌其餘邪則愈四怒復溫熱瘥後因事觸怒怒氣傷肝相火暴發因而餘熱復作症必身熱胸悶心煩懊憹氣逆喘呼甚則脅痛嘔血治法宜蘇子降香湯加桑葉丹皮銀胡地骨皮等平其氣以清泄之若瘀血結聚少腹急痛者代抵當湯加杜牛膝主之香殼散加延胡索炮穿山甲尤捷若不語如喑形厥如尸者宜犀角地黃湯加桃仁歸尾赤芍白薇厥症返魂丹等甘鹹以平之芳香以宣之雖然怒復有大怒鬱怒之分大怒者其志憤激則氣血易於奔迫而無所節制經所謂怒則傷志也脈多浮弦躁盛症多失血甚或痛厥仍用蘇子降香湯加蜜炙延胡醋炒錦紋鹽水炒川連等以降泄之血虛火旺者拔萃犀角地黃湯加白芍白薇童便金汁等以通降之鬱怒者其志怫戾則氣血易於瘀壅而不克寬舒經所謂怒則氣逆也脈多弦澀甚則沉弦搏堅症多瘕疝久則成癆成蠱治法瘕疝宜開鬱正元散茴香橘核丸等選用成癆宜紫菀散劫癆散顧氏清金散杜瘵膏等選用成蠱宜當歸活血湯代抵當湯下瘀血湯等選用桃仁承氣湯合逍遙散加細辛土狗末奏功尤捷四損凡大癆大欲大病久病後氣血兩虛陰陽並竭即為四損復受伏邪正虛則邪入愈深邪深則傳化難出汗下傷正而正脫補助郁邪而邪錮多不可治當此兩難之際於是乎有補瀉合用之法有先補後瀉之法先瀉後補之法如人參白虎湯黃龍湯竹葉石膏湯皆補瀉合用之法也先用補劑後施汗下先補後瀉之法也先用汗下後施補劑先瀉後補之法也當詢病之來路斟酌施治尤當審現在之症若純見熱症亦不可以疑似之間誤人大凡周身俱見大實大熱之症而一二處微見虛象則吃緊照顧其虛周身俱見虛象而一二處獨見實症則吃緊斡旋其實此治病之權衡也若夫汗之而表症愈增如頭痛身痛更甚之類清下而里症愈增如煩渴痞滿更甚之類則大虛有盛候也急宜補之無疑既辨其症尤當細辨其脈凡遇脈之浮候盛大者須謹察其沉候有無力處六部脈皆盛者須謹察其一部有獨無力處果得其一部一候之真無力便可略其諸部諸候之假有餘從而施治自有如神之妙夫既詢其來路之大概其察得其輕重之確憑再加之脈理精詳則燭照無遺矣至其損症之狀甚多當參後四不足條看四不足若四不足與四損亦各不相同四損由人事四不足由天稟四損在暫時四不足在平素然四不足亦有由四損而來者不得謂四損外便無不足也四不足者氣血陰陽也氣不足者少氣不足以息語言難出也感邪雖重反不成脹滿痞塞凡遇此症縱宜宣伐必以養氣為主血不足者面色萎黃唇口刮白也感邪雖重面目反無陽色縱宜攻利必以養血為主陽不足者或四肢厥逆或肌體惡寒恆多泄瀉至夜益甚或口鼻冷氣受邪雖重反無發熱苔刺煩渴等症縱宜攻利清熱必先之以溫補待其虛回實症全見然後以治熱之法治之陰不足者自然五液枯乾肌膚甲惜感邪雖重應汗不汗應厥不厥縱宜攻利必先之以養陰待其氣化津回邪多不治自退設有未退酌用清利攻之若早攻之其病益甚以上四不足合前條四損每見溫熱症屢復後兼此虛損症候者總不可正治其邪必以養正為要先服養正藥待其實症悉見方可攻邪若服攻邪虛症復見仍當調補其虛養正以達邪祛邪以安正互相增減迭為進退必使邪盡去而正不傷方為善治總而言之勞復食復自復怒復四症實則易治虛則難治一復可治再復不治以余所驗諸勞多復御女者死諸食多復犯酒最劇諸氣多復大怒尤甚至於屢復之後已釀成四損四不足者急則一旬半月即亡緩則遷延時日而斃即有醫療得法調養適宜幸或全愈者體亦柔脆最易重感全在醫者善於勸戒病者自知保重耳溫熱遺症療法新增溫熱二病凡有遺症者皆由余邪未盡或由失於調理或由不知禁忌所致今舉其要約二十有四一瘥後發腫溫熱症大勢已平伏邪已解而面目肢體浮腫者有食滯中宮水停心下氣復未歸三種當分別以施治食滯中宮者乃病後脾胃大虛不能消穀也病者胃中猶燥偏欲多食食停心下臍上則水不得上輸於肺肺亦不能通水道於膀胱故溢於肢體而為腫其症以心下臍上有硬處按之則痛為異小便或利或不利當用平胃散加枳實山楂麥芽萊蔔青皮神麯為主硬處消則腫自愈或加苓澤兼利水亦可水停心下者乃脾虛不能消水也與食滯異者心腹無硬痛處而小便必不利也須實脾利水宜白朮米仁浙苓皮澤瀉車前木通之類利其小便而愈或苡仁糯米煮粥食亦佳氣復未歸者溫熱大傷陰氣之後由陰精損及陽氣愈後陽氣暴復陰尚虧歉之至切忌消利吳又可所謂病後氣復血未復氣無所歸故暫浮腫不可治腫調其飲食節其勞役靜養自愈吳鞠通則曰余見世人每遇浮腫便與淡滲利小便方法豈不畏津液消亡而成三消證快利津液為肺癰肺痿證與陰虛咳嗽身熱之癆損證哉余治是證悉用復脈湯重加甘草只補其未足之陰以配其已復之陽而腫自消千治千得無少差謬敢以告後之治溫熱氣復者暑溫濕溫不在此例至其辨法氣腫異於停水食滯者停水身重而小便不利氣腫身輕而小便自利食滯腹中有結氣腫腹中自和也二瘥後皮膚甲錯溫熱愈後身體枯瘦皮膚甲錯者乃熱傷其陰陰液不能滋潤皮膚也治法以養陰為主吳氏人參養榮湯清燥養榮湯酌用葉氏加減復脈湯尤效亦有粥食調理自回者三瘥後發瘡溫熱新瘥發瘡者最多乃餘熱淫於肌肉也若照尋常瘡症溫托妄施斷不能救惟多服清涼解毒兼養氣血藥自愈四瘥後發痿四肢不能動移者熱傷筋脈也吳氏諸養營湯酌用輕者粥食調理自愈五瘥後發蒸蒸蒸骨熱如癆瘵者乃餘熱留於陰分也不可以其羸瘦而遽用虛損門治法必察其六腑有結邪則仍以攻邪為主次察其筋絡有壅瘀仍以通瘀為主也次察其氣道有痰涎仍以祛其痰涎為主數者俱無方可清熱或無邪而陰傷方可純用養陰之藥或分其餘邪之輕重虧損之多少而兼用養陰清熱藥進退加減以和之更妙六瘥後耳聾溫熱症身涼後尚有耳鳴耳聾等症者其因有三一因餘邪留於膽經宜溫膽湯加柴胡菖蒲鉤藤池菊通草荷葉之類以清解少陽之郁二因痰火上升阻閉清竅其耳亦聾宜導痰湯去半夏南星加栝蔞皮京川貝枇杷葉杜兜鈴通草鮮石菖蒲之類以輕宣肺氣之郁三因腎虛精脫則耳鳴而聾宜常服耳聾左慈丸或磁朱丸等以滋陰鎮逆此二症不關少陽皆禁用柴胡升提外治惟耳聾神丹絲棉包裹納入耳中多效七瘥後發頤俗名遺毒乃餘邪留滯絡中而成毒也因汗下清解未盡其邪結於少陽陽明二經發於兩頤者陽明部位也發於耳之左右者少陽部位也治法以解毒清熱活血疏散為主誤則成膿不出而牙關緊咽喉不利多不能食而死毒內陷而復舌燥神昏亦死出膿後氣虛血脫亦死故宜早治也古方以普濟消毒飲為主發在耳後以柴胡川芎為主在項下以葛根白芷為主在項後或巔頂加羌活薄荷時方以連翹敗毒散為主如二活荊防連翹赤芍牛蒡桔梗土貝蒺藜薄荷銀花甘草之類如元氣虛者須兼歸耆補托潰膿後當大補氣血為主然發於陽明者易治發於少陽者難治總之此症初起速宜消散緩則成膿不可輕補於未潰之前補早則必成膿尤不可純用寒涼於將發之際恐閉遏而毒不得發故必兼疏散為要外治以蔥水時時浴之八瘥後額熱凡溫熱症熱退後獨額熱未除目神似覺呆鈍此胃中余滯未清額屬陽明故獨熱宜清疏之二陳湯加連翹黃芩山楂神麯之類清之和之九瘥後咳嗽凡溫熱症熱退之後尚有咳嗽未除此餘熱在肺也宜滋養肺胃之陰其嗽自止如南沙參麥冬地骨皮知母川貝川斛花粉茯苓甜杏仁桑皮蔗汁梨汁之類或加生地玉竹之類總之新感風寒而症見咳嗽其病為輕以其邪傳入肺肺主皮毛邪從外達也溫熱多內傷虛症見咳則重五臟傳乘肺受火刑水源涸竭每多死症十瘥後自汗盜汗雖皆屬虛候然溫熱瘥後多由余熱未清心陽內熾以致熏蒸燔灼津液外泄而汗出慎勿驟補峻補苦堅清養為宜苦堅如當歸六黃湯加減以育陰瀉火固表清養如西洋參生地麥冬黃連甘草小麥百合竹葉茯苓蓮子心之類擇而為劑可也十一瘥後驚悸凡溫熱新瘥觸事易驚夢寐不安者餘熱挾痰也痰與氣搏震蕩心宮故驚悸宜用竹茄黃連石菖蒲半夏膽星梔子知母茯苓旋覆花橘紅等清餘熱而消痰十二瘥後怔忡乃水衰火旺心腎不交也宜補水養心硃砂安神丸最妙半夏秫米湯合交泰丸尤捷十三瘥後不寐凡溫熱症熱退之後夜不欲寐者胃不和也溫膽湯加秫米和之驚悸不寐者心氣虛也前方合酸棗仁湯去川芎清斂之虛煩不寐者餘火擾動也黃連阿膠湯清滋之終夜清醒目不能瞑或目瞑則驚悸夢惕者餘邪內留肝膽膽氣未舒肝魂不安也宜酒浸郁李仁炒棗仁豬膽皮黃連焦山梔淡竹茹冬桑葉等滑以去著苦以泄熱十四瘥後妄言凡溫熱病每有熱退身涼之後其人如癡神思不清言語謬妄或倦語不思食者此心神虛散不復所致但當調養氣血兼治其心可也神復妄言自止吳氏安神養血湯主之薛氏參麥茯神湯亦主之但痰火餘邪內伏包絡亦有此症當用鮮菖蒲天竺黃川貝母連翹鉤藤丹皮淡竹葉竹茹辰砂之類以涼開熱痰則神自清而不妄言矣若猶不應加萬氏牛黃清心丸清宣之如餘熱未淨多言錯語者宜導赤散加麥冬蓮子心硃砂染燈心等熄余焰而清心神十五瘥後語蹇凡溫熱症熱退之後其舌轉動不靈而語言蹇澀者因心脾腎三經之脈皆縈繞於舌心腎虛則舌不靈動痰阻脾絡肝風內擾則語言蹇澀不清總是虛風痰火為病宜導痰湯加菊花鉤藤白蒺藜皂角炭石菖蒲薑汁竹瀝等熄虛風而清痰火若因痰熱滯於肺絡者宜顧氏清金散加石菖蒲竹瀝清肅之如因餘熱耗傷肺陰者宜清燥救肺湯加岩制川貝雅梨汁清養之若聲顫無力語不接續似蹇非蹇者陰氣大虛元氣無根也宜貞元飲合集靈膏峻補之十六瘥後昏沉凡溫熱症新瘥後十餘日或半月漸至昏沉者皆緣發汗未盡餘邪在於心胞故也或兼潮熱或兼寒熱似瘧宜連翹梔子豆豉麥冬菖蒲淡竹葉鉤藤丹參之類清解之然有痰火內伏胞絡者亦見昏沉其人終日昏睡不醒或錯語呻吟或獨語如見鬼宜用東白薇天竺黃京川貝廣鬱金石菖蒲皂角刺鮮竹葉細芽茶硃砂染燈心厥症返魂丹等輕清以開達之甚或萬氏牛黃清心丸葉氏神犀丹皆可採用十七瘥後喜唾即多吐涎沫是也審其胃虛而有餘熱者宜用烏梅北棗丸噙化之土虛不能攝水者六君子湯加益智仁攝之若其稠飲自下焦漾漾而起溢出口中者此腎氣不納濁陰上泛也宜都氣飲加胡桃補骨脂以納之或少加淡附片以收之或佐白朮以制之十八瘥後不食當辨不欲食食亦不化兩端不欲食者病在胃宜養以甘涼金匱麥門冬湯主之葉氏養胃湯亦主之食不化病在脾當補以溫運香砂理中湯主之六君子湯亦主之雖然不欲食一症宜分傷食與停食兩項傷食者飲食自倍腸胃乃傷病在不及消化停食不論食之多少或當食而怒或當食而病在氣結而不能化也治傷食宜偏重於食或吐或下或消若停食則偏重在氣惟理氣而兼之以消吐下之法不可用也醫者須分別治之十九瘥後不便凡溫熱症後大便不行者熱閉虛閉居多風閉氣閉者少熱閉者熱搏津液腸胃燥結及腸胃素有積熱者多有此疾其症面赤腹熱大腹脹悶四肢反冷或口舌生瘡是也大黃飲子最妙三黃枳朮丸枳實導滯丸陸氏潤字丸等亦可酌用虛閉有二一陰虛一陽虛也凡下焦陽虛則陽氣不行不能傳送而陰凝於下下焦陰虛則精血枯燥津液不到而腸臟乾稿治陽虛者但益其火則陰凝自化蓯蓉潤腸丸主之老年者黃耆湯送服半硫丸治陰虛者但壯其水則涇渭自通六味地黃湯加淡蓯蓉白蜜主之益血潤腸丸五仁丸等亦效風閉者風勝則干也由風熱搏激肺臟傳於大腸津液燥澀傳化則難或其人素有風病者亦多風閉或腸胃積熱久而風從內生亦能成閉東垣潤腸丸主之加味皂角丸亦主之氣閉者氣內滯而汙物不行也其脈沉其人多噫心腹痞悶脅肋膨脹若用攻藥通之雖或暫通而其閉益甚矣或迫之使通因而下血者惟當順氣氣順則便自通矣蘇子降氣加枳殼杏仁主之重則六磨湯主之二十瘥後腹熱凡溫熱症身大涼獨腹熱未除此脾火內甚也養陰藥中加生白芍自除但此症惟伏暑晚發最多多屬腸胃積熱雪羹送服陸氏潤字丸最妙二十一瘥後下血凡溫熱新瘥或十日或半月忽然下血者由於伏火未淨熱傷陰絡而血下溢也治以清營涼血和絡之法如生地丹皮地榆川斷槐米白芍苡仁黑荊芥白茅根臟連丸治之自愈陰虛火旺者臟連六味丸尤捷二十二瘥後遺精因火動者多宜清餘熱固精封髓丹主之三才封髓丹加黃連亦主之以此症黃連黃柏二味最是要藥也二十三瘥後調理當分補虛清熱二項補虛有二法一補脾一補胃如其人中氣虛者病退後必納穀少運化遲或大便不實或噁心吐涎宜六君子加減以和中形寒畏冷宜黃耆建中湯溫補之凡此症脈皆緩大舌皆白嫩可辨如其人陰分虛者必有餘邪未盡舌燥口渴二便艱澀脈兼微數等症宜小甘露飲葉氏養胃湯等清養之清熱亦有二法初病時之熱為實熱宜用苦寒藥清之大病後之熱為虛熱宜用甘寒藥清之二者有霄壤之殊凡人身天真之氣全在胃口津液不足即是虛生津液即是補虛故以生津之藥合甘寒瀉熱之藥而治感後之虛熱如麥冬生地丹皮北沙參西洋參鮮石斛梨汁蔗汁竹瀝茅根之類皆為合法仲景河間主用竹葉石膏湯天水散以清虛熱亦取甘涼之義也設誤投參耆苓術補脾之藥為補寧不並邪熱而補之乎至於飲食之補但取其氣不取其味如五穀之氣以養之五菜之氣以充之每食之間便覺津津汗透將身中蘊蓄之邪熱以漸運出於毛孔何其快哉人皆不知此理急於用肥甘之味以補之暫時雖精采健旺可喜不思油膩阻滯經絡邪熱不能外出久久充養完固愈無出期矣前哲龐氏安常有鑑於此如所云凡病新瘥只宜先進白稀粥次進濃者又次進糜粥亦須少少與之不得早吃肉食旨哉言乎二十四瘥後禁忌溫熱大病後正氣未復凡飲食起居俱不可不慎也如酒肴甘脆肥鮮生冷等物皆不可犯只宜糜粥自養少食而頻則易運化不可過飽及他有所食雖思之勿與也且其氣血必虛凡費心費力過喜過怒多言多動皆可因勞而復病也因勞而動其既虛之血氣生其未盡之餘熱熱邪退而病瘥熱邪生而病復凡病皆然溫熱症為尤甚病者務宜自重論溫熱症辨似要義凡病俱以虛實寒熱四字為大綱溫熱症何獨不然但虛實寒熱之真者易辨似者難辨後所列溫熱各論表裡諸症皆實邪熱邪而實熱中亦有虛寒前論遺症中四損四不足皆虛邪寒邪而虛寒中亦有實熱余於逐條下已細辨之矣然有實症似虛虛症似實熱症似寒寒症似熱者尤不可不細辨也故復通論而詳述之所謂實症似虛者即以表症論之頭痛發熱邪在表也其脈當浮症當無汗而反自汗脈無力用發表藥而身反疼痛則似虛矣故人惑於多自汗而誤用桂枝湯者有之惑於脈無力而引仲景太陽篇發熱惡寒脈微弱此無陽也而誤用小建中湯者有之惑於身疼痛而引仲景若不瘥身體疼痛當救其里誤用四逆湯者有之不知伏邪之在表其自汗者邪熱自里蒸出於表非表虛也其脈無力者熱主散漫散漫則脈軟非比寒主收斂而脈緊也身體反疼者伏邪自里而漸出於表非比陽虛不任發表也此在表之實症似虛者也又以半表半裡論之寒熱往來胸脅滿邪在半表半裡也其脈當弦其口當渴而脈反沉口不渴則似寒矣故人惑於脈沉而以胸脅滿為太陰口不渴為內寒而誤用理中湯不知伏邪之半表半裡其脈沉者邪伏於膜原而未出表故脈不浮非陽虛也其不渴者邪未傳變未入胃腑故不能消水非內寒也此半表半裡之熱症似寒者也又以里症論之口燥咽乾不得臥邪在裡其脈當洪其身當熱其便當結而脈反沉微澀弱身反四肢厥冷大便自利則全似虛寒矣人惑於脈微澀弱而用參耆者有之惑於厥逆而用桂附者有之惑於自利而用參朮乾薑者有之不知伏邪在裡其脈沉微澀弱者乃邪熱結於腸胃氣不達於營衛也其身反厥冷者邪熱結於裡而不達於外氣結於下而不通於上也其自利者乃熱結旁流也此在裡之實症似虛熱症似寒者也總之溫熱為伏火與風寒之寒因大異故脈症雖有似虛似寒之時而一一辨其為溫熱症則屬邪盛而反見虛寒之假象明眼人不當為其所惑也所謂虛症似實者即以表症論之頭痛發熱身疼痛自汗脈浮大邪在表也而屢用清涼表散其症不減者非藥力之不專乃正氣不能使藥力達表陰液不能隨陽氣作汗也此伏邪在表時虛症之似實者也氣虛者加參耆於表藥中即汗陰虛者加潤劑於表藥中即汗若不知其氣血之兩虧而宣表不已勢必暴厥而脫更以半表半裡論之胸脅滿耳聾嘔吐如瘧狀脈弦邪在半表半裡也而屢用和解消導其症更加者非藥力之不到乃中焦脾胃傷而氣不運肝陰傷而火更燥也此伏邪在半表半裡時虛症之似實者也必合四君六君於和解藥中合四物於清解藥中始能戰汗而解若更消導清解不已必至胃氣絶而死更以里症論之舌苔黃黑裂燥芒刺胸腹脅臍硬痛大小便閉六脈數大邪在裡也而屢用攻利藥或總不得利或利後愈甚乃正氣不能傳送腸胃血液不能滋潤腸胃非藥力之不峻也此伏邪傳裡時虛症之似實者也氣虛者助胃以資傳送血枯者養陰以借濡滑氣行津化方得通利若不知其虧竭而恣意攻利必昏沉痿頓而死總之藥不中病則傷正氣傷其下則正氣浮越而上逆傷其中則正氣虛散而外越脈症雖有似實似熱之時而一詢其來路若已治之太過則屬氣從內奪正氣奪則虛明眼人當不為其所惑也夫一症而虛實互異用藥稍誤而生死攸分將以何者為辨症之把柄乎曰以開卷所列五辨法辨之則瞭然矣而更以曾經誤治與未經誤治辨其伏邪之為實為虛為實中夾虛為虛中夾實則得其大綱而更得其細目然後似是而非之症斷不能惑矣余於各論條下每症細辨其虛實而此先詳言以通論之者則以散見諸條尚恐略過故首先總論其吃緊處也至若寒極似熱則惟傷寒諸症有之而為溫熱症之所絶無故不論及論婦人溫熱婦人病溫熱症悉與男子同惟當妊娠及經期前後則治法略異以其關乎血室子宮也茲特先提其要而分病論治一妊娠感伏邪必須治之於早則熱不深入而傷胎當汗當清之症固當速治不待言尤以速清為首要如黃芩白虎梔豉芩葛等湯皆宜酌用石膏大青湯尤捷而當下之症尤不可遲若因妊娠忌下傷胎之説因循遲誤則胎受熱蒸其胎必墮故一見里症必用拔萃犀角地黃湯速清下之以安其胎胎既因邪不安去邪即是安胎但宜加清養血分藥如生地白芍白薇茅根之類蓋有病則病受之內經所謂有故無殞亦無殞也於此有歷驗不誣者若失下而至舌黑腰痛少腹下墜至急左尺脈伏則其胎將死腹中且不止於墮矣此時下亦墮不下亦墮然下之而胎墮母猶可救十中二三不下則母無生理胎亦不能獨存同一墮胎而此善於彼況速下而胎未必死乎當明言於病家而後施治下藥雖犀連承氣湯玉燭散拔萃犀角地黃湯等皆可採用惟芒硝當慎以其專主傷胎非大實大熱大燥不可輕試也二産後發熱每多苔前伏邪娩後陡發者其症不寒兼頭疼鼻塞其脈亦有不即顯露者惟舌苔頗有可徵或厚白而膩或黃膩黃燥或有赤點或微苔舌赤或口苦或口渴或胸悶或溲熱惟胸腹必按之熱甚此皆溫熱之伏邪內蘊世人不察仍循俗例飲以薑糖酒生化湯之類每見有釀成鬱冒痙厥大便難三大證者蓋血虛則厥陽孤則冒液枯則大便難鬱冒者則脈多洪大而芤痙者厥者脈則弦數三者不同其亡血傷津則一葉氏皆謂之肝風內動余每用阿膠雞子黃湯桑麻六味湯三甲復脈湯加味豬膚湯大小定風珠六方斟酌淺深次第而施治蓋此六方皆能增液潤筋守神故也若尚未見此三大重症但病溫熱伏邪者仍宜速去其邪兼護其虛無糧之師貴在速戰又不可拘於産後宜溫不宜涼之説徐洄溪所謂産後熱盛雖犀角石膏對症亦不禁用者是也其有敗血乘伏火上攻衝心則喜笑怒罵甚欲逾牆上屋者十難救一沖胃則飽悶嘔惡腹滿脹痛者五死五生沖肺則面赤氣喘痰涎壅盛甚則神昏口噤者十全一二此三證不論虛實急用熱童便灌之實症必有腹痛拒按情形輕者用當歸丹參炙草和血加桃仁童便白薇黑神丸等導瘀下行以鎮沖逆氣血虛極者必兼心虛氣短頭眩多汗須於前方加沙參棗仁熟地玉竹滋養之重者用回生丹最妙葉氏神犀丹犀珀至寶丹無極丸亦可參用亦有不因敗血上衝而神昏譫語甚則癲狂者此屬痰迷沈氏六神湯最效新定牛黃清心丸亦可用至於用藥不可過輕須用多備少服法中病即已熱勢退而伏邪輕即復其虛若畏産後虛怯用藥過輕延至三四日後反不能勝藥矣三熱入血室其症旦明夕昧夜更神昏低聲囈語如見鬼狀甚有當面與言若罔聞知而戶外之事反能聞之見之者蓋因溫熱爍血血液耗盡肝為藏血之臟最惡血燥肝血既燥又加水竭金枯腎水不足以涵濡肺金不足以灌溉肝遂不能自藏其魂而飛揚外越名曰離魂離魂則出入無時故戶外之事皆能聞且見之也又有病者自覺己身化作兩人並臥者亦離魂所致仲景治初病熱入血室嘗用小柴胡湯領邪外出余嘗以青蒿易柴胡加生地當歸元參麥冬養血救陰山梔澤瀉導血室之邪下行膀胱以為出路有瘀少腹按痛者加赤芍桃仁鱉甲龜板化瘀滋陰但必分經適來因受病而止經適來受病而自行經適斷而受病三種則實與虛自見如經水適來因熱邪陷入而搏結不行者必有瘀血再察其腰脅及少腹有牽引作痛拒按者必以清熱消瘀為治便通者小柴胡湯去參棗加鮮生地桃仁楂肉丹皮或犀角之類便閉者用桃仁承氣湯加穿山甲蟅蟲等下之尤須加生地當歸元參麥冬養血滋陰以固其本如因邪熱傳營逼血妄行致經未當期而至者必有身熱煩躁不臥等證宜清熱以安營如白虎加生地黃湯羚地清營湯甚則犀角地黃湯加黃連琥珀皆可隨症酌用如經水適斷而受邪者經行已盡則血海空虛邪必乘虛而陷宜養營以清熱宜生地四物湯去川芎加白薇丹皮桑葉銀胡地骨皮等輕清濡潤之若兼心跳肢厥昏厥如尸者四逆散合白薇湯主之若兼神識如狂者牛黃散最妙若兼腰脅及少腹滿痛者大柴胡湯加桃仁赤芍逐其血室之邪始愈若延久不愈上逆心包胸中痹痛即陶氏所謂血結胸也桂枝紅花湯加海蛤殼桃仁辛潤溫通之若下結血室少腹脹痛者新加絳復湯再加烏賊骨茜根延胡索川楝子等辛潤通絡以逐之如伏邪病發而經水自行者不必治經水但治其伏邪而病自愈蓋病本未犯血室故經行如常仲景所謂勿犯胃氣及上二焦必自愈者正指此非謂總不用藥也總之婦人溫熱但見晝日明瞭至夜譫語即當詢其經期以杜熱入血室之漸論小兒溫熱新增痙厥小兒溫熱症悉與大人同惟時見痙厥類於驚風誤治多死茲特先論其症治一風溫致痙皆由醫者不明風寒風熱見兒頭痛發熱不問何邪概曰風寒夾食輒與辛燥升散雜以苦溫消導往往陰液被傷肝風內動鼓痰上升血不榮筋筋急拘攣致成痙瘛一見痙瘛便稱驚風亂投冰麝金石苦寒慓悍毒藥以為開竅鎮驚清熱祛風家傳祕法家藏丸丹多系如此又或將驚字誤作筋字之訛挑筋刺血強推強拿其在富貴之家釀禍尤速治法先以辛涼開肺繼以甘寒化熱佐以潤劑降痰尤必辨其輕重輕者用辛涼輕劑桑菊飲加鉤藤桑枝竹瀝竺黃鮮石菖蒲之類重者用甘寒復鹹寒法如白虎湯加天麻羚角栝蔞川貝之類取效最捷昏厥不語者速加瓜霜紫雪丹開之陰液虧極者必兼色瘁竅乾無涕無淚等症再加梨汁蔗汁鮮生地鮮石斛甘涼以潤之二暑熱致痙症必面赤齒燥四肢厥冷手足抽搐神昏若驚輕則吳氏清絡飲加菊花鉤藤重則犀羚鎮痙湯加瓜霜紫雪丹神清以後用竹葉地黃湯清涼血分以善其後三燥火致痙皆由溫熱化燥液涸動風症必鼻竅無涕目干無淚面色枯憔神昏痙厥勢最危急速用犀羚白虎湯加瓜霜紫雪丹挽救之或竹葉石膏湯去半夏重加川貝竹瀝竹黃安宮牛黃丸等亦多獲效病減後餘熱或用葉氏養胃湯清養胃陰或用竹葉地黃湯清涼血分此皆似驚非驚為小兒溫熱症中之最重者也時瘄其次時瘄一名時痧發於冬春者多夏秋亦間有之其病恆發於小兒且易傳染其症身熱煩悶咳嗆鼻塞面目有水紅光咽痛氣急指尖時冷所見皆肺經症因於風熱者輕因於溫毒者重熱一二日見點者輕三五日見點者重見點要周身勻朗色鮮潤形高突顆粒分明者為吉如初起見點後一日三潮潮則熱勢盛而煩躁加逾時方退三日共作九潮痧已齊透然後徐徐回退此為時瘄之順症亦為風熱之輕症宜疏風解熱為先不可驟用寒涼必兼辛散為要加味翹荷湯主之若初起壯熱無汗煩躁神蒙見點細碎平塌其色晦滯淡白模糊一片既出不潮倏然隱沒亦有閉悶而不能發出喘急昏悶者此為時瘄之逆症亦為風熱之險症宜急急開達為要新加麻杏石甘湯主之若溫毒時瘄則較風熱為尤重其瘄有二三日而方透者有四五日而終未透者或身肢雖達而頭面不透咳聲不揚喘逆氣粗悶伏危殆者又有一現即回旋增喘促狂躁悶亂謂之隱早者更有痧雖外達而焮紅紫滯或目封或眥赤譫語神昏便閉腹痛或便泄無度種種熱盛毒深之象多由近來種牛痘盛行胎毒未得盡泄藉此溫毒以泄其蘊毒故以尋常瘄門舊法治之必無濟宜先以瓜霜紫雪丹芳透於前繼以犀羚芩連丹皮鮮地石膏人中黃大劑清涼解毒始得轉重為輕易危為安瘄透後痰多氣急咳嗽甚則聲啞喉痛者此瘄毒不能盡發鬱於氣分也宜千金葦莖湯合陳氏清肺湯宣通肺氣如伏邪未清內傷陰分而發熱不止者宜甘涼養陰如沙參地骨皮麥冬玉竹雲苓霍斜生地白芍丹皮甘草之類以救肺胃之陰液至瘄與痘辨法凡時瘄之出三日而始盡每日出二次子時出者巳時散午時出者亥時散經三日而出六次出透稠密無縫方為吉兆痘疹定論所謂瘄喜稠密痘喜疏朗是也當其發熱之初咳嗽噴嚏鼻流清涕兩眼胞腫眼淚汪汪面腫腮赤初出頂平即有清水但摸不礙指惟天花痘初出雖極細密必頂有寶蓋為辨若瘄出時切忌葷腥生冷冒犯風寒皆能使皮膚閉塞溫毒抑鬱而內攻也余每治時瘄始用防風解毒湯發之繼以繆氏竹葉石膏湯清之未透則蘆根葛根茅根為必用之藥既透則清燥救肺湯加減凡時瘄症上中下三焦均受邪侵其出沒有潮數見點三日方齊每日三潮三日九潮潮後漸漸退沒則瘄毒盡透若未潮足而早回及瘄一出而隱沒太早則邪伏於內咳喘齦爛喉啞咽痛毒火上擾也腹脹赤利邪火下注也身熱神昏欲寐瘄毒閉伏於中也宜急急提透瘄疹清熱解毒為治如犀角連翹牛蒡射干元參杏仁楂肉人中黃銀花紫草通草瓜霜紫雪丹之類必使瘄毒外散方有生機此等方法恆多奏效特表出之天花又次天花除寒濕陰毒外每多因溫毒而發其症有順逆險三者之分且其逆症險症尤多於順症其順症之天花痘仍照常發熱三日放標三日起長二日灌漿三日收靨三日始於見形終於結癡凡十四五日之間而已如一二日初出如粟血點淡紅潤色於口鼻年壽之間先發兩三點二三日根窠圓混氣滿血附長髮飽滿四五日大圓光澤大小不一五六日氣會血附紅活鮮明六七日氣化漿行光潔飽滿七八日氣旺血附神全色潤八九日漿足根化而無他證十一二日血盡毒解氣調漿足而斂十三四日氣血歸本漿老結癡十四五日氣血收功痂落瘢明是以不必窮治窮治反凶至於逆險之症必系溫毒熱盛壯火食氣氣失其運火邪妄行空竅郁遏處則冷衝突處則熱飛殃臟腑種種惡候如火邪爍肺則鼻煤衄血咽痛聲啞淫於大腸則暴瀉如注逆傳如心則煩躁癲狂弄舌黑刺移於小腸則溺膏溲血肆虐於脾則唇裂肌燥目胞紅腫淫於胃則消渴飲冷口穢噴人順乘於肝則液沸淚熱乘於膽則淚血返於腎則必灑墨塗朱迸裂泡湧空竅失血神昏躁亂煎熬及此則亦無臟不銷不腑不燥矣似此梟毒烈焰之症必現惡形惡色一見點而爍津耗液損氣涸血諸般肆虐此種溫毒天花攻解萬不可緩且解緩而攻速更萬不可以涼解姑試之以貽潰臟腑治法惟費氏必勝湯最力大而效速其次余氏清溫敗毒飲梁氏十全苦寒救補湯均可酌用毒勢稍輕者清涼攻毒散紫草承氣湯亦效費建中所謂毒出鬱伏而重者重與之攻而輕與之散是也其間惟陷症悶症尤逆而險若初起痘稠密暈紅紫而頂陷下紫陷也甚則暈腳乾枯中有黑臍而成黑陷此毒熱熾盛蔽其氣凝其血而陷也清毒活血湯重加犀角倍芩連耆紫然當其紫陷時不過一二劑痘立起及至黑陷則受毒已深雖用此方必須加三妙血庶可十救一二惟血陷與紫陷相類但血陷雖紅然必淡而不紫紫陷屬熱氣粗身熱血陷屬虛氣少身涼其症不可不辨紫陷以清毒活血湯為主毒在氣者宜加洋參石膏以清之毒在血者宜加犀角大黃地龍豬尾血以破之毒之枯燥劫胃者宜金汁人中黃雞矢白借濁陰之性以制陽毒而攻破之血陷以參桂鹿茸湯為主倦食手足厥冷加木香丁香肉桂寒戰咬牙加肉桂附子泄瀉膿漿難成去歸加炒白朮丁香肉桂酒炒白芍煨訶子肉果其治亦迥乎不同至於悶痘為痘科第一險症身熱二三日痘欲出未出或煩悶驚搐譫語皆由毒氣踞內不得出外須審其症而分別治之如痘影紅紫聲亮氣粗手足熱脈洪數此毒氣壅盛不能驟發而驚搐煩躁著宜費氏清解散宣之如痘影形色同前但聲重鼻塞或流涕脈洪數此內毒本盛外為風邪所束鬱滯不得出而驚搐煩躁者宜費氏蘇解散發之雖然悶痘一症方書但言白悶紫悶緊悶從無辨救之法因思悶痘者緣毒氣壅蔽悶而不發其症最急是為逆中之逆雖用紫雪之芳透必勝湯之攻毒亦多不救然有似悶而非真悶即屬悶而緩者是為險中之逆此閉證也若能明究其故而開其閉庶可轉危就安但閉證之由不一有因火毒熾盛而閉者有因痰垢凝塞而閉者有因蟲蝕內攻而閉者有因挾食挾血而閉者有因真元虧極而閉者略舉其要言之如一發熱即報點如丹身熱如烙漸乾焦紫黑煩躁悶亂唇焦口臭或唇口腫滿是溫毒之火盛也雖冬月亦須大劑清涼攻毒散石膏非數兩不應或發熱時便頭項不舉痰喘氣急或目閉神昏眩暈顛仆悶亂搐搦是溫毒之挾痰也亟當進飛馬金丹使上吐下泄以救之或一發熱即煩悶嘔吐舌下常流清水或時沉默喜唾或時躁擾不寧或腹痛狐疑或頻頻叫喊驗其舌下筋青或下唇有黑白細點是溫毒之挾蟲也宜先與椒梅丸誘入蟲口即以紫草承氣湯下之或初發時便壯熱神昏腹痛譫語舌刺如芒或氣粗便祕狂叫悶亂是溫毒之挾食也急投枳實導滯湯及三承氣湯選用或素因跌撲內傷瘀血阻滯一病溫毒天花即譫語神昏喘脹衄血者代抵當湯桃仁承氣湯選用或有身無大熱見點細白如㾦氣怯無力目閉無神面色及唇反鮮澤嬌豔光彩倍常是氣虛無陽肺胃之精華渙散於外也然溫毒天花殊不多見惟豢養柔脆四損及四不足者間或有之若非峻用人參一二兩生黃耆兩許佐以升麻鹿茸續續灌下烏能回元氣於無何有之鄉將白陷之天花痘而振起之耶故凡證之屬實而閉者竭力圖之尚可全十之半屬虛而閉者不過十救一二而已總之自來天花痘諸書皆詳於已出之後略於未出之先深言出速而稠密之危不言留中而不出之禍不知已出之毒外寇也未出之毒內寇也出速而稠密者外攻也留中而不出者內攻也故天花痘已出而死者多在旬日之外天花痘不出而死者多在六日之內徒知御外寇而不知逐內寇皆由諸前哲之為計疏也然其失計安在惟在痘未出而急於解毒緩於逐毒也不知未出之毒不可解但當汲汲逐之出外也豫深悟其理為未出以前諸症設法實熱者宣發其壅滯以逐毒出外虛熱者清補其氣血以逐毒出外上焦則透而逐之中焦則疏而逐之下焦則攻而逐之總以速祛其毒火而已速祛其毒火有出路而已此皆小兒溫熱症中之最重要最繁博者也其餘可仿大人溫熱各症例按症施治但必須減少其劑酌用峻品分數次服以消息之因小兒多不肯服藥若藥性既緩分量又輕再不多飲必難奏效矣辨症惟小兒不能自言病狀辨症最難茲特舉九種診斷法以為診察小兒溫熱之一助一辨神氣凡小兒熱壯者神必昏熱盛者氣必粗若口鼻氣粗疾出疾入者是為實熱邪氣有餘也口鼻氣微徐出徐入者是為虛熱正氣不足也總之小兒溫熱神氣清明熱雖重可救神氣昏憒熱雖輕必變二辨眉目凡小兒眉底現紅色眼上胞露紫筋眼下胞現青色皆為肝熱之現象須防火旺生風風動痙厥之危候三辨瞳神凡小兒目瞪神呆即為熱聚腦體之徵見此症者其勢多險故傷寒論於目不了了睛不和者用大承氣湯急下之蓋熱傷於腦正與此同若屬痰者必呼吸短促喉有痰聲可辨四辨唇齒凡小兒溫熱唇赤而燥即是下症唇腫齒焦亦是熱極唇紅如丹即發渴候紅甚焦黑其病必危他如上唇生瘡蟲食其臟下唇生瘡蟲食其肛至於齒為腎之餘齦為胃之絡溫熱耗腎液者齒色必黃黃如醬瓣宜救腎耗胃津者齦色必紫紫如干漆宜安胃齒光燥如石者胃熱也枯骨色者腎液枯也若上半截潤者是水不上承為心火上炎也咬牙齧齒者溫熱化風為痙病但咬不齧者熱甚而牙關緊急也齒垢由腎熱蒸胃濁氣所結其色如灰糕則枯敗而津氣俱亡腎胃兩竭為無治齒縫流血者胃火沖激則痛如不痛則出於牙根腎火上炎也齒焦者腎水枯無垢則胃液竭有垢則火雖盛而液尚未竭也齘齒者眠睡而齒相磨切也血氣既虛而風熱又客於牙車筋脈之間故睡後而邪動引其筋脈故上下齒磨切有聲謂之齘齒五辨鼻年壽在鼻梁為氣之門戶如赤光外侵肺液已受熱傷則氣不流行血必凝滯多有膿血之症山根為胃之脈絡凡小兒溫熱夾食胃氣抑鬱每見青黑之紋橫載於山根鼻孔為肺竅乾燥熱也流濁涕亦熱鼻準屬脾紅燥脾熱慘黃脾敗鼻色青主吐乳又主腹中痛若肢冷者多死鼻色燥黑如煙煤者陽毒熱極也鼻色赤者主肺熱又主風熱鼻鼾難言者風溫鼻鳴乾燥者風燥鼻孔扇張出氣多入氣少者肺絶也不治雖然鼻扇有虛實新久之分不可概言肺絶若初病即鼻扇多由邪熱風火壅塞肺氣使然若久病鼻扇喘汗為肺絶六辨手絡即虎口紋看法起於滑氏伯仁歌曰小兒三歲下虎口看三關紫熱紅傷寒青驚白是疳淡紅淡黃者斯為無病看又謂紋見下節風關為輕紋見中節氣關為重紋見上節命關為危直透三關為大危然此説不可盡拘惟手絡不宜暴露是為要訣以過露為血燥生風候也七辨手足冷凡小兒熱深肢厥肝陽上升太過者則頭熱而足冷有餘於上不足於下也縱氣上升而過則橫氣必收緊故腹熱而手冷有餘於縱不足於橫也然必其頭獨熱其腹亦獨熱與寒症異八辨糞溺糞如紅醬人皆知為濕熱之症候糞色青人每指為寒症之的據不知一病溫熱多系肝家有火膽汁生多多則瀉出西醫言之頗詳即傷寒論內自利清水色純青用大承氣湯一條亦明指糞青有熱症惟其汁黏而穢氣重尿亦短少深赤以此為辨余則溺紅為熱黃亦為熱淡黃色者為虛熱渾白如米泔者為濕熱此八者皆辨小兒溫熱之要訣也九按胸腹尤為幼科之首要以胸腹者五臟六腑之宮城陰陽氣血之發源若欲知其臟腑何如則莫如診胸腹診法當分上中下三停自胸至膈為上停自上脘至臍上為中停自臍至少腹為了停先用通診法輕手循撫遍按胸膈至少腹知皮膚之潤燥以辨寒熱中手尋捫問痛不痛者以察食滯之有無重手推按更問痛否以察臟腑之虛實沉積之何如即診脈中浮中沉之法也次用分診法先診胸膈凡胸高起按之氣喘者為肺脹或肺包膜積水或肺氣管停痰膈間高起者非氣聚即積水也即是龜胸俗名心突又名雞胸脹皆系此症尤宜診左邊虛里穴若跳動甚者雖積熱不可攻伐以其先天不足也凡虛里動氣有三候淺按便得深按卻不得者氣虛之候輕按洪大重按虛細者血虛之候有形而動者積聚之候故虛里之動可以辨病機之輕重按之應手動而不緊緩而不急者宗氣積於包絡中也是為常視之不見按之漸動如應如不應者為吉若胸中氣衰其動高逾乳至中府雲門者凶若其動洪大而彈手與細按而絶然不應者皆脈之宗氣絶也病必凶總之小兒脈候難憑惟揣虛里穴確有可據凡虛里動躍多屬血虛風動之候或陰虛火旺之症藥宜甘潤鎮攝切忌苦辛消克次診上中下三脘以指按之平而無澀滯者胃中平和而無宿滯也按中脘雖痞硬漉漉有聲而不如石者是積水也若痛而拒按必挾食積雖熱盛神昏必先苦辛開泄切忌苦寒直降也診腹之要以臍為先如臍之上下左右脹大如著動躍震手者衝任脈動也凡溫熱傷陰陰虛火動之症多有此候病最難治見於泄瀉痢疾後者病多不治若小兒素稟母體氣鬱一病溫熱夾食腸中必有積熱熱盛則衝脈動動而低者熱毒輕動而高者熱毒重兼虛里亦動甚者死惟積熱漸下衝任脈動漸微及下淨而衝任脈不動者生其次診大腹脈候有熱而腹候無熱者是表熱而其熱易去也按腹而熱如燒手掌者是伏熱而其熱不易去也小兒溫熱其輕重難以脈辨而診腹可以決定矣若心下動而其熱烙手者尤不可忽若滿腹痛則有食痛瘀痛積水痛之分食痛者痛在心下及臍上硬痛拒按按之則痛益甚瘀痛者痛在臍旁小腹按痛處則有塊應手積水痛者腹痛牽引兩脅按之則軟漉漉有聲時吐水汁吐則痛減若水腫脹滿症由腹按之至臍臍隨手移左右重手按之離乎脊失臍根者必死臍大突者亦死若繞臍而痛乃燥糞結於腸中欲出不出之候至於三指診面法如雲小兒半歲後有病以名中食三指曲按額前眉上髮際之下若三指俱熱是感受風熱鼻塞氣粗三指俱冷是感受風寒臟冷吐瀉若食中二指熱是上熱下冷名中二指熱是溫熱夾驚之候食指熱是胸隔氣滿乳食不消之類雖歷載幼科諸書但其説有應有不應務須參以上八法及按胸腹諸法以求確當庶免草菅兒命之誚矣
