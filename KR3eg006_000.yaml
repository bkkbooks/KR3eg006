body:
  text: 緒言考上元縣志戴天章字麟郊邑庠生少師林青雷習舉子業好學強記所讀經史能通部逆背如瓶瀉水壯為文干祿不足於是求有用之學自天官地理算數射弋以及書畫琴棋之類無不探微極要尤精醫理博覽深思活人無算謝之金揮不受四方淹雅名流至必下榻請教課諸子督以勤苦力學晚號北山學者稱北山先生長子瀚字巨川雍正元年癸卯一甲第二人覃恩敕贈文林郎翰林院編修乾隆辛卯孫翼子官御史再遇覃恩贈如其官乃孫諫議公祖啓曰先大父北山先生以通儒邃醫學所論著傷寒雜病諸書及咳論注瘧論注廣瘟疫論凡十數種皆先世父雪村先生行楷細字録存於家近坊中有瘟疫明辨四卷祖啓購閲之即先大父存存書屋廣瘟疫論也雖易其名未曾改竄其文不知何誤刻為歙縣鄭某之書在先大父固不爭此子孫見之不容不正因出存存書屋原本較而刻之以糾偽傳而廣先德觀此二則想見其為人惜不得見其全書而卒讀耳己酉春南京濮鳳笙君郵寄廣溫熱論抄本一册囑豫校勘付印余因診務忙任事多日不暇給暫置高閣嗣為濮君馳書屢促之不獲已勉承其乏將原書一一瀏覽始知其書即戴氏廣瘟疫論而陸氏九芝為之刪訂改定其名曰廣溫熱論者也見其論溫熱症甚精論溫熱病中種種發現之症尤極明晰洵當今最有實用之書故陸氏九芝原序云北山此書以溫熱與傷寒辨條分縷晰逐病疏明傷寒之治不混於溫熱溫熱之治不混於傷寒誠於秦越人四曰熱病五曰溫病之異於二曰傷寒者分疆劃界不得飛越一步矣然其書明是論溫熱而其書名則曰廣瘟疫篇中或稱疫癘或稱時疫或單稱疫一若自忘其為論溫熱者是傷寒之與溫熱北山能辨之而溫熱之與瘟疫北山亦混之矣余愛其論之精而惜其名之誤乃於凡所稱時行疫癘者悉改之曰溫熱或曰伏邪其開首云世之治傷寒者每誤以溫熱治之治溫熱者又誤以傷寒治之四語則余所綴也有此一提而所以作書之意乃先於卷端揭清即為之改題曰廣溫熱論則此書實足為溫熱病正法眼藏矣其言如此然余細玩原書見其於濕溫燥熱二症言之甚略尚少發明即用藥選方亦多未盡善處此非餘一人之偏見也試述陸氏九芝原評曰此書明辨溫熱與傷寒朗若列眉實足為度世金針而溫熱與瘟疫仍混同無別因為之改正其文命兒子潤庠手録之然屢次刪改而終不能愜意也次述邴氏味清原評曰此書各論均有至理即當在傷寒論中選方乃見大家作用惜多采後人夾雜之方未免有悖經旨且既知不可用辛溫而總不出羌活湯敗毒散之範圍將經方辛涼之法棄而不用先生殆亦趨時太甚耳又次述李氏鶴訪新評曰此書未將風溫濕溫春溫冬溫等分清而概稱時行未免含混至列大青龍九味羌活沿古治溫病之方則尤疏矣夫溫熱病熱從內發豈可用大青龍中麻桂猛發其汗耶若九味羌活湯皆一派辛燥雄烈夾入生地引邪入陰真雜而不精之方也合三説以觀之北山此書雖經陸氏刪定而終不能愜心貴當者九芝先生自認之而列方之純雜互收邴李二家已發其蒙故余不揣檮昧爰為悉心重訂將原書缺者補之訛者刪之更擇古今歷代名醫之良方而為余所歷驗不爽者補入其間務使後之閲者知此書專為伏氣溫熱而設非為新感溫暑而言辨症精用藥當庶幾與戴氏結撰之精心陸氏刪訂之苦心心心相印永垂久遠而余心始慊嗚呼莫為之前雖美不彰莫為之後雖盛不傳世之博雅君子應亦諒我苦衷乎黃帝紀元四千六百九年十月望何炳元廉臣識于越中之宣化坊
